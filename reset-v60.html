<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>Second Brain OS · reset v60</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,Arial;background:linear-gradient(135deg,#f8fbff,#eef6ff);color:#0f172a}.box{width:min(680px,calc(100vw - 32px));background:white;border:1px solid #e2e8f0;border-radius:28px;padding:28px;box-shadow:0 24px 70px rgba(15,23,42,.12)}h1{margin:0 0 10px}button,a{display:inline-flex;border:0;border-radius:16px;padding:13px 16px;font-weight:900;text-decoration:none}button{background:#2563eb;color:white}a{background:#eef5ff;color:#2563eb;margin-left:8px}.log{margin-top:16px;padding:14px;background:#0f172a;color:#dbeafe;border-radius:16px;white-space:pre-wrap;font-size:13px}</style></head><body><main class="box"><h1>Очистка кэша V60</h1><p>Удаляет service worker и кэш, данные приложения не трогает.</p><button id="run">Очистить и открыть</button><a href="index.html?v=second-brain-space-v60-clickable-folders-20260708#system">Открыть без очистки</a><div id="log" class="log">Готово.</div></main><script>const log=document.getElementById('log');function w(t){log.textContent+='\n'+t}async function run(){log.textContent='Начинаю очистку...';try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();w('SW удалён')}}if('caches'in window){const keys=await caches.keys();for(const k of keys){await caches.delete(k);w('Кэш удалён: '+k)}}setTimeout(()=>location.href='index.html?v=second-brain-space-v60-clickable-folders-20260708&t='+Date.now()+'#system',700)}catch(e){w('Ошибка: '+(e.message||e))}}document.getElementById('run').onclick=run;</script></body></html>
