<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS — V54 reset</title><style>body{font-family:Inter,system-ui,Arial,sans-serif;background:linear-gradient(135deg,#f8fbff,#eef6ff);color:#0f172a;margin:0;min-height:100vh;display:grid;place-items:center}.box{max-width:720px;background:white;border:1px solid #dbeafe;border-radius:28px;box-shadow:0 24px 70px rgba(37,99,235,.13);padding:28px}h1{margin:0 0 10px;font-size:32px;letter-spacing:-.05em}p{color:#64748b;font-weight:700;line-height:1.55}button,a{display:inline-flex;margin:8px 8px 0 0;border:0;border-radius:16px;padding:13px 16px;font-weight:900;text-decoration:none}button{background:#2563eb;color:white}a{background:#eef6ff;color:#1d4ed8}</style></head><body><div class="box"><h1>Очистка кэша Second Brain OS</h1><p>Эта страница удаляет старые service worker и caches, чтобы сломанная версия не перехватывала приложение.</p><p id="status">Готовлю очистку...</p><button onclick="clean()">Очистить ещё раз</button><a href="./index.html?v=second-brain-space-v54-self-contained-living-ui-20260708#finance">Открыть приложение</a></div><script>async function clean(){let log=[];try{if('serviceWorker'in navigator){let r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()));log.push('SW: '+r.length)}}catch(e){log.push('SW error')}try{if('caches'in window){let k=await caches.keys();await Promise.all(k.map(x=>caches.delete(x)));log.push('Caches: '+k.length)}}catch(e){log.push('Cache error')}document.getElementById('status').textContent='Готово: '+log.join(', ')+'. Сейчас открою приложение...';setTimeout(()=>location.href='./index.html?v=second-brain-space-v54-self-contained-living-ui-20260708#finance',1200)} clean();</script></body></html>
