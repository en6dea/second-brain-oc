<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"><title>Reset V62</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,Arial;background:linear-gradient(135deg,#f8fbff,#eef6ff);color:#0f172a}.box{width:min(680px,calc(100vw - 32px));background:white;border:1px solid #e2e8f0;border-radius:28px;padding:28px;box-shadow:0 24px 70px rgba(15,23,42,.12)}button,a{display:inline-flex;border:0;border-radius:16px;padding:13px 16px;font-weight:900;text-decoration:none}button{background:#7c3aed;color:#fff}a{background:#f5f3ff;color:#7c3aed;margin-left:8px}.log{margin-top:16px;padding:14px;background:#0f172a;color:#dbeafe;border-radius:16px;white-space:pre-wrap;font-size:13px}</style></head><body><main class="box"><h1>Очистка кэша V62</h1><p>Удаляет service worker и кэш, но не трогает данные приложения.</p><button id="run">Очистить и открыть AI Coach</button><a href="index.html?v=second-brain-space-v62-ai-life-coach-20260709#coach">Открыть без очистки</a><div id="log" class="log">Готов.</div></main><script>const log=document.getElementById('log');function w(t){log.textContent+='\n'+t}async function run(){log.textContent='Начинаю...';try{if('serviceWorker'in navigator){for(const r of await navigator.serviceWorker.getRegistrations()){await r.unregister();w('Удалён service worker')}}if('caches'in window){for(const k of await caches.keys()){await caches.delete(k);w('Удалён кэш '+k)}}w('Открываю...');setTimeout(()=>location.href='index.html?v=second-brain-space-v62-ai-life-coach-20260709&t='+Date.now()+'#coach',700)}catch(e){w('Ошибка: '+(e.message||e))}}document.getElementById('run').onclick=run;</script></body></html>
