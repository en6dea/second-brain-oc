@keyframes v81-confetti{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(0)}10%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.15) rotate(var(--rz))}}
.v81-category-hint{display:grid;grid-template-columns:minmax(220px,1fr) minmax(0,1.4fr);gap:16px;padding:18px;border:1px solid rgba(124,86,232,.12);border-radius:22px;background:linear-gradient(135deg,#faf6ff,#fff);box-shadow:var(--v78-shadow);margin-bottom:16px}

.v81-category-hint p{margin:0;color:var(--v78-muted)}
.v81-category-pills,.v81-modal-pills{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.v81-category-pills button,.v81-modal-pills button{min-height:40px;border:1px solid rgba(124,86,232,.14);border-radius:14px;background:#fff;padding:0 14px;color:#6546ce;box-shadow:0 10px 24px rgba(108,86,164,.06)}
.v81-category-pills button small,.v81-modal-pills button small{font-size:10px!important;color:#a596d7;margin-left:5px}
.v81-category-pills .accent{background:linear-gradient(135deg,#8a61ed,#6e4fd8);color:#fff;border-color:transparent}
.v81-help-box{padding:12px 14px;border-radius:14px;background:#f8f5ff;color:#5d5673;line-height:1.55;border:1px solid rgba(124,86,232,.1)}
.v81-row-menu{display:flex!important;flex-wrap:wrap;justify-content:flex-end}
.v81-kanban-legend{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}
.v81-kanban-legend span,.v81-priority{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:0 11px;border-radius:999px;font-size:11px!important;font-weight:600;letter-spacing:.01em}
.v81-kanban-legend .critical,.v81-priority.critical{background:#fff1f2;color:#c33656}
.v81-kanban-legend .high,.v81-priority.high{background:#fff7e8;color:#c8791e}
.v81-kanban-legend .medium,.v81-priority.medium{background:#eef5ff;color:#376dc3}
.v81-kanban-legend .low,.v81-priority.low{background:#eefaf4;color:#26885e}
.v81-kanban-week{display:grid;grid-template-columns:repeat(7,minmax(250px,1fr));gap:14px;overflow:auto;padding-bottom:8px}
.v81-kanban-col{display:flex;flex-direction:column;min-height:540px;border:1px solid rgba(111,92,172,.1);border-radius:24px;background:linear-gradient(180deg,#fbf9ff,#fff);box-shadow:var(--v78-shadow)}
.v81-kanban-col>header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid rgba(111,92,172,.08)}

.v81-kanban-col>header h2{margin:3px 0 0;font-size:23px!important}
.v81-kanban-col>header button{width:38px;height:38px;border:1px solid rgba(124,86,232,.14);border-radius:12px;background:#fff;color:#6f4fd3}
.v81-kanban-stack{display:grid;gap:12px;padding:14px;align-content:start;min-height:100%}
.v81-task-card{border:1px solid rgba(111,92,172,.1);border-left-width:5px;border-radius:18px;background:#fff;padding:14px;display:grid;gap:10px;text-align:left;color:var(--v78-ink);box-shadow:0 12px 26px rgba(94,70,155,.07)}
.v81-task-card.critical{border-left-color:#e95b7f}.v81-task-card.high{border-left-color:#ffb14a}.v81-task-card.medium{border-left-color:#7aa7ff}.v81-task-card.low{border-left-color:#58c994}
.v81-task-card.done{opacity:.82;background:linear-gradient(135deg,#f4fff8,#fff)}
.v81-task-card.done b{text-decoration:line-through;text-decoration-thickness:1.6px}
.v81-task-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.v81-task-top em{font-style:normal;color:#7f7a92;font-size:11px!important}
.v81-task-card b{font-size:15px!important;line-height:1.35}
.v81-task-card small{color:#756f88;font-size:11px!important}
.v81-task-card p{margin:0;color:#5f5d6d;font-size:12px!important;line-height:1.55}
.v81-task-card footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:4px}
.v81-task-card footer span{font-size:11px!important;color:#8a87a0}.v81-task-card footer u{text-decoration:none;color:#7c56e8;font-size:11px!important}
.v81-empty-lane{height:100%;min-height:160px;border:1px dashed rgba(124,86,232,.2);border-radius:18px;display:grid;place-items:center;gap:10px;text-align:center;color:#8f88a4;padding:18px;background:rgba(255,255,255,.7)}

@media(max-width:1180px){.v81-category-hint{grid-template-columns:1fr}.v81-kanban-week{grid-template-columns:repeat(7,minmax(220px,1fr))}}
@media(max-width:760px){.v81-kanban-week{grid-template-columns:1fr}.v81-kanban-col{min-height:auto}.v81-category-hint{padding:14px}.v81-row-menu{justify-content:flex-start}}

/* V81.1 — no-ring habit overview and explicit update marker */
.v81-habit-overview{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:20px;align-items:center;border:1px solid rgba(124,86,232,.12);border-radius:26px;background:linear-gradient(135deg,#fff,#faf6ff 56%,#f2fbff);padding:22px 24px;box-shadow:var(--v78-shadow);position:relative;overflow:hidden}
.v81-habit-overview:after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;right:-85px;top:-105px;background:radial-gradient(circle,#d9cbff 0,#eafaff 45%,transparent 72%);opacity:.65;pointer-events:none}

.v81-habit-score>i{width:43px;height:43px;border-radius:14px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-style:normal;font-size:20px}
.v81-habit-score b{display:block;font-size:25px;line-height:1}.v81-habit-score small{display:block;color:rgba(255,255,255,.82)!important;margin-top:5px}
.v81-habit-overview-copy h2{margin:0 0 6px;font-size:23px!important}.v81-habit-overview-copy p{margin:0;color:var(--v78-muted)}
.v81-habit-overview-copy u{display:block;height:8px;border-radius:99px;background:#ece9f5;overflow:hidden;text-decoration:none;margin-top:13px}.v81-habit-overview-copy u b{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#8b5cf6,#43c8b3)}
.v81-habit-overview-actions{display:flex;gap:9px;position:relative;z-index:1}.v81-habit-overview-actions button{min-height:43px}
.v78-build{font-size:10px!important;background:#6f4fd8!important;color:#fff!important;padding:5px 9px!important;border-radius:999px!important;opacity:.9!important}
@media(max-width:900px){.v81-habit-overview{grid-template-columns:1fr}.v81-habit-score{width:max-content}.v81-habit-overview-actions{justify-content:flex-start}}
@media(max-width:760px){.v81-habit-score{width:100%}.v81-habit-overview-actions{display:grid;grid-template-columns:1fr 1fr}}

/* V82 — SYMMETRIC HABITS, ICON PICKER, GOOGLE-STYLE CALENDAR, SEQUENTIAL COACH */
:root{
  --v82-text:#17192b;
  --v82-muted:#70758a;
  --v82-card:#ffffff;
  --v82-line:rgba(101,82,160,.13);
  --v82-shadow:0 16px 42px rgba(83,62,137,.09);
}
html{font-kerning:normal;text-rendering:optimizeLegibility}
.v78-content,.modal-card{font-feature-settings:"kern" 1,"liga" 1}
.v78-page-head{align-items:flex-end;gap:22px}
.v78-page-head>div:first-child{min-width:0;max-width:900px}
.v78-page-head h1,.v78-card h2,.v78-content h2,.v78-content h3{overflow-wrap:normal;word-break:normal;hyphens:none;line-height:1.16!important}
.v78-page-head h1{font-size:34px!important;font-weight:610!important;letter-spacing:-.025em!important;margin:.12em 0 .22em!important}
.v78-page-head p{max-width:820px;margin:0!important}
.v78-page-head>div:last-child,.v78-page-head>button{flex:0 0 auto}
.v78-primary,.v78-secondary{white-space:nowrap}

/* habits overview */
.v82-habits-page{display:grid;gap:18px}
.v82-habit-overview{display:grid;grid-template-columns:122px minmax(0,1fr) auto;gap:24px;align-items:center;padding:24px;border:1px solid var(--v82-line);border-radius:28px;background:linear-gradient(135deg,#fff 0%,#faf7ff 56%,#f2fbff 100%);box-shadow:var(--v82-shadow)}

.v82-habit-overview h2{margin:7px 0 5px!important;font-size:25px!important}
.v82-habit-overview p{margin:0!important;max-width:640px}
.v82-overview-stats{display:grid;grid-template-columns:repeat(3,108px);gap:10px}
.v82-overview-stats span{min-height:82px;padding:13px;border:1px solid rgba(105,84,164,.10);border-radius:18px;background:rgba(255,255,255,.78);display:grid;align-content:center;box-shadow:0 10px 24px rgba(86,67,132,.05)}
.v82-overview-stats small{font-size:10px!important;color:var(--v82-muted)!important}
.v82-overview-stats b{font-size:22px!important;margin-top:4px}
.v82-habit-grid{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;grid-auto-rows:1fr;gap:16px!important;align-items:stretch}
.v82-habit-card{position:relative;display:grid;grid-template-rows:auto 1fr auto;min-height:244px;height:100%;padding:18px;border:1px solid color-mix(in srgb,var(--habit) 20%,#e8e4f2);border-radius:25px;background:linear-gradient(150deg,color-mix(in srgb,var(--habit) 8%,#fff),#fff 58%);box-shadow:var(--v82-shadow);overflow:hidden;transition:transform .2s ease,box-shadow .2s ease}
.v82-habit-card:hover{transform:translateY(-2px);box-shadow:0 22px 52px rgba(83,62,137,.14)}
.v82-habit-card:before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,var(--habit),color-mix(in srgb,var(--habit) 44%,#fff))}
.v82-habit-card.is-done{background:linear-gradient(150deg,#effbf5,#fff 66%);border-color:#b9ead5}
.v82-habit-card>header{display:grid;grid-template-columns:minmax(0,1fr) 40px;gap:9px;align-items:start}
.v82-habit-main{border:0;background:transparent;color:var(--v82-text);display:grid;grid-template-columns:58px minmax(0,1fr) 18px;gap:13px;align-items:center;text-align:left;padding:0}

.v82-habit-main em{font-style:normal;color:#9284b8;font-size:20px}
.v82-habit-icon{width:56px;height:56px;border-radius:18px;background:color-mix(in srgb,var(--habit) 15%,#fff);display:grid;place-items:center;font-size:25px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7)}
.v82-habit-settings{width:40px;height:40px;border:1px solid rgba(105,84,164,.12);border-radius:13px;background:#fff;color:#71638e}
.v82-habit-meter{align-self:center;display:grid;grid-template-columns:1fr auto;gap:8px 12px;padding:18px 0 12px;margin-top:8px;border-top:1px solid rgba(105,84,164,.08)}
.v82-habit-meter>div{display:flex;align-items:center;justify-content:space-between;grid-column:1/-1}
.v82-habit-meter>div span,.v82-habit-meter small{font-size:11px!important;color:var(--v82-muted)!important}
.v82-habit-meter>div b{font-size:15px!important}
.v82-habit-meter u{height:8px;border-radius:999px;background:#eceaf2;overflow:hidden;text-decoration:none}
.v82-habit-meter u i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--habit),color-mix(in srgb,var(--habit) 55%,#fff))}
.v82-habit-card footer{padding-top:4px}
.v82-complete-button{width:100%;min-height:58px;border:1px solid rgba(105,84,164,.13);border-radius:17px;background:#fff;color:#58467d;display:grid;grid-template-columns:40px minmax(0,1fr);gap:11px;align-items:center;text-align:left;padding:8px 12px}

.v82-complete-button.done>span{background:#31c88a;color:#fff;box-shadow:0 10px 18px rgba(49,200,138,.23)}

/* icon picker */
.v82-habit-editor{display:grid;grid-template-columns:1fr;gap:15px}
.v82-icon-picker{border:1px solid rgba(105,84,164,.12);border-radius:20px;background:linear-gradient(145deg,#fbf8ff,#fff);padding:15px}

.v82-icon-picker>div{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}

.v82-icon-picker button span{font-size:9.5px!important;white-space:nowrap}
.v82-icon-picker button:hover,.v82-icon-picker button.selected{border-color:#9a78f1;background:#f1eaff;color:#6547ce;box-shadow:0 9px 22px rgba(111,82,196,.12);transform:translateY(-1px)}

/* Google-style calendar */
.v82-calendar-page{display:grid;gap:16px}
.v82-calendar-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 13px;border:1px solid var(--v82-line);border-radius:20px;background:#fff;box-shadow:var(--v82-shadow)}

.v82-calendar-nav strong{margin-left:8px;font-size:16px;font-weight:580;text-transform:capitalize}
.v82-calendar-views{padding:4px;border-radius:14px;background:#f6f3fb}

.v82-google-week{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:auto}
.v82-week-head{display:grid;grid-template-columns:70px repeat(7,minmax(150px,1fr));min-width:1120px;border-bottom:1px solid rgba(105,84,164,.10);background:#fcfbff;position:sticky;top:0;z-index:4}

.v82-week-head>button small{font-size:11px!important;text-transform:capitalize}
.v82-week-head>button b{font-size:22px!important;margin-top:4px}
.v82-week-head>button.today b{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#7c56e8;color:#fff;margin-top:3px}
.v82-week-body{display:grid;grid-template-columns:70px repeat(7,minmax(150px,1fr));min-width:1120px;min-height:690px}
.v82-week-body>aside{display:grid;grid-template-rows:repeat(14,72px);border-right:1px solid rgba(105,84,164,.09);padding-top:8px}
.v82-week-body>aside span{font-size:10px;color:#8d879c;text-align:center;padding-top:3px}
.v82-week-column{position:relative;display:flex;flex-direction:column;gap:8px;padding:10px;border-right:1px solid rgba(105,84,164,.08);background:repeating-linear-gradient(to bottom,transparent 0,transparent 71px,rgba(105,84,164,.06) 72px)}
.v82-column-add{align-self:flex-end;width:30px;height:30px;border:1px solid rgba(105,84,164,.12);border-radius:10px;background:#fff;color:#6f4fd3;opacity:.75}
.v82-week-empty{margin-top:8px;padding:14px;text-align:center;color:#aaa4b7;font-size:11px;border:1px dashed rgba(105,84,164,.13);border-radius:13px;background:rgba(255,255,255,.72)}
.v82-calendar-event{position:relative;border:1px solid rgba(105,84,164,.10);border-left-width:4px;border-radius:14px;background:#fff;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:5px;padding:9px;box-shadow:0 7px 17px rgba(75,56,121,.07)}
.v82-calendar-event.critical{border-left-color:#e75a78;background:#fff6f8}.v82-calendar-event.high{border-left-color:#f2a33b;background:#fffbf2}.v82-calendar-event.medium{border-left-color:#6f9df5;background:#f7faff}.v82-calendar-event.low{border-left-color:#54bd8a;background:#f5fcf8}
.v82-calendar-event.done{opacity:.68}.v82-calendar-event.done b{text-decoration:line-through}
.v82-event-open{min-width:0;border:0;background:transparent;text-align:left;color:#292538;padding:0;display:grid;gap:3px}
.v82-event-open .v82-event-time{font-size:9px;color:#80798f}
.v82-event-open b{font-size:12px!important;line-height:1.28!important;white-space:normal}
.v82-event-open small{font-size:9.5px!important;color:#777084!important}
.v82-event-actions{display:flex;gap:3px;align-self:start}
.v82-event-actions button{width:26px;height:26px;border:1px solid rgba(105,84,164,.10);border-radius:8px;background:rgba(255,255,255,.84);color:#6b50c8;font-size:10px!important;padding:0}
.v82-calendar-event.compact{padding:6px 7px;border-radius:10px}
.v82-calendar-event.compact .v82-event-actions{display:none}
.v82-day-calendar{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:hidden}
.v82-day-calendar>header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid rgba(105,84,164,.09)}

.v82-day-calendar>header button{min-height:40px;border:0;border-radius:13px;background:#7c56e8;color:#fff;padding:0 15px}
.v82-day-timeline{padding:5px 18px 18px}
.v82-time-row{display:grid;grid-template-columns:64px minmax(0,1fr);min-height:72px;border-bottom:1px solid rgba(105,84,164,.08)}
.v82-time-row time{padding-top:9px;font-size:10px;color:#8b8599}

.v82-all-day{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:15px 20px;border-top:1px solid rgba(105,84,164,.08);background:#faf8ff}
.v82-all-day>b{margin-right:6px;font-size:12px}
.v82-month-calendar{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:hidden}
.v82-month-calendar>header{display:grid;grid-template-columns:repeat(7,1fr);background:#faf8ff;border-bottom:1px solid rgba(105,84,164,.09)}
.v82-month-calendar>header span{padding:12px;text-align:center;font-size:11px;font-weight:600;color:#777184}

/* V83.2 — livelier light design, bank CSV import and Polina forecast */

.v83-today-game{position:relative;overflow:hidden;background:linear-gradient(95deg,#281d72 0%,#5e46ce 52%,#79d7cf 100%)!important;box-shadow:0 26px 65px rgba(83,59,163,.28)!important}

.v85-export-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:16px}

  function ageFromBirth(value) {
    if (!value) return '';
    const birth = dateAtNoon(value);
    const now = new Date();
    let age = now.getFullYear() - birth.getFullYear();
    const m = now.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age -= 1;
    return age >= 0 && age < 130 ? age : '';
  }

    ['📖','Чтение'],['🧠','Развитие'],['💧','Вода'],['🏃','Движение'],['🏋️','Тренировка'],['🧘','Медитация'],

    ['🚶','Прогулка'],['🧹','Порядок'],['📵','Детокс'],['❤️','Отношения'],['💊','Здоровье'],['🎓','Обучение'],
    ['🎨','Творчество'],['🌿','Спокойствие'],['⏱️','Таймер'],['✅','Дисциплина'],['🛡️','Защита'],['✨','Другое']
  ];

  function habitsActive() { return array('habits').filter(h => h.active !== false); }
  function completedHabit(habit, date = todayKey()) { return Boolean(habit?.marks?.[date]); }
  function habitsDone(date = todayKey()) { return habitsActive().filter(h => completedHabit(h, date)).length; }
  function recentDates(days = 7) { return Array.from({ length: days }, (_, index) => addDaysKey(todayKey(), index - (days - 1))); }
  function habitWeekDone(habit) { return recentDates(7).filter(date => completedHabit(habit, date)).length; }
  function todaySuggestionCount() { return habitsDone() < habitsActive().length || !state.discipline.financeChecks?.[todayKey()] ? 1 : 0; }

  function financeSnapshot() {
    const ops = array('operations');
    const key = monthKey(todayKey());
    const monthOps = ops.filter(item => monthKey(operationDate(item)) === key);
    const income = monthOps.filter(item => operationKind(item) === 'income').reduce((s, item) => s + operationAmount(item), 0);
    const expense = monthOps.filter(item => operationKind(item) === 'expense').reduce((s, item) => s + operationAmount(item), 0);
    const balance = number(state.settings.currentBalance);
    const debts = activeDebtsOut();
    const planned = array('purchases').filter(item => item.includeInBudget !== false && monthKey(item.date) === key).reduce((s, item) => s + Math.abs(number(item.amount)), 0);
    return { income, expense, balance, debts, debtTotal: total(debts), planned, available: balance - planned };
  }

  function bestExpensePeriod(){
    const expenses=array('operations').filter(item=>operationKind(item)==='expense');
    const months=[...new Set(expenses.map(item=>monthKey(operationDate(item))).filter(Boolean))].sort().reverse();
    return months[0] || monthKey(todayKey());
  }

  function priorityMeta(value){
    const raw=clean(value).toLowerCase();
    if(/крит|high|важно 1|urgent|сроч/.test(raw)) return {tone:'critical',label:'Критично',order:1};
    if(/выс|high 2|важно|major/.test(raw)) return {tone:'high',label:'Высокий',order:2};
    if(/сред|medium|normal/.test(raw)) return {tone:'medium',label:'Средний',order:3};
    if(/низ|low|later|не сроч/.test(raw)) return {tone:'low',label:'Низкий',order:4};
    return {tone:'medium',label:clean(value)||'Средний',order:3};
  }

  function taskStatusMeta(value){
    const raw=clean(value).toLowerCase();
    if(/вып|done|готов/.test(raw)) return {label:'Выполнено',done:true};
    if(/проц|work|doing/.test(raw)) return {label:'В процессе',done:false};
    return {label:clean(value)||'Запланировано',done:false};
  }

  function categoryData(period = state.settings.v78.categoryPeriod || bestExpensePeriod()) {
    const expenses = array('operations').filter(item => operationKind(item) === 'expense' && monthKey(operationDate(item)) === period);
    const map = new Map();
    expenses.forEach(item => { const key = clean(item.category||item.group||item.area) || 'Другое'; map.set(key, (map.get(key) || 0) + operationAmount(item)); });
    const rows = [...map.entries()].map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
    const sum = rows.reduce((s, row) => s + row.value, 0);
    return { rows, sum, period, count:expenses.length };
  }

  function donutStyle(rows, sum) {
    if (!sum || !rows.length) return 'background:conic-gradient(#eee 0 100%)';
    const colors = ['#8b5cf6','#44c7b1','#ff9b73','#ffc857','#6aa9ff','#f783ac','#7fd1ae','#a6a1ff'];
    let cursor = 0;
    const parts = rows.slice(0, 8).map((row, index) => { const start = cursor; cursor += row.value / sum * 100; return `${colors[index % colors.length]} ${start.toFixed(2)}% ${cursor.toFixed(2)}%`; });
    if (cursor < 100) parts.push(`#edf0f7 ${cursor.toFixed(2)}% 100%`);
    return `background:conic-gradient(${parts.join(',')})`;
  }

      <footer><button class="v82-complete-button ${done?'done':''}" data-v78-action="toggle-habit" data-id="${safe(habit.id)}" type="button"><span>${done?'✓':'✦'}</span><div><b>${done?'Выполнено':'Отметить сегодня'}</b><small>${done?'Нажмите, чтобы отменить':'Сохранить результат дня'}</small></div></button></footer>
    </article>`;
  }

  function habitPage(id) {
    const habit = array('habits').find(item => item.id === id);
    if (!habit) return `<section class="v78-page"><div class="v78-empty-big">Привычка не найдена.<button data-v78-route="habits">Вернуться к привычкам</button></div></section>`;
    const days = /чтен/i.test(habit.name) ? 42 : 28;
    const dates = Array.from({length:days},(_,index)=>addDaysKey(todayKey(), index-(days-1)));
    const completed = dates.filter(date=>completedHabit(habit,date)).length;
    const best = longestStreak(habit);
    const reading = /чтен/i.test(habit.name);
    const sessions = reading ? state.discipline.sessions.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))) : [];
    return `<section class="v78-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="habits" type="button">← Все привычки</button><span>Отдельная страница привычки</span><h1>${safe(habit.icon)} ${safe(habit.name)}</h1><p>${safe(habit.note || 'Последовательное повторение и честная фиксация результата.')}</p></div><div><button class="v80-delete-button" data-v80-action="delete-habit" data-id="${safe(habit.id)}" type="button">Удалить</button><button class="v78-secondary" data-v78-action="edit-habit" data-id="${safe(habit.id)}" type="button">Настроить</button><button class="v78-primary" data-v78-action="toggle-habit" data-id="${safe(habit.id)}" type="button">${completedHabit(habit)?'✓ Сегодня закрыто':'Отметить сегодня'}</button></div></header>
      <section class="v78-kpi-row"><article><small>Выполнено</small><b>${completed}/${days}</b><span>за выбранный период</span></article><article><small>Последние 7 дней</small><b>${habitWeekDone(habit)}/7</b><span>стабильность, не серия</span></article><article><small>Лучшая серия</small><b>${best} дн.</b><span>без обнуления мотивации</span></article><article><small>Цель</small><b>${habit.target} ${safe(habit.unit)}</b><span>${safe(habit.frequency)}</span></article></section>
      ${card(`Карта повторений · ${days} дней`, 'Нажмите на любой день, чтобы изменить отметку.', `<div class="v78-habit-calendar">${dates.map(date=>`<button class="${completedHabit(habit,date)?'done':''} ${date===todayKey()?'today':''}" data-v78-action="toggle-habit-date" data-id="${safe(habit.id)}" data-date="${date}" type="button"><b>${dateAtNoon(date).getDate()}</b><small>${dateAtNoon(date).toLocaleDateString('ru-RU',{month:'short'})}</small></button>`).join('')}</div>`, 'v78-habit-calendar-card')}
      <section class="v78-two-cols">${reading ? readingDetailCard(habit, sessions) : habitNotesCard(habit)}${wishlistCard()}</section>
    </section>`;
  }

  function longestStreak(habit) {
    const dates = Object.keys(habit.marks || {}).filter(date => habit.marks[date]).sort();
    let best = 0, current = 0, previous = '';
    dates.forEach(date => { if (previous && Math.round((dateAtNoon(date)-dateAtNoon(previous))/DAY)===1) current += 1; else current = 1; best = Math.max(best,current); previous=date; });
    return best;
  }

  function readingDetailCard(habit, sessions) {
    const totalMinutes = sessions.reduce((s,item)=>s+number(item.minutes),0);
    const resistance = sessions.filter(item=>item.resistance!==''&&item.resistance!=null).map(item=>number(item.resistance));
    const avg = resistance.length ? (resistance.reduce((s,v)=>s+v,0)/resistance.length).toFixed(1) : '—';
    return card('Эксперимент: чтение', '42 дня · фактические действия', `<div class="v78-reading-stats"><div><small>Общее время</small><b>${Math.floor(totalMinutes/60)} ч ${totalMinutes%60} мин</b></div><div><small>Среднее сопротивление</small><b>${avg}/10</b></div><div><small>Сессий</small><b>${sessions.length}</b></div></div><div class="v78-session-list">${sessions.slice(0,6).map(item=>`<div><i>${item.mode==='minimum'?'5':'20'}</i><span><b>${formatShort(item.date)} · ${number(item.minutes)} мин</b><small>${safe(item.note||'Без заметки')}</small></span></div>`).join('') || '<div class="v78-empty">Первая сессия появится после отметки.</div>'}</div>`, 'v78-reading-detail');
  }

  }

  function financeOperationsPage() {
    const all = array('operations').slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')) || String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
    let filtered = all.filter(item => operationType === 'all' || operationKind(item) === operationType);
    if (operationQuery) {
      const q = operationQuery.toLowerCase();
      filtered = filtered.filter(item => [item.date,item.type,item.amount,item.category,item.account,item.note,item.incomeSource].some(value=>String(value||'').toLowerCase().includes(q)));
    }
    const pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    operationPage = Math.min(operationPage, pages);
    const start = (operationPage - 1) * PAGE_SIZE;
    const visible = filtered.slice(start, start + PAGE_SIZE);
    const categories=[...new Map(filtered.filter(item=>operationKind(item)==='expense').map(item=>[clean(item.category)||'Другое',0])).keys()];
    const catStats=categoryData(state.settings.v78.categoryPeriod || bestExpensePeriod());
    state.settings.v78.operationPage = operationPage;
    state.settings.v78.operationType = operationType;
    return `<section class="v78-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="finance" type="button">← Финансы</button><span>Папка финансов</span><h1>Операции</h1><p>Полный список без обрезания. На одной странице отображается ${PAGE_SIZE} операций.</p></div><div><button class="v78-secondary" data-v81-action="open-category-editor" type="button">Категории CSV</button><button class="v78-secondary" data-v78-action="export-csv" data-scope="filtered" type="button">⇩ Экспорт списка</button><button class="v78-primary" data-v79-action="open-record-form" data-type="operation" type="button">＋ Операция</button></div></header>
      <section class="v78-operation-toolbar"><div class="v78-segment">${[['all','Все'],['income','Доходы'],['expense','Расходы']].map(([key,label])=>`<button class="${operationType===key?'active':''}" data-v78-action="operation-type" data-type="${key}" type="button">${label}</button>`).join('')}</div><label>⌕<input data-v78-operation-search value="${safe(operationQuery)}" placeholder="Категория, сумма, комментарий..."></label><span>${filtered.length} ${plural(filtered.length,'операция','операции','операций')}</span></section>
      <section class="v81-category-hint"><div><b>Редактирование категорий после CSV стало понятнее</b><p>Нажми «Категории CSV», чтобы массово переименовать категорию сразу у всей выписки. В строке операции есть кнопка «Категория» для точечного редактирования.</p></div><div class="v81-category-pills">${catStats.rows.slice(0,6).map(row=>`<button data-v81-action="open-category-editor" data-from="${safe(row.name)}" type="button">${safe(row.name)} <small>${Math.round(row.value)}</small></button>`).join('') || '<span>Категории появятся после расходных операций</span>'}</div></section>
      <section class="v78-operation-table"><header><span>Дата</span><span>Тип</span><span>Категория</span><span>Комментарий / счёт</span><span>Сумма</span><span></span></header>${visible.map(operationRow).join('') || '<div class="v78-empty-big">Операций по выбранному фильтру нет.</div>'}</section>
      <footer class="v78-pagination"><span>Страница ${operationPage} из ${pages}</span><div><button data-v78-action="operation-page" data-page="${Math.max(1,operationPage-1)}" ${operationPage===1?'disabled':''} type="button">←</button>${paginationButtons(operationPage,pages).map(page=>`<button class="${page===operationPage?'active':''}" data-v78-action="operation-page" data-page="${page}" type="button">${page}</button>`).join('')}<button data-v78-action="operation-page" data-page="${Math.min(pages,operationPage+1)}" ${operationPage===pages?'disabled':''} type="button">→</button></div></footer>
    </section>`;
  }

  function paginationButtons(current, pages) {
    const set = new Set([1,pages,current-1,current,current+1]);
    return [...set].filter(page=>page>=1&&page<=pages).sort((a,b)=>a-b);
  }

  function operationRow(item) {
    const income = operationKind(item) === 'income';

  function financeAnalyticsPage() {
    const data = categoryData();
    const months = [...new Set(array('operations').map(item=>monthKey(operationDate(item))).filter(Boolean))].sort().reverse();
    const fallbackInfo = (!state.settings.v78.categoryPeriod && data.period!==monthKey(todayKey())) ? `Показан последний месяц с расходами: ${new Date(`${data.period}-01T12:00:00`).toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}.` : '';

      <section class="v78-analysis-hero"><div class="v78-donut large" style="${donutStyle(data.rows,data.sum)}"><span><b>${safe(moneyText(data.sum))}</b><small>расходы</small></span></div><div><h2>Структура расходов</h2><p>${data.rows.length ? 'Категории отсортированы от крупнейшей к меньшей. Нажмите «Редактировать категории», если нужно поправить данные из CSV.' : 'Добавьте расходные операции, чтобы появился анализ.'}</p><div class="v78-analysis-list">${data.rows.map((row,index)=>`<article><i class="c${index}"></i><span><b>${safe(row.name)}</b><small>${safe(moneyText(row.value))}</small></span><em>${data.sum?Math.round(row.value/data.sum*100):0}%</em><u><b style="width:${data.sum?row.value/data.sum*100:0}%"></b></u></article>`).join('')}</div></div></section>
      ${card('Что изменилось по сравнению с предыдущим месяцем', 'Сравнение строится по тем же категориям.', categoryComparison(data.period), 'v78-comparison-card')}
    </section>`;
  }

  function categoryComparison(period) {
    const d = new Date(`${period}-01T12:00:00`); d.setMonth(d.getMonth()-1); const previous = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const currentData = categoryData(period); const prevData = categoryData(previous); const prevMap = new Map(prevData.rows.map(row=>[row.name,row.value]));
    return `<div class="v78-comparison-list">${currentData.rows.slice(0,8).map(row=>{const old=prevMap.get(row.name)||0; const diff=row.value-old; return `<div><span><b>${safe(row.name)}</b><small>было ${safe(moneyText(old))}</small></span><em class="${diff>0?'negative':diff<0?'positive':''}">${diff>0?'+':''}${safe(moneyText(diff))}</em></div>`}).join('') || '<div class="v78-empty">Недостаточно операций для сравнения.</div>'}</div>`;
  }

    return `<section class="v78-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="finance" type="button">← Финансы</button><span>Импорт и выгрузка данных</span><h1>CSV-центр</h1><p>Здесь можно и выгрузить весь список операций, и загрузить банковскую выписку без дублей.</p></div></header>

  function fieldValue(item,key){return safe(item?.[key]??'');}
  function recordFormField(field,item){const [key,label,type,options]=field;const value=fieldValue(item,key);if(type==='goal-select')return `<label class="v79-field"><span>${label}</span><select id="v79_f_${key}"><option value="">Без цели</option>${array('goals').filter(g=>g.status!=='done'&&g.status!=='archived').map(g=>`<option value="${safe(g.id)}" ${String(item?.[key]||'')===g.id?'selected':''}>${safe(g.title)}</option>`).join('')}</select></label>`;if(type==='stage-select'){const goal=array('goals').find(g=>g.id===item?.goalId);return `<label class="v79-field"><span>${label}</span><select id="v79_f_${key}"><option value="">Без этапа</option>${(goal?.stages||[]).map(st=>`<option value="${safe(st.id)}" ${String(item?.[key]||'')===st.id?'selected':''}>${safe(st.title)}</option>`).join('')}</select></label>`;}if(type==='textarea')return `<label class="v79-field span-2"><span>${label}</span><textarea id="v79_f_${key}">${value}</textarea></label>`;if(type==='select')return `<label class="v79-field"><span>${label}</span><select id="v79_f_${key}">${options.map(([v,l])=>`<option value="${safe(v)}" ${String(item?.[key]??'')===v?'selected':''}>${safe(l)}</option>`).join('')}</select></label>`;return `<label class="v79-field"><span>${label}</span><input id="v79_f_${key}" type="${type}" value="${value}"></label>`;}
  function openRecordForm(type,id='',preset={}){const schema=RECORDS[type];if(!schema)return toast('Форма не найдена');const item=id?array(schema.arr).find(x=>x.id===id)||{}:Object.assign({date:todayKey()},preset);openModal(`${id?'Редактировать':'Добавить'}: ${schema.title}`,`<div class="v79-form-grid">${schema.fields.map(f=>recordFormField(f,item)).join('')}</div><div class="v79-modal-actions"><button class="v78-primary" data-v79-action="save-record" data-type="${type}" data-id="${safe(id)}">Сохранить</button>${id?`<button class="v79-danger" data-v79-action="delete-record" data-type="${type}" data-id="${safe(id)}">Удалить</button>`:''}<button data-v78-action="close-modal">Отмена</button></div>`);}
  function saveRecord(type,id,originEl=null){const schema=RECORDS[type];if(!schema)return;const old=id?array(schema.arr).find(x=>x.id===id):null;const item=Object.assign({},old||{id:makeId(),createdAt:nowIso()});schema.fields.forEach(([key,,kind])=>{const el=document.getElementById(`v79_f_${key}`);if(!el)return;item[key]=kind==='number'?number(el.value):clean(el.value);});item.updatedAt=nowIso();if(id)state[schema.arr]=array(schema.arr).map(x=>x.id===id?item:x);else state[schema.arr].unshift(item);save();closeModal();renderPremium();toast(type==='task'&&taskStatusMeta(item.status).done?'Задача сохранена и отмечена как выполненная':'Сохранено'); if(type==='task'&&taskStatusMeta(item.status).done){awardGame(`task:${item.id}:done`,8,2,'discipline',{title:item.title});celebrate(originEl,'✓');}}
  function deleteRecord(type,id){const schema=RECORDS[type];if(!schema)return;const item=array(schema.arr).find(x=>x.id===id);if(!item)return;if(!confirm(`Удалить «${item.title||item.name||item.person||schema.title}»? Копия останется в архиве.`))return;archiveSnapshot(`Удалено: ${item.title||item.name||item.person||schema.title}`,`deleted-${type}`,item);state[schema.arr]=array(schema.arr).filter(x=>x.id!==id);save();closeModal();renderPremium();toast('Удалено, копия сохранена в архиве');}

  function bookStatusMeta(value){const raw=clean(value).toLowerCase();if(/finished|прочитан|готов/.test(raw))return {key:'finished',label:'Прочитано',icon:'✓'};if(/reading|читаю|в процессе/.test(raw))return {key:'reading',label:'Читаю',icon:'◉'};if(/paused|пауза/.test(raw))return {key:'paused',label:'На паузе',icon:'Ⅱ'};return {key:'planned',label:'Хочу прочитать',icon:'+'};}
  function bookProgress(book){const total=Math.max(0,number(book.pagesTotal)),current=Math.max(0,number(book.currentPage));if(total>0)return Math.min(100,Math.round(current/total*100));return bookStatusMeta(book.status).key==='finished'?100:0;}

  function bookForecast(book){const sessions=array('bookSessions').filter(x=>x.bookId===book.id&&String(x.date||'')>=addDaysKey(todayKey(),-30));const pages=sessions.reduce((sum,x)=>sum+number(x.pages),0),days=[...new Set(sessions.map(x=>String(x.date||'').slice(0,10)))].length,remaining=Math.max(0,number(book.pagesTotal)-number(book.currentPage));if(!remaining||!pages||!days)return '';const perDay=pages/days;const estimate=Math.max(1,Math.ceil(remaining/perDay));return `Прогноз: ещё ${estimate} ${plural(estimate,'день','дня','дней')} чтения`; }
  function bookStats(){const books=array('books'),reading=books.filter(b=>bookStatusMeta(b.status).key==='reading'),finished=books.filter(b=>bookStatusMeta(b.status).key==='finished');const pages=books.reduce((sum,b)=>sum+Math.max(0,number(b.currentPage)),0);const quotes=books.reduce((sum,b)=>sum+bookQuoteEntries(b).length,0);const minutes=array('bookSessions').reduce((sum,x)=>sum+number(x.minutes),0);return {books,reading,finished,pages,quotes,minutes};}
  function booksPage(){const data=bookStats();const books=data.books.slice().sort((a,b)=>{const statusOrder={reading:0,planned:1,paused:2,finished:3};const sa=statusOrder[bookStatusMeta(a.status).key]??9,sb=statusOrder[bookStatusMeta(b.status).key]??9;return sa-sb||String(b.updatedAt||'').localeCompare(String(a.updatedAt||''));});const latestQuotes=books.flatMap(book=>bookQuoteEntries(book).map(q=>({book,q}))).slice().sort((a,b)=>String(b.q.createdAt||'').localeCompare(String(a.q.createdAt||''))).slice(0,8);return `<section class="v78-page v833-books-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="information">← Информация</button><span>📚 Личная библиотека</span><h1>Книги</h1><p>Фиксируйте прогресс, страницы, цитаты, мысли и итоговую оценку — без отдельного дневника чтения.</p></div><button class="v78-primary" data-v79-action="open-record-form" data-type="book" type="button">＋ Добавить книгу</button></header><section class="v833-book-stats"><article><i>◉</i><span><small>Сейчас читаю</small><b>${data.reading.length}</b></span></article><article><i>✓</i><span><small>Прочитано</small><b>${data.finished.length}</b></span></article><article><i>▤</i><span><small>Страниц отмечено</small><b>${data.pages}</b></span></article><article><i>“</i><span><small>Цитат сохранено</small><b>${data.quotes}</b></span></article><article><i>⏱</i><span><small>Минут чтения</small><b>${data.minutes}</b></span></article></section><section class="v833-books-grid">${books.map(bookCard).join('')||'<div class="v78-empty-big">Добавьте первую книгу и начните фиксировать прогресс.</div>'}</section>${latestQuotes.length?card('Последние цитаты','Сохранённые мысли из всей библиотеки.',`<div class="v833-quotes-feed">${latestQuotes.map(({book,q})=>`<article><blockquote>${safe(q.text||'Цитата')}</blockquote><footer><span><b>${safe(book.title||'Книга')}</b>${q.page?`<small>стр. ${safe(q.page)}</small>`:''}</span><button data-v833-action="open-book-quote" data-id="${safe(boo   async function createVault(){const p=String(document.getElementById('v79_vault_new')?.value||''),r=String(document.getElementById('v79_vault_repeat')?.value||'');if(p.length<10)return toast('Минимум 10 символов');if(p!==r)return toast('Пароли не совпадают');const salt=crypto.getRandomValues(new Uint8Array(16)),key=await vaultKey(p,salt);state.passwordVault=await vaultEncrypt([],key,salt);vaultSession={key,entries:[],unlocked:true,revealed:new Set(),lastActivity:Date.now()};save();renderPremium();}

  function gameLevelData(){const xp=number(state.gameLife?.xp);let row=GAME_LEVELS[0];GAME_LEVELS.forEach(item=>{if(xp>=item.xp)row=item;});const max=row.next||row.xp+300;return {...row,progress:Math.max(0,Math.min(100,Math.round((xp-row.xp)/(max-row.xp)*100))),remaining:Math.max(0,max-xp)};}
  function gameTodayXp(){return state.gameLife.logs.filter(log=>String(log.date||'').slice(0,10)===todayKey()).reduce((sum,log)=>sum+number(log.xp),0);}
  function awardGame(source,xp=0,coins=0,skill='discipline',meta={}){ensureData();if(state.gameLife.logs.some(log=>log.source===source))return false;const cap=number(state.settings.v83.dailyXpCap)||40;const allowed=Math.max(0,Math.min(number(xp),cap-gameTodayXp()));if(allowed<=0&&coins<=0)return false;state.gameLife.xp+=allowed;state.gameLife.coins+=Math.max(0,number(coins));state.gameLife.skillXp[skill]=number(state.gameLife.skillXp[skill])+allowed;state.gameLife.logs.unshift({id:makeId(),source,date:todayKey(),xp:allowed,coins:Math.max(0,number(coins)),skill,title:meta.title||'Действие',createdAt:nowIso()});state.gameLife.logs=state.gameLife.logs.slice(0,1000);save();return true;}
  function gameQuestData(){
    const quests=[];
    const checkin=dailyCheckInToday();
    quests.push({id:'daily-checkin',icon:'☀️',title:'Утренний check-in — 30 секунд',text:checkin?`Главное сегодня: ${checkin.focus||'сохранено'}`:'Состояние, главное действие и то, что нельзя забыть.',xp:3,coins:1,action:'daily-checkin',done:Boolean(checkin)});
    const undone=habitsActive().filter(h=>!completedHabit(h));
    if(undone[0])quests.push({id:`habit-${undone[0].id}`,icon:undone[0].icon||'✓',title:`Главный квест: ${undone[0].name}`,text:`Полная версия: ${undone[0].target} ${undone[0].unit}. Минимальная — начать на 5 минут.`,xp:10,coins:2,route:`habit-${encodeURIComponent(undone[0].id)}`,done:false});
    else quests.push({id:'habits-done',icon:'🏆',title:'Привычки на сегодня закрыты',text:'Ты сохранил ритм. Не нужно добавлять новые обязательства.',xp:0,coins:0,route:'habits',done:true});
    const financeDone=Boolean(state.discipline.financeChecks?.[todayKey()]);
    quests.push({id:'finance-check',icon:'💳',title:'Финансовая сверка — 2 минуты',text:'Посмотреть баланс, обязательства и последние операции.',xp:5,coins:1,action:'finance-check',done:financeDone});
    const captured=state.gameLife.captures.some(c=>String(c.date||'').slice(0,10)===todayKey());
    quests.push({id:'capture',icon:'✍️',title:'Зафиксировать одну мысль',text:'Любая мысль, эмоция, задача или наблюдение за 30 секунд.',xp:3,coins:1,action:'quick-capture',done:captured});
    const goal=array('goals').find(g=>g.status==='active'&&g.nextAction);
    if(goal)quests.push({id:`goal-${goal.id}`,icon:'🎯',title:`Кампания: ${goal.title}`,text:goal.nextAction,xp:8,coins:2,route:`goal-${encodeURIComponent(goal.id)}`,done:false});
    if(new Date().getHours()>=number(state.settings.v85.eveningPromptHour||19)){
      const evening=eveningReviewToday();quests.push({id:'evening-review',icon:'🌙',title:'Завершить день',text:evening?'Итог дня сохранён':'Автоматический итог и один вопрос о том, что сработало.',xp:5,coins:2,action:'evening-review',done:Boolean(evening)});
    }
    return quests;
  }

  function gameLifeTodayStrip(){const lv=gameLevelData(),quests=gameQuestData(),done=quests.filter(q=>q.done).length,queue=reviewQueueCount();return `<section class="v83-today-game"><div class="v83-player-mini"><div class="v83-player-level"><span>${lv.level}</span></div><div><small>GAMELIFE · ${safe(lv.name)}</small><h2>${safe(profile().name||'Алексей')}, сегодня ${done}/${quests.length} квестов</h2><div class="v83-xp-line"><i style="width:${lv.progress}%"></i></div></div><div class="v83-mini-money"><b>${number(state.gameLife.xp)} XP</b><span>${number(state.gameLife.coins)} HP</span></div></div><div class="v83-strip-actions"><button data-v83-action="quick-capture" type="button">＋ Зафиксировать</button>${queue?`<button data-v78-route="review-queue" type="button">Разобрать ${queue}</button>`:''}<button data-v78-route="gamelife" type="button">Открыть GameLife →</button></div></section>`;}

  function skillCard(key,icon,title){const value=number(state.gameLife.skillXp[key]);const level=Math.max(1,Math.floor(value/60)+1);const progress=value%60/60*100;return `<article><i>${icon}</i><span><small>${title}</small><b>Уровень ${level}</b><u><em style="width:${progress}%"></em></u></span><strong>${value} XP</strong></article>`;}
  function rewardVisual(reward){const image=normalizedUrl(reward.imageUrl||'');return image?`<span class="v85-reward-image"><img src="${safe(image)}" alt="${safe(reward.title)}" loading="lazy" onerror="this.parentElement.textContent='${safe(reward.icon||'🎁')}'"></span>`:`<i>${safe(reward.icon||'🎁')}</i>`;}
  function rewardCooldownRemaining(reward){if(!reward.cooldownDays||!reward.lastRedeemedAt)return 0;const ready=dateAtNoon(addDaysKey(String(reward.lastRedeemedAt).slice(0,10),reward.cooldownDays));return Math.max(0,Math.ceil((ready-new Date())/DAY));}
  function rewardAvailability(reward){const lv=gameLevelData(),cooldown=rewardCooldownRemaining(reward);if(reward.archived||reward.active===false)return {ok:false,text:'Неактивна'};if(number(reward.minLevel)>lv.level)return {ok:false,text:`Нужен LV ${reward.minLevel}`};if(reward.limit&&number(reward.redeemedCount)>=number(reward.limit))return {ok:false,text:'Лимит исчерпан'};if(cooldown)return {ok:false,text:`Через ${cooldown} дн.`};if(number(state.gameLife.coins)<number(reward.cost))return {ok:false,text:'Не хватает HP'};return {ok:true,text:'Получить'};}
  function hpJournal(limit=14){return state.gameLife.logs.filter(log=>number(log.coins)!==0).slice(0,limit);}
  function gameLifePage(){const lv=gameLevelData(),quests=gameQuestData(),logs=hpJournal(),achievements=achievementCards(),queue=reviewQueueCount(),automation=goalAutomationItems();return `<section class="v78-page v83-game-page v85-game-page"><header class="v78-page-head"><div><span>Life simulator без обнуления прогресса</span><h1>GameLife</h1><p>XP показывает развитие, HP тратится на реальные награды, а ежедневные и недельные ритуалы удерживают систему в движении.</p></div><div><button class="v78-secondary" data-v78-route="review-queue" type="button">◇ Разобрать ${queue}</button><button class="v78-primary" data-v83-action="quick-capture" type="button">＋ Зафиксировать за 30 секунд</button></div></header><section class="v83-player-hero"><div class="v83-avatar-core">${avatarHtml('xl')}<span>LV ${lv.level}</span></div><div><small>ТЕКУЩИЙ УРОВЕНЬ</small><h2>${safe(lv.name)}</h2><p>До следующего уровня осталось ${lv.remaining} XP. HP можно обменивать только на выбранные тобой награды.</p><div class="v83-level-progress"><i style="width:${lv.progress}%"></i></div><footer><b>${number(state.gameLife.xp)} XP</b><span>${number(state.gameLife.coins)} HP</span><em>Сегодня +${gameTodayXp()} XP</em></footer></div><div class="v83-map-orb"><i></i><b>✦</b></div></section><section class="v85-routine-grid">${dailyRoutineCards()}</section><section class="v83-game-grid"><div class="v83-game-main">${card('Квесты дня','Один главный и несколько коротких дополнительных.',`<div class="v83-quests">${quests.map(q=>`<article class="${q.done?'done':''}"><i>${q.icon}</i><span><b>${safe(q.title)}</b><small>${safe(q.text)}</small><em>+${q.xp} XP · +${q.coins} HP</em></span>${q.done?'<strong>✓</strong>':q.action?`<button data-v85-action="${q.action}">${q.action==='quick-capture'?'Записать':'Выполнить'}</button>`:`<button data-v78-route="${q.route}">Открыть</button>`}</article>`).join('')}</div>`,'v83-quest-card')}${card('Характеристики персонажа','Дисциплина, финансы, знания, энергия и осознанность.',`<div class="v83-skills">${skillCard('discipline','🛡️','Дисциплина')}${skillCard('finance','💰','Финансы')}${skillCard('knowledge','📚','Знания')}${skillCard('energy','⚡','Энергия')}${skillCard('awareness','🧠','Осознанность')}</div>`,'v83-skills-card')}${automation.length?card('Автоматизация целей',`${automation.length} ${plural(automation.length,'подсказка','подсказки','подсказок')}`,goalAutomationHtml(automation),'v85-goal-automation-card'):''}</div><aside class="v83-game-side">${card('Магазин наград',`${number(state.gameLife.coins)} HP`, `<div class="v83-rewards v85-rewards">${state.gameLife.rewards.filter(r=>!r.archived).map(r=>{const a=rewardAvailability(r);return `<article>${rewardVisual(r)}<span><b>${safe(r.title)}</b><small>${number(r.cost)} HP · ${safe(r.category||'Другое')}</small>${r.description?`<em>${safe(r.description)}</em>`:''}</span><div class="v85-reward-actions"><button data-v83-action="redeem-reward" data-id="${safe(r.id)}" ${a.ok?'':'disabled'}>${safe(a.text)}</button><button class="ghost" data-v85-action="edit-reward" data-id="${safe(r.id)}">✎</button><button class="ghost danger" data-v85-action="delete-reward" data-id="${safe(r.id)}">×</button></div></article>`}).join('')||'<p class="v78-empty">Добавьте первую награду.</p>'}</div><button class="v78-link-button" data-v83-action="add-reward">＋ Своя награда</button>`,'v83-reward-card')}${card('Достижения',`${state.gameLife.achievements.length} открыто`, `<div class="v85-achievements">${achievements}</div>`,'v85-achievements-card')}${card('Журнал HP','Каждое начисление и списание объяснено.',`<div class="v83-game-log">${logs.map(log=>`<div><i>${number(log.coins)<0?'−':'+'}</i><span><b>${safe(log.title)}</b><small>${formatShort(log.date)} · ${number(log.xp)?`${number(log.xp)>0?'+':''}${number(log.xp)} XP · `:''}${number(log.coins)>0?'+':''}${number(log.coins)} HP</small></span><em>${safe(log.skill||'game')}</em></div>`).join('')||'<p class="v78-empty">История HP появится после первого действия.</p>'}</div>`,'v83-log-card')}</aside></section></section>`;}
  function openGameCapture(){openModal('Зафиксировать за 30 секунд',`<div class="v83-capture"><p>Не нужно заранее решать, в какую папку это положить. Выбери тип и напиши хотя бы одну строку.</p><div class="v83-capture-types">${[['thought','💭','Мысль'],['emotion','❤️','Эмоция'],['task','✓','Задача'],['idea','💡','Идея'],['expense','₽','Расход'],['event','▦','Событие']].map(([v,i,l],idx)=>`<label><input type="radio" name="v83_capture_type" value="${v}" ${idx===0?'checked':''}><span><i>${i}</i>${l}</span></label>`).join('')}</div><label class="v79-field"><span>Что сейчас важно не потерять?</span><textarea id="v83_capture_text" placeholder="Напиши первое, что приходит в голову…"></textarea></label><div class="v79-form-grid"><label class="v79-field"><span>Сумма, если это расход</span><input id="v83_capture_amount" type="number" step="0.01" placeholder="0"></label><label class="v79-field"><span>Следующий шаг, необязательно</span><input id="v83_capture_next" placeholder="Что сделать дальше?"></label></div></div><div class="v79-modal-actions"><button class="v78-primary" data-v83-action="save-capture">Сохранить и получить XP</button><button data-v78-action="close-modal">Отмена</button></div>`);setTimeout(()=>document.getElementById('v83_capture_text')?.focus(),40);}
  function saveGameCapture(originEl=null){const type=document.querySelector('input[name="v83_capture_type"]:checked')?.value||'thought',text=clean(document.getElementById('v83_capture_text')?.value),next=clean(document.getElementById('v83_capture_next')?.value),amount=number(document.getElementById('v83_capture_amount')?.value);if(!text)return toast('Напиши хотя бы одну строку');const entry={id:makeId(),date:todayKey(),type,text,next,amount,createdAt:nowIso()};state.gameLife.captures.unshift(entry);if(type==='task')state.tasks.unshift({id:makeId(),title:text,date:todayKey(),status:'planned',priority:'medium',note:next,createdAt:nowIso()});else if(type==='idea')state.ideas.unshift({id:makeId(),title:text.slice(0,70),date:todayKey(),text:[text,next].filter(Boolean).join('\n'),createdAt:nowIso()});else if(type==='expense')state.operations.unshift({id:makeId(),date:todayKey(),type:'expense',amount:Math.abs(amount),category:'Быстрая запись',note:text,createdAt:nowIso()});else state.inbox.unshift({id:makeId(),title:type==='emotion'?'Эмоция':type==='event'?'Событие':'Быстрая запись',date:todayKey(),text:[text,next].filter(Boolean).join('\n'),captureType:type,createdAt:nowIso()});awardGame(`capture:${entry.id}`,3,1,type==='expense'?'finance':type==='thought'||type==='emotion'?'awareness':'discipline',{title:'Быстрая фиксация'});syncAchievements();save();closeModal();renderPremium();toast('Запись сохранена');celebrate(originEl,'✦');}
  function openRewardForm(id=''){const reward=state.gameLife.rewards.find(r=>r.id===id)||{};openModal(id?'Редактировать награду':'Своя награда',`<div class="v79-form-grid"><label class="v79-field"><span>Эмодзи / короткая иконка</span><input id="v83_reward_icon" value="${safe(reward.icon||'🎁')}"></label><label class="v79-field"><span>URL картинки</span><input id="v85_reward_image" type="url" value="${safe(reward.imageUrl||'')}" placeholder="https://..."></label><label class="v79-field span-2"><span>Название награды</span><input id="v83_reward_title" value="${safe(reward.title||'')}" placeholder="Например: вечер без дел"></label><label class="v79-field"><span>Стоимость в HP</span><input id="v83_reward_cost" type="number" min="1" value="${number(reward.cost)||50}"></label><label class="v79-field"><span>Категория</span><input id="v85_reward_category" value="${safe(reward.category||'Отдых')}" placeholder="Отдых, еда, покупка"></label><label class="v79-field"><span>Минимальный уровень</span><input id="v85_reward_level" type="number" min="1" value="${number(reward.minLevel)||1}"></label><label class="v79-field"><span>Лимит получений, 0 — без лимита</span><input id="v85_reward_limit" type="number" min="0" value="${number(reward.limit)}"></label><label class="v79-field"><span>Пауза между получениями, дней</span><input id="v85_reward_cooldown" type="number" min="0" value="${number(reward.cooldownDays)}"></label><label class="v79-field"><span>Статус</span><select id="v85_reward_active"><option value="1" ${reward.active!==false?'selected':''}>Активна</option><option value="0" ${reward.active===false?'selected':''}>Выключена</option></select></label><label class="v79-field span-2"><span>Описание</span><textarea id="v85_reward_description" placeholder="Когда и как использовать награду">${safe(reward.description||'')}</textarea></label></div><div class="v79-modal-actions"><button class="v78-primary" data-v83-action="save-reward" data-id="${safe(id)}">Сохранить</button><button data-v78-action="close-modal">Отмена</button></div>`);}
  function saveReward(id=''){const title=clean(document.getElementById('v83_reward_title')?.value),cost=Math.max(1,number(document.getElementById('v83_reward_cost')?.value)),icon=clean(document.getElementById('v83_reward_icon')?.value)||'🎁';if(!title)return toast('Укажите награду');const old=state.gameLife.rewards.find(r=>r.id===id);const reward={...old,id:id||makeId(),title,cost,icon,imageUrl:clean(document.getElementById('v85_reward_image')?.value),description:clean(document.getElementById('v85_reward_description')?.value),category:clean(document.getElementById('v85_reward_category')?.value)||'Другое',minLevel:Math.max(1,number(document.getElementById('v85_reward_level')?.value)||1),limit:Math.max(0,number(document.getElementById('v85_reward_limit')?.value)),cooldownDays:Math.max(0,number(document.getElementById('v85_reward_cooldown')?.value)),active:String(document.getElementById('v85_reward_active')?.value)!=='0',redeemedCount:number(old?.redeemedCount),lastRedeemedAt:old?.lastRedeemedAt||'',createdAt:old?.createdAt||nowIso(),updatedAt:nowIso()};state.gameLife.rewards=old?state.gameLife.rewards.map(r=>r.id===id?reward:r):[reward,...state.gameLife.rewards];save();closeModal();renderPremium();toast('Награда сохранена');}
  function deleteReward(id){const reward=state.gameLife.rewards.find(r=>r.id===id);if(!reward)return;if(!confirm(`Удалить награду «${reward.title}»? История получений останется в журнале HP.`))return;archiveSnapshot(`Удалённая награда: ${reward.title}`,'deleted-reward',reward);state.gameLife.rewards=state.gameLife.rewards.filter(r=>r.id!==id);save();renderPremium();toast('Награда удалена, копия сохранена в архиве');}
  function redeemReward(id,originEl=null){const reward=state.gameLife.rewards.find(r=>r.id===id);if(!reward)return;const availability=rewardAvailability(reward);if(!availability.ok)return toast(availability.text);if(!confirm(`Обменять ${reward.cost} HP на «${reward.title}»?`))return;state.gameLife.coins-=number(reward.cost);reward.redeemedCount=number(reward.redeemedCount)+1;reward.lastRedeemedAt=nowIso();reward.updatedAt=nowIso();state.gameLife.logs.unshift({id:makeId(),source:`reward:${makeId()}`,date:todayKey(),xp:0,coins:-number(reward.cost),skill:'reward',title:`Награда: ${reward.title}`,createdAt:nowIso()});syncAchievements();save();renderPremium();toast('Награда получена — используй её без чувства вины');celebrate(originEl,'🎁');}

  function goalsPage(){const active=array('goals').filter(g=>g.status!=='archived'&&g.status!=='done'),done=array('goals').filter(g=>g.status==='done'),automation=goalAutomationItems();return `<section class="v78-page v83-goals-page"><header class="v78-page-head"><div><span>Цели как игровые кампании</span><h1>Цели</h1><p>Каждая цель обязана отвечать на вопрос: что конкретно сделать следующим шагом за 5–20 минут?</p></div><button class="v78-primary" data-v83-action="goal-wizard">＋ Создать цель с мастером</button></header>${automation.length?card('Цели, которым нужна помощь',`${automation.length} автоматических подсказок`,goalAutomationHtml(automation),'v85-goal-automation-card'):''}<section class="v83-goal-principles"><article><i>1</i><span><b>Результат</b><small>Что должно конкретно измениться?</small></span></article><article><i>2</i><span><b>Этапы</b><small>3–5 понятных контрольных точек.</small></span></article><article><i>3</i><span><b>Следующий шаг</b><small>Физическое действие максимум на 20 минут.</small></span></article></section><section class="v83-goal-grid">${active.map(goalCard).join('')||'<div class="v78-empty-big">Активных кампаний пока нет. Создай первую цель через мастер.</div>'}</section>${done.length?card('Завершённые кампании',`${done.length} целей`, `<div class="v83-finished-goals">${done.map(g=>`<article><button data-v78-route="goal-${encodeURIComponent(g.id)}" type="button"><i>🏆</i><span><b>${safe(g.title)}</b><small>${safe(formatDate(g.due))}</small></span><em>100%</em></button><button class="v833-goal-delete" data-v83-action="delete-goal" data-id="${safe(g.id)}" type="button">Удалить</button></article>`).join('')}</div>`,'v83-finished-card'):''}</section>`;}
  function goalTypeLabel(type){
    const key=clean(type||'result').toLowerCase();
    if(key==='process')return 'Цель-процесс';
    if(key==='maintenance')return 'Цель-поддержание';

  function goalCard(goal){const progress=goalProgress(goal),next=goal.nextAction||'Определите следующий физический шаг';return `<article class="v83-goal-card"><header><span>${goal.type==='process'?'🔁':goal.type==='maintenance'?'🛡️':'🎯'}</span><div><small>${goalTypeLabel(goal.type)}</small><h2>${safe(goal.title)}</h2></div><em>${progress}%</em></header><div class="v83-goal-progress"><i style="width:${progress}%"></i></div><p>${safe(goal.why||'Причина пока не указана.')}</p><div class="v83-next-action"><small>СЛЕДУЮЩИЙ ШАГ · ${number(goal.actionMinutes)||15} МИН</small><b>${safe(next)}</b></div><footer><span>${goal.due?`до ${formatShort(goal.due)}`:'без жёсткого срока'}</span><div class="v833-goal-card-actions"><button class="v833-goal-delete" data-v83-action="delete-goal" data-id="${safe(goal.id)}" type="button" title="Удалить цель">Удалить</button><button data-v78-route="goal-${encodeURIComponent(goal.id)}" type="button">Открыть кампанию →</button></div></footer></article>`;}

  function openGoalWizard(id=''){const goal=array('goals').find(g=>g.id===id);goalWizardStep=0;goalWizardDraft=goal?coreClone(goal):{id:'',title:'',type:'result',why:'',metric:'',target:0,current:0,unit:'',due:'',currentPoint:'',stages:[],nextAction:'',actionMinutes:15,status:'active'};renderGoalWizard();}

  function collectGoalWizard(){const get=id=>document.getElementById(id);if(get('v83_goal_title'))goalWizardDraft.title=clean(get('v83_goal_title').value);if(get('v83_goal_type'))goalWizardDraft.type=clean(get('v83_goal_type').value);if(get('v83_goal_why'))goalWizardDraft.why=clean(get('v83_goal_why').value);if(get('v83_goal_metric'))goalWizardDraft.metric=clean(get('v83_goal_metric').value);if(get('v83_goal_current'))goalWizardDraft.current=number(get('v83_goal_current').value);if(get('v83_goal_target'))goalWizardDraft.target=number(get('v83_goal_target').value);if(get('v83_goal_unit'))goalWizardDraft.unit=clean(get('v83_goal_unit').value);if(get('v83_goal_due'))goalWizardDraft.due=clean(get('v83_goal_due').value);if(get('v83_goal_current_point'))goalWizardDraft.currentPoint=clean(get('v83_goal_current_point').value);if(get('v83_goal_stages')){const old=goalWizardDraft.stages||[];goalWizardDraft.stages=String(get('v83_goal_stages').value||'').split('\n').map(x=>clean(x.replace(/^\d+[.)]\s*/,''))).filter(Boolean).map((title,index)=>({id:old[index]?.id||makeId(),title,done:Boolean(old[index]?.done),order:index}));}if(get('v83_goal_next'))goalWizardDraft.nextAction=clean(get('v83_goal_next').value);if(get('v83_goal_minutes'))goalWizardDraft.actionMinutes=Math.max(5,number(get('v83_goal_minutes').value)||15);}

  function saveGoalWizard(originEl=null){collectGoalWizard();if(!goalWizardDraft.title||!goalWizardDraft.nextAction)return toast('Нужны название и следующий шаг');const old=array('goals').find(g=>g.id===goalWizardDraft.id);const goal={...old,...goalWizardDraft,id:goalWizardDraft.id||makeId(),date:goalWizardDraft.due,status:goalWizardDraft.status||'active',createdAt:old?.createdAt||nowIso(),updatedAt:nowIso(),lastActivityAt:nowIso()};state.goals=old?array('goals').map(g=>g.id===goal.id?goal:g):[goal,...array('goals')];awardGame(`goal-created:${goal.id}`,5,1,'discipline',{title:`Создана цель: ${goal.title}`});save();closeModal();navigate(`goal-${encodeURIComponent(goal.id)}`);celebrate(originEl,'🎯');}

  function deleteGoal(id){const goal=array('goals').find(g=>g.id===id);if(!goal)return;const linked=array('tasks').filter(t=>t.goalId===id);if(!confirm(`Удалить цель «${goal.title}»? Копия сохранится в архиве.${linked.length?` Связь будет снята у ${linked.length} задач.`:''}`))return;archiveSnapshot(`Удалённая цель: ${goal.title}`,'deleted-goal',Object.assign({},goal,{linkedTasks:linked}));state.goals=array('goals').filter(g=>g.id!==id);state.tasks=array('tasks').map(task=>task.goalId===id?Object.assign({},task,{goalId:'',stageId:'',updatedAt:nowIso()}):task);save();navigate('goals');toast('Цель удалена, копия сохранена в архиве');}

  function customPage(route) {
    const normalized = LEGACY_ALIASES[route] || route;
    if (normalized === 'today') return todayPage();
    if (normalized === 'gamelife') return gameLifePage();
    if (normalized === 'review-queue') return reviewQueuePage();
    if (normalized === 'goals') return goalsPage();
    if (normalized.startsWith('goal-')) return goalPage(decodeURIComponent(normalized.slice(5)));
    if (normalized === 'habits') return habitsPage();
    if (normalized === 'information') return informationPage();
    if (normalized === 'finance') return financePage();
    if (normalized === 'finance-operations') return financeOperationsPage();
    if (normalized === 'finance-analytics') return financeAnalyticsPage();
    if (normalized === 'finance-export') return financeExportPage();
    if (normalized === 'debts') return debtsPage();
    if (normalized === 'profile') return profilePage();
    if (normalized === 'habit-wishlist') return wishlistPage();
    if (normalized === 'calendar') return calendarPage();
    if (normalized === 'archive') return archivePage();
    if (normalized === 'coach') return coachPage();
    if (normalized === 'system') return systemPage();
    if (normalized === 'subconscious') return subconsciousPage();
    if (normalized === 'people') return peoplePage();
    if (normalized === 'polina') return polinaPage();
    if (normalized === 'passwords') return passwordsPage();
    if (normalized === 'books') return booksPage();
    if (ROUTE_RECORD[normalized]) return genericRecordPage(normalized);
    if (normalized.startsWith('habit-')) return habitPage(decodeURIComponent(normalized.slice(6)));
    return todayPage();
  }

  function isCustom(route) { const normalized = LEGACY_ALIASES[route] || route; return CUSTOM_ROUTES.has(route) || CUSTOM_ROUTES.has(normalized) || normalized.startsWith('habit-') || normalized.startsWith('goal-'); }

  function renderPremium() {
    clearTimeout(renderTimer);

    if(syncAchievements()) setTimeout(()=>save(),0);
    const route = routeNow();

  function afterRender() {
    setBuild();
    document.body.classList.remove('v80-booting','v79-booting','v78-booting','v70-booting','v67-theme-dark');
    document.documentElement.className='v79-light';
    document.documentElement.style.colorScheme='light';

  function navigate(route, options = {}) {
    const target = LEGACY_ALIASES[route] || route || 'today';
    if (options.filter) operationType = options.filter;
    try { history.pushState(null,'',`#${encodeURIComponent(target)}`); } catch(error) { location.hash=target; }
    renderPremium();
  }

  function toggleHabit(id, date = todayKey(), force, originEl=null) {
    const habit = array('habits').find(item => item.id === id);
    if (!habit) return;
    habit.marks = habit.marks || {};
    const next = force === undefined ? !habit.marks[date] : Boolean(force);
    habit.marks[date] = next;
    if (/чтен/i.test(habit.name)) syncReadingSession(habit, date, next);
    const rect=originEl?.getBoundingClientRect?.();
    persist(next ? 'Привычка отмечена' : 'Отметка снята');
    renderPremium();
    if(next) celebrate(rect,'✓');
  }

  function syncReadingSession(habit, date, completed) {

  function operationSignature(item){
    const date=String(item?.date||'').slice(0,10);
    const type=operationKind(item);
    const amount=Math.round(Math.abs(number(item?.amount))*100);
    const note=clean(item?.note||'').toLowerCase().replace(/\s+/g,' ');

  function detectCsvDelimiter(text){
    const line=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).find(row=>row.trim())||'';
    const variants=[';','\t',','];
    return variants.map(delimiter=>({delimiter,count:splitCsvRow(line,delimiter).length})).sort((a,b)=>b.count-a.count)[0]?.delimiter||';';
  }
  function splitCsvRow(line,delimiter){
    const result=[];let current='',quoted=false;
    for(let i=0;i<String(line||'').length;i+=1){
      const char=line[i];
      if(char==='"'){
        if(quoted&&line[i+1]==='"'){current+='"';i+=1;}else quoted=!quoted;
      }else if(char===delimiter&&!quoted){result.push(current.trim());current='';}
      else current+=char;
    }
    result.push(current.trim());return result;
  }
  function normalizeCsvHeader(value){return clean(String(value||'')).toLowerCase().replaceAll('ё','е').replace(/[^a-zа-я0-9]+/g,' ');}
  function parseCsvMoney(raw){
    if(raw==null)return 0;
    let value=String(raw).replace(/\u00a0/g,' ').replace(/\s+/g,'').replace(/₽|rub|р\.?/gi,'').replace(/,/g,'.');
    value=value.replace(/[^0-9+\-.]/g,'');
    const parsed=Number(value);return Number.isFinite(parsed)?parsed:0;
  }
  function normalizeCsvDate(raw){
    const value=clean(raw);if(!value)return '';
    if(/^\d{4}-\d{2}-\d{2}/.test(value))return value.slice(0,10);
    const match=value.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);
    if(match){let year=match[3];if(year.length===2)year=`20${year}`;return `${year}-${String(match[2]).padStart(2,'0')}-${String(match[1]).padStart(2,'0')}`;}
    const date=new Date(value);return Number.isFinite(date.getTime())?date.toISOString().slice(0,10):'';
  }
  function importCategorySuggestions(){

  function guessImportCategory(text,type='expense'){
    const value=clean(text).toLowerCase();
    if(type==='income'){
      if(/зарплат|аванс|salary/.test(value))return 'Зарплата';
      if(/возврат|refund|cashback|кэшбэк/.test(value))return 'Возврат';
      if(/перевод|сбп/.test(value))return 'Переводы';
      return 'Прочий доход';
    }
    if(/магнит|пятер|перекрест|лента|ашан|дикси|вкусвилл|самокат|продукт|grocery/.test(value))return 'Продукты';
    if(/кафе|coffee|starbucks|burger|kfc|mcd|ресторан|pizza|пицц|суши/.test(value))return 'Кафе';
    if(/яндекс.?go|uber|taxi|такси/.test(value))return 'Такси';
    if(/метро|транспорт|автобус|tram|bus|ржд/.test(value))return 'Транспорт';
    if(/подпис|spotify|netflix|ivi|кинопоиск|telegram premium|yandex plus/.test(value))return 'Подписки';
    if(/аптек|pharm|стомат|медицин|doctor/.test(value))return 'Здоровье';
    if(/кино|бар|club|steam|playstation|xbox|развлеч/.test(value))return 'Развлечения';
    if(/долг|кредит|займ|loan/.test(value))return 'Долги';
    if(/подар|цветы/.test(value))return 'Подарки';
    if(/авиа|отель|hotel|booking|поезд|travel|trip/.test(value))return 'Путешествия';
    if(/коммун|аренд|жкх|ипотек/.test(value))return 'Жильё';
    if(/инвест|брокер|акци/.test(value))return 'Инвестиции';
    if(/перевод|сбп|между своими/.test(value))return 'Переводы';
    return 'Прочее';
  }
  function parseBankCsvText(text){
    const lines=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).filter(line=>line.trim());
    if(lines.length<2)throw new Error('В CSV-файле не найден список операций');
    const delimiter=detectCsvDelimiter(text);
    const headers=splitCsvRow(lines[0],delimiter).map(normalizeCsvHeader);
    const findIndex=patterns=>headers.findIndex(header=>patterns.some(pattern=>pattern instanceof RegExp?pattern.test(header):header.includes(pattern)));
    const dateIndex=findIndex(['дата операции','дата','date',/transaction date/]);
    const amountIndex=findIndex(['сумма операции','сумма','amount','value']);
    const debitIndex=findIndex(['списание','расход','debit']);
    const creditIndex=findIndex(['зачисление','поступление','доход','credit']);
    const typeIndex=findIndex(['тип операции','тип','type']);
    const categoryIndex=findIndex(['категория','катег','category','mcc']);
    const noteIndex=findIndex(['описание','назначение платежа','комментарий','контрагент','merchant','description','details','note']);
    const accountIndex=findIndex(['счет','карта','account','card']);
    if(dateIndex<0)throw new Error('Не удалось найти колонку с датой');
    if(amountIndex<0&&debitIndex<0&&creditIndex<0)throw new Error('Не удалось найти колонку с суммой');
    const existing=new Set(array('operations').map(operationSignature));
    const inside=new Set();const rows=[];let duplicatesInFile=0,duplicatesExisting=0;
    for(let index=1;index<lines.length;index+=1){
      const values=splitCsvRow(lines[index],delimiter);if(values.every(value=>!clean(value)))continue;
      const date=normalizeCsvDate(values[dateIndex]);if(!date)continue;
      const debit=debitIndex>=0?Math.abs(parseCsvMoney(values[debitIndex])):0;
      const credit=creditIndex>=0?Math.abs(parseCsvMoney(values[creditIndex])):0;
      const signed=amountIndex>=0?parseCsvMoney(values[amountIndex]):0;
      let type='expense',amount=0;
      if(debit||credit){type=credit&&!debit?'income':'expense';amount=credit&&!debit?credit:(debit||credit);}
      else{amount=Math.abs(signed);type=signed>0?'income':'expense';}
      const typeLabel=typeIndex>=0?normalizeCsvHeader(values[typeIndex]):'';
      if(/расход|списание|expense|debit/.test(typeLabel))type='expense';
      if(/доход|зачисление|поступление|income|credit/.test(typeLabel))type='income';
      if(!amount)continue;
      const rawCategory=categoryIndex>=0?clean(values[categoryIndex]):'';
      const note=noteIndex>=0?clean(values[noteIndex]):'';
      const account=accountIndex>=0?clean(values[accountIndex]):'';
      const category=rawCategory||guessImportCategory(`${note} ${account}`,type);
      const operation={id:makeId(),date,type,amount,category,account,note:note||rawCategory,incomeSource:type==='income'?category:'',createdAt:nowIso(),updatedAt:nowIso(),importSource:'bank-csv'};
      const signature=operationSignature(operation);
      if(inside.has(signature)){duplicatesInFile+=1;continue;}
      inside.add(signature);
      if(existing.has(signature)){duplicatesExisting+=1;continue;}
      rows.push(operation);
    }
    return {rows,parsed:lines.length-1,duplicatesInFile,duplicatesExisting};
  }

    }
    const existing=new Set(array('operations').map(operationSignature)),next=[];let skipped=0;
    pendingBankImport.forEach(item=>{if(item._keep===false){skipped+=1;return;}const signature=operationSignature(item);if(existing.has(signature)){skipped+=1;return;}existing.add(signature);delete item._keep;next.push(item);});
    if(!next.length)return toast('Все операции были исключены или уже существуют');
    state.operations=[...next,...array('operations')];save();pendingBankImport=[];closeModal();navigate('finance-operations');toast(`Импортировано ${next.length}. Пропущено ${skipped+pendingBankImportStats.duplicatesInFile+pendingBankImportStats.duplicatesExisting}.`);
  }
  function polinaCycleForecast(){
    const entries=array('polinaDays').filter(item=>item?.date).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
    const starts=entries.filter(item=>item.periodMarker==='start').map(item=>String(item.date).slice(0,10));
    const cycleLengths=[];for(let index=1;index<starts.length;index+=1){const length=Math.round((dateAtNoon(starts[index])-dateAtNoon(starts[index-1]))/DAY);if(length>=20&&length<=45)cycleLengths.push(length);}
    const periodLengths=[];starts.forEach(start=>{const end=entries.find(item=>item.periodMarker==='end'&&String(item.date)>start&&Math.round((dateAtNoon(item.date)-dateAtNoon(start))/DAY)<=12);if(end)periodLengths.push(Math.round((dateAtNoon(end.date)-dateAtNoon(start))/DAY)+1);});
    const avgCycle=cycleLengths.length?Math.round(cycleLengths.reduce((sum,value)=>sum+value,0)/cycleLengths.length):(starts.length?28:0);
    const avgPeriod=periodLengths.length?Math.round(periodLengths.reduce((sum,value)=>sum+value,0)/periodLengths.length):(starts.length?5:0);
    const lastStart=starts.at(-1)||'';const nextStart=lastStart&&avgCycle?addDaysKey(lastStart,avgCycle):'';const nextEnd=nextStart&&avgPeriod?addDaysKey(nextStart,avgPeriod-1):'';
    return {avgCycle,avgPeriod,lastStart,nextStart,nextEnd,cycles:starts.length};
  }

  function exportCsv(scope = 'all') {
    let rows = array('operations').slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));

      if (operationQuery) { const q=operationQuery.toLowerCase(); rows=rows.filter(item=>JSON.stringify(item).toLowerCase().includes(q)); }
    }
    const columns = ['ID','Дата','Тип','Сумма','Категория','Счёт','Источник дохода','Комментарий','Создано'];
    const quote = value => `"${String(value ?? '').replace(/"/g,'""')}"`;
    const csv = '\uFEFF' + [columns.map(quote).join(';'), ...rows.map(item => [item.id,item.date,operationKind(item)==='income'?'Доход':'Расход',operationAmount(item),item.category||'',item.account||'',item.incomeSource||'',item.note||'',item.createdAt||''].map(quote).join(';'))].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `second-brain-operations-${todayKey()}.csv`; link.click(); setTimeout(()=>URL.revokeObjectURL(link.href),1000);

  }

  function searchResults(query) {

      ['notes','Заметки','📝',array('notes')],['ideas','Идеи','💡',array('ideas')],['people','Люди','👥',array('people')],['wishes','Желания','💗',array('wishes')],['books','Книги','📚',array('books')],['documents','Документы','📄',array('documents')],['tasks','Задачи','✓',array('tasks')],['habits','Привычки','◉',array('habits')],['finance-operations','Операции','₽',array('operations')]
    ];

    return `<div class="v78-search-results">${found.slice(0,30).map(({route,label,icon,item})=>`<button data-v78-route="${route}" type="button"><i>${icon}</i><span><b>${safe(item.title||item.name||item.person||item.category||label)}</b><small>${safe(label)} · ${safe((item.text||item.note||item.author||item.date||'').slice(0,80))}</small></span><em>›</em></button>`).join('') || '<p class="v78-empty">Ничего не найдено.</p>'}</div>`;
  }

  <script>
