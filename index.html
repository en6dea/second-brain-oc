@keyframes v81-confetti{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(0)}10%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.15) rotate(var(--rz))}}
.v81-category-hint{display:grid;grid-template-columns:minmax(220px,1fr) minmax(0,1.4fr);gap:16px;padding:18px;border:1px solid rgba(124,86,232,.12);border-radius:22px;background:linear-gradient(135deg,#faf6ff,#fff);box-shadow:var(--v78-shadow);margin-bottom:16px}

.v81-category-hint p{margin:0;color:var(--v78-muted)}
.v81-category-pills,.v81-modal-pills{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.v81-category-pills button,.v81-modal-pills button{min-height:40px;border:1px solid rgba(124,86,232,.14);border-radius:14px;background:#fff;padding:0 14px;color:#6546ce;box-shadow:0 10px 24px rgba(108,86,164,.06)}
.v81-category-pills button small,.v81-modal-pills button small{font-size:10px!important;color:#a596d7;margin-left:5px}
.v81-category-pills .accent{background:linear-gradient(135deg,#8a61ed,#6e4fd8);color:#fff;border-color:transparent}
.v81-help-box{padding:12px 14px;border-radius:14px;background:#f8f5ff;color:#5d5673;line-height:1.55;border:1px solid rgba(124,86,232,.1)}
.v81-row-menu{display:flex!important;flex-wrap:wrap;justify-content:flex-end}
.v81-kanban-legend{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}
.v81-kanban-legend span,.v81-priority{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:0 11px;border-radius:999px;font-size:11px!important;font-weight:600;letter-spacing:.01em}
.v81-kanban-legend .critical,.v81-priority.critical{background:#fff1f2;color:#c33656}
.v81-kanban-legend .high,.v81-priority.high{background:#fff7e8;color:#c8791e}
.v81-kanban-legend .medium,.v81-priority.medium{background:#eef5ff;color:#376dc3}
.v81-kanban-legend .low,.v81-priority.low{background:#eefaf4;color:#26885e}
.v81-kanban-week{display:grid;grid-template-columns:repeat(7,minmax(250px,1fr));gap:14px;overflow:auto;padding-bottom:8px}
.v81-kanban-col{display:flex;flex-direction:column;min-height:540px;border:1px solid rgba(111,92,172,.1);border-radius:24px;background:linear-gradient(180deg,#fbf9ff,#fff);box-shadow:var(--v78-shadow)}
.v81-kanban-col>header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid rgba(111,92,172,.08)}

.v81-kanban-col>header h2{margin:3px 0 0;font-size:23px!important}
.v81-kanban-col>header button{width:38px;height:38px;border:1px solid rgba(124,86,232,.14);border-radius:12px;background:#fff;color:#6f4fd3}
.v81-kanban-stack{display:grid;gap:12px;padding:14px;align-content:start;min-height:100%}
.v81-task-card{border:1px solid rgba(111,92,172,.1);border-left-width:5px;border-radius:18px;background:#fff;padding:14px;display:grid;gap:10px;text-align:left;color:var(--v78-ink);box-shadow:0 12px 26px rgba(94,70,155,.07)}
.v81-task-card.critical{border-left-color:#e95b7f}.v81-task-card.high{border-left-color:#ffb14a}.v81-task-card.medium{border-left-color:#7aa7ff}.v81-task-card.low{border-left-color:#58c994}
.v81-task-card.done{opacity:.82;background:linear-gradient(135deg,#f4fff8,#fff)}
.v81-task-card.done b{text-decoration:line-through;text-decoration-thickness:1.6px}
.v81-task-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.v81-task-top em{font-style:normal;color:#7f7a92;font-size:11px!important}
.v81-task-card b{font-size:15px!important;line-height:1.35}
.v81-task-card small{color:#756f88;font-size:11px!important}
.v81-task-card p{margin:0;color:#5f5d6d;font-size:12px!important;line-height:1.55}
.v81-task-card footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:4px}
.v81-task-card footer span{font-size:11px!important;color:#8a87a0}.v81-task-card footer u{text-decoration:none;color:#7c56e8;font-size:11px!important}
.v81-empty-lane{height:100%;min-height:160px;border:1px dashed rgba(124,86,232,.2);border-radius:18px;display:grid;place-items:center;gap:10px;text-align:center;color:#8f88a4;padding:18px;background:rgba(255,255,255,.7)}

@media(max-width:1180px){.v81-category-hint{grid-template-columns:1fr}.v81-kanban-week{grid-template-columns:repeat(7,minmax(220px,1fr))}}
@media(max-width:760px){.v81-kanban-week{grid-template-columns:1fr}.v81-kanban-col{min-height:auto}.v81-category-hint{padding:14px}.v81-row-menu{justify-content:flex-start}}

/* V81.1 — no-ring habit overview and explicit update marker */
.v81-habit-overview{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:20px;align-items:center;border:1px solid rgba(124,86,232,.12);border-radius:26px;background:linear-gradient(135deg,#fff,#faf6ff 56%,#f2fbff);padding:22px 24px;box-shadow:var(--v78-shadow);position:relative;overflow:hidden}
.v81-habit-overview:after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;right:-85px;top:-105px;background:radial-gradient(circle,#d9cbff 0,#eafaff 45%,transparent 72%);opacity:.65;pointer-events:none}

.v81-habit-score>i{width:43px;height:43px;border-radius:14px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-style:normal;font-size:20px}
.v81-habit-score b{display:block;font-size:25px;line-height:1}.v81-habit-score small{display:block;color:rgba(255,255,255,.82)!important;margin-top:5px}
.v81-habit-overview-copy h2{margin:0 0 6px;font-size:23px!important}.v81-habit-overview-copy p{margin:0;color:var(--v78-muted)}
.v81-habit-overview-copy u{display:block;height:8px;border-radius:99px;background:#ece9f5;overflow:hidden;text-decoration:none;margin-top:13px}.v81-habit-overview-copy u b{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#8b5cf6,#43c8b3)}
.v81-habit-overview-actions{display:flex;gap:9px;position:relative;z-index:1}.v81-habit-overview-actions button{min-height:43px}
.v78-build{font-size:10px!important;background:#6f4fd8!important;color:#fff!important;padding:5px 9px!important;border-radius:999px!important;opacity:.9!important}
@media(max-width:900px){.v81-habit-overview{grid-template-columns:1fr}.v81-habit-score{width:max-content}.v81-habit-overview-actions{justify-content:flex-start}}
@media(max-width:760px){.v81-habit-score{width:100%}.v81-habit-overview-actions{display:grid;grid-template-columns:1fr 1fr}}

/* V82 — SYMMETRIC HABITS, ICON PICKER, GOOGLE-STYLE CALENDAR, SEQUENTIAL COACH */
:root{
  --v82-text:#17192b;
  --v82-muted:#70758a;
  --v82-card:#ffffff;
  --v82-line:rgba(101,82,160,.13);
  --v82-shadow:0 16px 42px rgba(83,62,137,.09);
}
html{font-kerning:normal;text-rendering:optimizeLegibility}
.v78-content,.modal-card{font-feature-settings:"kern" 1,"liga" 1}
.v78-page-head{align-items:flex-end;gap:22px}
.v78-page-head>div:first-child{min-width:0;max-width:900px}
.v78-page-head h1,.v78-card h2,.v78-content h2,.v78-content h3{overflow-wrap:normal;word-break:normal;hyphens:none;line-height:1.16!important}
.v78-page-head h1{font-size:34px!important;font-weight:610!important;letter-spacing:-.025em!important;margin:.12em 0 .22em!important}
.v78-page-head p{max-width:820px;margin:0!important}
.v78-page-head>div:last-child,.v78-page-head>button{flex:0 0 auto}
.v78-primary,.v78-secondary{white-space:nowrap}

/* habits overview */
.v82-habits-page{display:grid;gap:18px}
.v82-habit-overview{display:grid;grid-template-columns:122px minmax(0,1fr) auto;gap:24px;align-items:center;padding:24px;border:1px solid var(--v82-line);border-radius:28px;background:linear-gradient(135deg,#fff 0%,#faf7ff 56%,#f2fbff 100%);box-shadow:var(--v82-shadow)}

.v82-habit-overview h2{margin:7px 0 5px!important;font-size:25px!important}
.v82-habit-overview p{margin:0!important;max-width:640px}
.v82-overview-stats{display:grid;grid-template-columns:repeat(3,108px);gap:10px}
.v82-overview-stats span{min-height:82px;padding:13px;border:1px solid rgba(105,84,164,.10);border-radius:18px;background:rgba(255,255,255,.78);display:grid;align-content:center;box-shadow:0 10px 24px rgba(86,67,132,.05)}
.v82-overview-stats small{font-size:10px!important;color:var(--v82-muted)!important}
.v82-overview-stats b{font-size:22px!important;margin-top:4px}
.v82-habit-grid{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;grid-auto-rows:1fr;gap:16px!important;align-items:stretch}
.v82-habit-card{position:relative;display:grid;grid-template-rows:auto 1fr auto;min-height:244px;height:100%;padding:18px;border:1px solid color-mix(in srgb,var(--habit) 20%,#e8e4f2);border-radius:25px;background:linear-gradient(150deg,color-mix(in srgb,var(--habit) 8%,#fff),#fff 58%);box-shadow:var(--v82-shadow);overflow:hidden;transition:transform .2s ease,box-shadow .2s ease}
.v82-habit-card:hover{transform:translateY(-2px);box-shadow:0 22px 52px rgba(83,62,137,.14)}
.v82-habit-card:before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,var(--habit),color-mix(in srgb,var(--habit) 44%,#fff))}
.v82-habit-card.is-done{background:linear-gradient(150deg,#effbf5,#fff 66%);border-color:#b9ead5}
.v82-habit-card>header{display:grid;grid-template-columns:minmax(0,1fr) 40px;gap:9px;align-items:start}
.v82-habit-main{border:0;background:transparent;color:var(--v82-text);display:grid;grid-template-columns:58px minmax(0,1fr) 18px;gap:13px;align-items:center;text-align:left;padding:0}

.v82-habit-main em{font-style:normal;color:#9284b8;font-size:20px}
.v82-habit-icon{width:56px;height:56px;border-radius:18px;background:color-mix(in srgb,var(--habit) 15%,#fff);display:grid;place-items:center;font-size:25px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.7)}
.v82-habit-settings{width:40px;height:40px;border:1px solid rgba(105,84,164,.12);border-radius:13px;background:#fff;color:#71638e}
.v82-habit-meter{align-self:center;display:grid;grid-template-columns:1fr auto;gap:8px 12px;padding:18px 0 12px;margin-top:8px;border-top:1px solid rgba(105,84,164,.08)}
.v82-habit-meter>div{display:flex;align-items:center;justify-content:space-between;grid-column:1/-1}
.v82-habit-meter>div span,.v82-habit-meter small{font-size:11px!important;color:var(--v82-muted)!important}
.v82-habit-meter>div b{font-size:15px!important}
.v82-habit-meter u{height:8px;border-radius:999px;background:#eceaf2;overflow:hidden;text-decoration:none}
.v82-habit-meter u i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--habit),color-mix(in srgb,var(--habit) 55%,#fff))}
.v82-habit-card footer{padding-top:4px}
.v82-complete-button{width:100%;min-height:58px;border:1px solid rgba(105,84,164,.13);border-radius:17px;background:#fff;color:#58467d;display:grid;grid-template-columns:40px minmax(0,1fr);gap:11px;align-items:center;text-align:left;padding:8px 12px}

.v82-complete-button.done>span{background:#31c88a;color:#fff;box-shadow:0 10px 18px rgba(49,200,138,.23)}

/* icon picker */
.v82-habit-editor{display:grid;grid-template-columns:1fr;gap:15px}
.v82-icon-picker{border:1px solid rgba(105,84,164,.12);border-radius:20px;background:linear-gradient(145deg,#fbf8ff,#fff);padding:15px}

.v82-icon-picker>div{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}

.v82-icon-picker button span{font-size:9.5px!important;white-space:nowrap}
.v82-icon-picker button:hover,.v82-icon-picker button.selected{border-color:#9a78f1;background:#f1eaff;color:#6547ce;box-shadow:0 9px 22px rgba(111,82,196,.12);transform:translateY(-1px)}

/* Google-style calendar */
.v82-calendar-page{display:grid;gap:16px}
.v82-calendar-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 13px;border:1px solid var(--v82-line);border-radius:20px;background:#fff;box-shadow:var(--v82-shadow)}

.v82-calendar-nav strong{margin-left:8px;font-size:16px;font-weight:580;text-transform:capitalize}
.v82-calendar-views{padding:4px;border-radius:14px;background:#f6f3fb}

.v82-google-week{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:auto}
.v82-week-head{display:grid;grid-template-columns:70px repeat(7,minmax(150px,1fr));min-width:1120px;border-bottom:1px solid rgba(105,84,164,.10);background:#fcfbff;position:sticky;top:0;z-index:4}

.v82-week-head>button small{font-size:11px!important;text-transform:capitalize}
.v82-week-head>button b{font-size:22px!important;margin-top:4px}
.v82-week-head>button.today b{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#7c56e8;color:#fff;margin-top:3px}
.v82-week-body{display:grid;grid-template-columns:70px repeat(7,minmax(150px,1fr));min-width:1120px;min-height:690px}
.v82-week-body>aside{display:grid;grid-template-rows:repeat(14,72px);border-right:1px solid rgba(105,84,164,.09);padding-top:8px}
.v82-week-body>aside span{font-size:10px;color:#8d879c;text-align:center;padding-top:3px}
.v82-week-column{position:relative;display:flex;flex-direction:column;gap:8px;padding:10px;border-right:1px solid rgba(105,84,164,.08);background:repeating-linear-gradient(to bottom,transparent 0,transparent 71px,rgba(105,84,164,.06) 72px)}
.v82-column-add{align-self:flex-end;width:30px;height:30px;border:1px solid rgba(105,84,164,.12);border-radius:10px;background:#fff;color:#6f4fd3;opacity:.75}
.v82-week-empty{margin-top:8px;padding:14px;text-align:center;color:#aaa4b7;font-size:11px;border:1px dashed rgba(105,84,164,.13);border-radius:13px;background:rgba(255,255,255,.72)}
.v82-calendar-event{position:relative;border:1px solid rgba(105,84,164,.10);border-left-width:4px;border-radius:14px;background:#fff;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:5px;padding:9px;box-shadow:0 7px 17px rgba(75,56,121,.07)}
.v82-calendar-event.critical{border-left-color:#e75a78;background:#fff6f8}.v82-calendar-event.high{border-left-color:#f2a33b;background:#fffbf2}.v82-calendar-event.medium{border-left-color:#6f9df5;background:#f7faff}.v82-calendar-event.low{border-left-color:#54bd8a;background:#f5fcf8}
.v82-calendar-event.done{opacity:.68}.v82-calendar-event.done b{text-decoration:line-through}
.v82-event-open{min-width:0;border:0;background:transparent;text-align:left;color:#292538;padding:0;display:grid;gap:3px}
.v82-event-open .v82-event-time{font-size:9px;color:#80798f}
.v82-event-open b{font-size:12px!important;line-height:1.28!important;white-space:normal}
.v82-event-open small{font-size:9.5px!important;color:#777084!important}
.v82-event-actions{display:flex;gap:3px;align-self:start}
.v82-event-actions button{width:26px;height:26px;border:1px solid rgba(105,84,164,.10);border-radius:8px;background:rgba(255,255,255,.84);color:#6b50c8;font-size:10px!important;padding:0}
.v82-calendar-event.compact{padding:6px 7px;border-radius:10px}
.v82-calendar-event.compact .v82-event-actions{display:none}
.v82-day-calendar{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:hidden}
.v82-day-calendar>header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid rgba(105,84,164,.09)}

.v82-day-calendar>header button{min-height:40px;border:0;border-radius:13px;background:#7c56e8;color:#fff;padding:0 15px}
.v82-day-timeline{padding:5px 18px 18px}
.v82-time-row{display:grid;grid-template-columns:64px minmax(0,1fr);min-height:72px;border-bottom:1px solid rgba(105,84,164,.08)}
.v82-time-row time{padding-top:9px;font-size:10px;color:#8b8599}

.v82-all-day{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:15px 20px;border-top:1px solid rgba(105,84,164,.08);background:#faf8ff}
.v82-all-day>b{margin-right:6px;font-size:12px}
.v82-month-calendar{border:1px solid var(--v82-line);border-radius:24px;background:#fff;box-shadow:var(--v82-shadow);overflow:hidden}
.v82-month-calendar>header{display:grid;grid-template-columns:repeat(7,1fr);background:#faf8ff;border-bottom:1px solid rgba(105,84,164,.09)}
.v82-month-calendar>header span{padding:12px;text-align:center;font-size:11px;font-weight:600;color:#777184}

/* V83.2 — livelier light design, bank CSV import and Polina forecast */

.v83-today-game{position:relative;overflow:hidden;background:linear-gradient(95deg,#281d72 0%,#5e46ce 52%,#79d7cf 100%)!important;box-shadow:0 26px 65px rgba(83,59,163,.28)!important}

.v85-export-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:16px}

  function ageFromBirth(value) {
    if (!value) return '';
    const birth = dateAtNoon(value);
    const now = new Date();
    let age = now.getFullYear() - birth.getFullYear();
    const m = now.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age -= 1;
    return age >= 0 && age < 130 ? age : '';
  }

  function financeAssistant(period=state.settings.v78.categoryPeriod||bestExpensePeriod()){
    const data=financePeriodData(period),tips=[];const noLimits=financeCategories('expense').filter(row=>number(row.monthlyLimit)<=0).length;
    data.over.forEach(row=>tips.push({tone:'danger',title:`Лимит «${row.name}» превышен`,text:`Потрачено ${moneyText(row.value)} при лимите ${moneyText(row.limit)}. Превышение: ${moneyText(row.value-row.limit)}.`,route:'finance-operations'}));
    data.near.forEach(row=>tips.push({tone:'warning',title:`«${row.name}» — ${row.percent}% лимита`,text:`Осталось ${moneyText(Math.max(0,row.remaining))}. Следующий необязательный расход лучше отложить.`,route:'finance-operations'}));
    if(data.income&&data.expense>data.income)tips.push({tone:'danger',title:'Расходы выше доходов',text:`Отрицательный денежный поток: ${moneyText(Math.abs(data.net))}. Сначала остановите необязательные траты.`,route:'finance-analytics'});
    if(data.income&&data.optional/data.income>.3)tips.push({tone:'warning',title:'Высокая доля необязательных расходов',text:`${Math.round(data.optional/data.income*100)}% дохода ушло на необязательные покупки. Проверьте крупнейшие категории.`,route:'finance-analytics'});
    if(noLimits)tips.push({tone:'info',title:'Не все категории имеют лимит',text:`Без лимита осталось ${noLimits} ${plural(noLimits,'категория','категории','категорий')}. Настройте их, чтобы помощник мог предупреждать заранее.`,action:'categories'});
    if(!tips.length)tips.push({tone:'success',title:'Финансы под контролем',text:`Лимиты не превышены. Чистый денежный поток: ${moneyText(data.net)}.`,route:'finance-analytics'});

  function donutStyle(rows, sum) {
    if (!sum || !rows.length) return 'background:conic-gradient(#eee 0 100%)';
    const colors = ['#8b5cf6','#44c7b1','#ff9b73','#ffc857','#6aa9ff','#f783ac','#7fd1ae','#a6a1ff'];
    let cursor = 0;
    const parts = rows.slice(0, 8).map((row, index) => { const start = cursor; cursor += row.value / sum * 100; return `${colors[index % colors.length]} ${start.toFixed(2)}% ${cursor.toFixed(2)}%`; });
    if (cursor < 100) parts.push(`#edf0f7 ${cursor.toFixed(2)}% 100%`);
    return `background:conic-gradient(${parts.join(',')})`;
  }

    const days = /чтен/i.test(habit.name) ? 42 : 28;
    const dates = Array.from({length:days},(_,index)=>addDaysKey(todayKey(), index-(days-1)));

    const best = longestStreak(habit);

    const sessions = reading ? state.discipline.sessions.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))) : [];
    return `<section class="v78-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="habits" type="button">← Все привычки</button><span>Отдельная страница привычки</span><h1>${safe(habit.icon)} ${safe(habit.name)}</h1><p>${safe(habit.note || 'Последовательное повторение и честная фиксация результата.')}</p></div><div><button class="v80-delete-button" data-v80-action="delete-habit" data-id="${safe(habit.id)}" type="button">Удалить</button><button class="v78-secondary" data-v78-action="edit-habit" data-id="${safe(habit.id)}" type="button">Настроить</button><button class="v78-primary" data-v78-action="toggle-habit" data-id="${safe(habit.id)}" type="button">${completedHabit(habit)?'✓ Сегодня закрыто':'Отметить сегодня'}</button></div></header>
      <section class="v78-kpi-row"><article><small>Выполнено</small><b>${completed}/${days}</b><span>за выбранный период</span></article><article><small>Последние 7 дней</small><b>${habitWeekDone(habit)}/7</b><span>стабильность, не серия</span></article><article><small>Лучшая серия</small><b>${best} дн.</b><span>без обнуления мотивации</span></article><article><small>Цель</small><b>${habit.target} ${safe(habit.unit)}</b><span>${safe(habit.frequency)}</span></article></section>
      ${card(`Карта повторений · ${days} дней`, 'Нажмите на любой день, чтобы изменить отметку.', `<div class="v78-habit-calendar">${dates.map(date=>`<button class="${completedHabit(habit,date)?'done':''} ${date===todayKey()?'today':''}" data-v78-action="toggle-habit-date" data-id="${safe(habit.id)}" data-date="${date}" type="button"><b>${dateAtNoon(date).getDate()}</b><small>${dateAtNoon(date).toLocaleDateString('ru-RU',{month:'short'})}</small></button>`).join('')}</div>`, 'v78-habit-calendar-card')}
      <section class="v78-two-cols">${reading ? readingDetailCard(habit, sessions) : habitNotesCard(habit)}${card('Связанные цели',linkedGoalsForHabit(habit).length?`${linkedGoalsForHabit(habit).length} активных связей`:'Привычка самостоятельна',linkedGoalsForHabit(habit).length?`<div class="v865-linked-goals">${linkedGoalsForHabit(habit).map(goal=>`<button data-v78-route="goal-${encodeURIComponent(goal.id)}" type="button"><i>${goal.type==='process'?'↻':goal.type==='maintenance'?'🛡️':'🎯'}</i><span><b>${safe(goal.title)}</b><small>${goalExecutionLabel(goalExecutionMode(goal))} · ${goalDisplayProgress(goal)}%</small></span><em>›</em></button>`).join('')}</div><button class="v78-link-button" data-v78-action="edit-habit" data-id="${safe(habit.id)}" type="button">Изменить связи →</button>`:`<div class="v865-empty-links"><span>Эта привычка пока не привязана к цели — это нормально.</span><button class="v78-secondary" data-v78-action="edit-habit" data-id="${safe(habit.id)}" type="button">Связать с целью</button></div>`,'v865-habit-goals-card')}</section>
    </section>`;
  }

  function longestStreak(habit) {
    const dates = Object.keys(habit.marks || {}).filter(date => habit.marks[date]).sort();
    let best = 0, current = 0, previous = '';
    dates.forEach(date => { if (previous && Math.round((dateAtNoon(date)-dateAtNoon(previous))/DAY)===1) current += 1; else current = 1; best = Math.max(best,current); previous=date; });
    return best;
  }

  function readingDetailCard(habit, sessions) {
    const totalMinutes = sessions.reduce((s,item)=>s+number(item.minutes),0);
    const resistance = sessions.filter(item=>item.resistance!==''&&item.resistance!=null).map(item=>number(item.resistance));
    const avg = resistance.length ? (resistance.reduce((s,v)=>s+v,0)/resistance.length).toFixed(1) : '—';
    return card('Эксперимент: чтение', '42 дня · фактические действия', `<div class="v78-reading-stats"><div><small>Общее время</small><b>${Math.floor(totalMinutes/60)} ч ${totalMinutes%60} мин</b></div><div><small>Среднее сопротивление</small><b>${avg}/10</b></div><div><small>Сессий</small><b>${sessions.length}</b></div></div><div class="v78-session-list">${sessions.slice(0,6).map(item=>`<div><i>${item.mode==='minimum'?'5':'20'}</i><span><b>${formatShort(item.date)} · ${number(item.minutes)} мин</b><small>${safe(item.note||'Без заметки')}</small></span></div>`).join('') || '<div class="v78-empty">Первая сессия появится после отметки.</div>'}</div>`, 'v78-reading-detail');
  }

  function saveRecord(type,id,originEl=null){
    const schema=RECORDS[type];if(!schema)return;
    const old=id?array(schema.arr).find(x=>x.id===id):null,item=Object.assign({},old||{id:makeId(),createdAt:nowIso()});
    schema.fields.forEach(([key,,kind])=>{const el=document.getElementById(`v79_f_${key}`);if(!el)return;item[key]=kind==='number'?number(el.value):clean(el.value);});
    let limitWarning='';

      item.type=financeCategoryKind(item.type);if(item.category==='__new__'||!item.category)return toast('Выберите категорию');
      const category=registerFinanceCategory(item.category,item.type);
      if(item.type==='income'){item.expenseClass='';if(!item.incomeSource)item.incomeSource=item.category;}
      else{
        item.expenseClass=expenseClass(item.expenseClass||category?.defaultExpenseClass||'optional');
        const limit=Math.max(0,number(category?.monthlyLimit)),period=monthKey(item.date||todayKey()),projected=categorySpent(item.category,period,id)+Math.abs(number(item.amount));
        if(limit&&projected>limit){const over=projected-limit;if(!confirm(`Финансовый помощник останавливает расход.\n\nКатегория: ${item.category}\nЛимит: ${moneyText(limit)}\nПосле операции: ${moneyText(projected)}\nПревышение: ${moneyText(over)}\n\nСохранить расход несмотря на лимит?`))return toast('Расход не сохранён — лимит защищён');limitWarning=`Лимит «${item.category}» превышен на ${moneyText(over)}`;}
        else if(limit&&projected>=limit*.8)limitWarning=`В категории «${item.category}» использовано ${Math.round(projected/limit*100)}% лимита`;
      }
    }
    item.updatedAt=nowIso();if(id)state[schema.arr]=array(schema.arr).map(x=>x.id===id?item:x);else state[schema.arr].unshift(item);save();closeModal();renderPremium();
    const message=limitWarning||(type==='task'&&taskStatusMeta(item.status).done?'Задача сохранена и отмечена как выполненная':'Сохранено');toast(message);
    if(type==='task'&&taskStatusMeta(item.status).done){awardGame(`task:${item.id}:done`,8,2,'discipline',{title:item.title});celebrate(originEl,'✓');}
  }

  function bookStatusMeta(value){const raw=clean(value).toLowerCase();if(/finished|прочитан|готов/.test(raw))return {key:'finished',label:'Прочитано',icon:'✓'};if(/reading|читаю|в процессе/.test(raw))return {key:'reading',label:'Читаю',icon:'◉'};if(/paused|пауза/.test(raw))return {key:'paused',label:'На паузе',icon:'Ⅱ'};return {key:'planned',label:'Хочу прочитать',icon:'+'};}

  const enc=new TextEncoder(),dec=new TextDecoder();

  async function createVault(){const p=String(document.getElementById('v79_vault_new')?.value||''),r=String(document.getElementById('v79_vault_repeat')?.value||'');if(p.length<10)return toast('Минимум 10 символов');if(p!==r)return toast('Пароли не совпадают');const salt=crypto.getRandomValues(new Uint8Array(16)),key=await vaultKey(p,salt);state.passwordVault=await vaultEncrypt([],key,salt);vaultSession={key,entries:[],unlocked:true,revealed:new Set(),lastActivity:Date.now()};save();renderPremium();}

  function goalAutomationItems(){const now=Date.now(),items=[];array('goals').filter(goal=>goal.status==='active').forEach(goal=>{const mode=goalExecutionMode(goal),habits=linkedHabitsForGoal(goal),linked=array('tasks').filter(t=>t.goalId===goal.id&&!taskStatusMeta(t.status).done);let last=new Date(goal.lastActivityAt||goal.updatedAt||goal.createdAt||0).getTime();habits.forEach(habit=>{const latest=Object.entries(habit.marks||{}).filter(([,done])=>done).map(([date])=>dateAtNoon(date).getTime()).sort((a,b)=>b-a)[0]||0;if(latest>last)last=latest;});const days=last?Math.floor((now-last)/DAY):99;if(mode!=='actions'&&!habits.length)items.push({goal,type:'habit',text:'Выбран режим с привычками, но связь ещё не настроена'});if(!clean(goal.nextAction))items.push({goal,type:'next',text:'Нет следующего конкретного шага'});else if(mode!=='habits'&&!linked.length)items.push({goal,type:'task',text:'Следующий шаг ещё не превращён в задачу'});if(days>=5)items.push({goal,type:'stale',text:`Нет движения ${days} дней`});});return items;}

  function awardGame(source,xp=0,coins=0,skill='discipline',meta={}){ensureData();if(state.gameLife.logs.some(log=>log.source===source))return false;const cap=number(state.settings.v83.dailyXpCap)||40;const allowed=Math.max(0,Math.min(number(xp),cap-gameTodayXp()));if(allowed<=0&&coins<=0)return false;state.gameLife.xp+=allowed;state.gameLife.coins+=Math.max(0,number(coins));state.gameLife.skillXp[skill]=number(state.gameLife.skillXp[skill])+allowed;state.gameLife.logs.unshift({id:makeId(),source,date:todayKey(),xp:allowed,coins:Math.max(0,number(coins)),skill,title:meta.title||'Действие',createdAt:nowIso()});state.gameLife.logs=state.gameLife.logs.slice(0,1000);save();return true;}

,`<div class="v83-skills">${skillCard('discipline','🛡️','Дисциплина')}${skillCard('finance','💰','Финансы')}${skillCard('knowledge','📚','Знания')}${skillCard('energy','⚡','Энергия')}${skillCard('awareness','🧠','Осознанность')}</div>`,'v83-skills-card')}${automation.length?card('Автоматизация целей',`${automation.length} ${plural(automation.length,'подсказка','подсказки','подсказок')}`,goalAutomationHtml(automation),'v85-goal-automation-card'):''}</div><aside class="v83-game-side">${card('Магазин наград',`${number(state.gameLife.coins)} HP`, `<div class="v83-rewards v85-rewards">${state.gameLife.rewards.filter(r=>!r.archived).map(r=>{const a=rewardAvailability(r);return `<article>${rewardVisual(r)}<span><b>${safe(r.title)}</b><small>${number(r.cost)} HP · ${safe(r.category||'Другое')}</small>${r.description?`<em>${safe(r.description)}</em>`:''}</span><div class="v85-reward-actions"><button data-v83-action="redeem-reward" data-id="${safe(r.id)}" ${a.ok?'':'disabled'}>${safe(a.text)}</button><button class="ghost" data-v85-action="edit-reward" data-id="${safe(r.id)}">✎</button><button class="ghost danger" data-v85-action="delete-reward" data-id="${safe(r.id)}">×</button></div></article>`}).join('')||'<p class="v78-empty">Добавьте первую награду.</p>'}</div><button class="v78-link-button" data-v83-action="add-reward">＋ Своя награда</button>`,'v83-reward-card')}${card('Достижения',`${state.gameLife.achievements.length} открыто`, `<div class="v85-achievements">${achievements}</div>`,'v85-achievements-card')}${card('Журнал HP','Каждое начисление и списание объяснено.',`<div class="v83-game-log">${logs.map(log=>`<div><i>${number(log.coins)<0?'−':'+'}</i><span><b>${safe(log.title)}</b><small>${formatShort(log.date)} · ${number(log.xp)?`${number(log.xp)>0?'+':''}${number(log.xp)} XP · `:''}${number(log.coins)>0?'+':''}${number(log.coins)} HP</small></span><em>${safe(log.skill||'game')}</em></div>`).join('')||'<p class="v78-empty">История HP появится после первого действия.</p>'   function openGameCapture(){openModal('Зафиксировать за 30 секунд',`<div class="v83-capture"><p>Не нужно заранее решать, в какую папку это положить. Выбери тип и напиши хотя бы одну строку.</p><div class="v83-capture-types">${[['thought','💭','Мысль'],['emotion','❤️','Эмоция'],['task','✓','Задача'],['idea','💡','Идея'],['expense','₽','Расход'],['event','▦','Событие']].map(([v,i,l],idx)=>`<label><input type="radio" name="v83_capture_type" value="${v}" ${idx===0?'checked':''}><span><i>${i}</i>${l}</span></label>`).join('')}</div><label class="v79-field"><span>Что сейчас важно не потерять?</span><textarea id="v83_capture_text" placeholder="Напиши первое, что приходит в голову…"></textarea></label><div class="v79-form-grid"><label class="v79-field"><span>Сумма, если это расход</span><input id="v83_capture_amount" type="number" step="0.01" placeholder="0"></label><label class="v79-field"><span>Следующий шаг, необязательно</span><input id="v83_capture_next" placeholder="Что сделать дальше?"></label></div></div><div class="v79-modal-actions"><button class="v78-primary" data-v83-action="save-capture">Сохранить и получить XP</button><button data-v78-action="close-modal">Отмена</button></div>`);setTimeout(()=>document.getElementById('v83_capture_text')?.focus(),40);}
  function saveGameCapture(originEl=null){const type=document.querySelector('input[name="v83_capture_type"]:checked')?.value||'thought',text=clean(document.getElementById('v83_capture_text')?.value),next=clean(document.getElementById('v83_capture_next')?.value),amount=number(document.getElementById('v83_capture_amount')?.value);if(!text)return toast('Напиши хотя бы одну строку');const entry={id:makeId(),date:todayKey(),type,text,next,amount,createdAt:nowIso()};state.gameLife.captures.unshift(entry);if(type==='task')state.tasks.unshift({id:makeId(),title:text,date:todayKey(),status:'planned',priority:'medium',note:next,createdAt:nowIso()});else if(type==='idea')state.ideas.unshift({id:makeId(),title:text.slice(0,70),date:todayKey(),text:[text,next].filter(Boolean).join('\n'),createdAt:nowIso()});else if(type==='expense')state.operations.unshift({id:makeId(),date:todayKey(),type:'expense',amount:Math.abs(amount),category:'Быстрая запись',note:text,createdAt:nowIso()});else state.inbox.unshift({id:makeId(),title:type==='emotion'?'Эмоция':type==='event'?'Событие':'Быстрая запись',date:todayKey(),text:[text,next].filter(Boolean).join('\n'),captureType:type,createdAt:nowIso()});awardGame(`capture:${entry.id}`,3,1,type==='expense'?'finance':type==='thought'||type==='emotion'?'awareness':'discipline',{title:'Быстрая фиксация'});syncAchievements();save();closeModal();renderPremium();toast('Запись сохранена');celebrate(originEl,'✦');}
  function openRewardForm(id=''){const reward=state.gameLife.rewards.find(r=>r.id===id)||{};openModal(id?'Редактировать награду':'Своя награда',`<div class="v79-form-grid"><label class="v79-field"><span>Эмодзи / короткая иконка</span><input id="v83_reward_icon" value="${safe(reward.icon||'🎁')}"></label><label class="v79-field"><span>URL картинки</span><input id="v85_reward_image" type="url" value="${safe(reward.imageUrl||'')}" placeholder="https://..."></label><label class="v79-field span-2"><span>Название награды</span><input id="v83_reward_title" value="${safe(reward.title||'')}" placeholder="Например: вечер без дел"></label><label class="v79-field"><span>Стоимость в HP</span><input id="v83_reward_cost" type="number" min="1" value="${number(reward.cost)||50}"></label><label class="v79-field"><span>Категория</span><input id="v85_reward_category" value="${safe(reward.category||'Отдых')}" placeholder="Отдых, еда, покупка"></label><label class="v79-field"><span>Минимальный уровень</span><input id="v85_reward_level" type="number" min="1" value="${number(reward.minLevel)||1}"></label><label class="v79-field"><span>Лимит получений, 0 — без лимита</span><input id="v85_reward_limit" type="number" min="0" value="${number(reward.limit)}"></label><label class="v79-field"><span>Пауза между получениями, дней</span><input id="v85_reward_cooldown" type="number" min="0" value="${number(reward.cooldownDays)}"></label><label class="v79-field"><span>Статус</span><select id="v85_reward_active"><option value="1" ${reward.active!==false?'selected':''}>Активна</option><option value="0" ${reward.active===false?'selected':''}>Выключена</option></select></label><label class="v79-field span-2"><span>Описание</span><textarea id="v85_reward_description" placeholder="Когда и как использовать награду">${safe(reward.description||'')}</textarea></label></div><div class="v79-modal-actions"><button class="v78-primary" data-v83-action="save-reward" data-id="${safe(id)}">Сохранить</button><button data   function goalProgress(goal){
    if(!goal||typeof goal!=='object')return 0;
    if(clean(goal.status).toLowerCase()==='done')return 100;
    const target=Math.max(0,number(goal.target)),current=Math.max(0,number(goal.current));
    if(target>0)return Math.max(0,Math.min(100,Math.round(current/target*100)));
    const stages=(Array.isArray(goal.stages)?goal.stages:[]).filter(Boolean);
    if(stages.length)return Math.max(0,Math.min(100,Math.round(stages.filter(stage=>Boolean(stage?.done)).length/stages.length*100)));
    return 0;
  }

  function goalExecutionMode(goal){const mode=clean(goal?.executionMode);return ['actions','habits','hybrid'].includes(mode)?mode:'actions';}
  function goalExecutionLabel(mode){return mode==='habits'?'Через привычки':mode==='hybrid'?'Шаги + привычки':'Через действия';}
  function goalExecutionDescription(mode){return mode==='habits'?'Прогресс строится на регулярности связанных привычек.':mode==='hybrid'?'Этапы и задачи дают основной прогресс, привычки поддерживают ритм.':'Цель движется этапами, метрикой и конкретными задачами — привычки не обязательны.';}
  function goalHabitIds(goal){return [...new Set((Array.isArray(goal?.habitIds)?goal.habitIds:[]).map(String).filter(Boolean))];}
  function linkedHabitsForGoal(goal){const ids=new Set(goalHabitIds(goal));return array('habits').filter(h=>ids.has(String(h.id))&&h.active!==false);}
  function linkedGoalsForHabit(habit){return array('goals').filter(g=>g&&g.status!=='archived'&&g.status!=='done'&&goalHabitIds(g).includes(String(habit.id)));}
  function habitWeeklyTarget(habit){const f=clean(habit?.frequency).toLowerCase();if(/ежеднев|каждый день/.test(f))return 7;if(/еженед|раз в неделю/.test(f))return 1;const match=f.match(/(\d+)\s*(раз|дн)/);if(match)return Math.max(1,Math.min(7,number(match[1])));return Math.max(1,Math.min(7,number(habit?.weeklyTarget)||7));}
  function habitStability(habit){const actual=recentDates(7).filter(date=>completedHabit(habit,date)).length,target=habitWeeklyTarget(habit);return Math.max(0,Math.min(100,Math.round(actual/target*100)));}
  function goalHabitStability(goal){const habits=linkedHabitsForGoal(goal);if(!habits.length)return 0;return Math.round(habits.reduce((sum,h)=>sum+habitStability(h),0)/habits.length);}
  function goalDisplayProgress(goal){const raw=goalProgress(goal),mode=goalExecutionMode(goal),stability=goalHabitStability(goal);if(clean(goal?.status)==='done')return 100;if(mode==='habits')return stability;if(mode==='hybrid'&&linkedHabitsForGoal(goal).length)return Math.round(raw*.7+stability*.3);return raw;}
  function goalProgressCaption(goal){const mode=goalExecutionMode(goal);return mode==='habits'?'стабильность привычек':mode==='hybrid'?'смешанный прогресс':'прогресс кампании';}
  function goalHabitSelector(selectedIds=[]){const selected=new Set((selectedIds||[]).map(String)),habits=habitsActive();return habits.length?`<div class="v865-habit-select-list">${habits.map(h=>`<label><input type="checkbox" name="v865_goal_habit" value="${safe(h.id)}" ${selected.has(String(h.id))?'checked':''}><span><i>${safe(h.icon||'✦')}</i><span><b>${safe(h.name)}</b><small>${safe(h.frequency||'Регулярно')} · ${habitStability(h)}% за неделю</small></span><em></em></span></label>`).join('')}</div>`:'<div class="v865-empty-links">Активных привычек пока нет. Сначала сохраните цель, затем создайте привычку и свяжите её через редактирование.</div>';}

  function goalsPage(){const valid=array('goals').filter(g=>g&&typeof g==='object'),active=valid.filter(g=>g.status!=='archived'&&g.status!=='done'),done=valid.filter(g=>g.status==='done'),automation=goalAutomationItems();return `<section class="v78-page v83-goals-page"><header class="v78-page-head"><div><span>Цели как игровые кампании</span><h1>Цели</h1><p>Каждая цель обязана отвечать на вопрос: что конкретно сделать следующим шагом за 5–20 минут?</p></div><button class="v78-primary" data-v83-action="goal-wizard">＋ Создать цель с мастером</button></header>${automation.length?card('Цели, которым нужна помощь',`${automation.length} автоматических подсказок`,goalAutomationHtml(automation),'v85-goal-automation-card'):''}<section class="v83-goal-principles"><article><i>1</i><span><b>Выберите механику</b><small>Действия, привычки или гибридная система.</small></span></article><article><i>2</i><span><b>Следующий шаг</b><small>Конкретное действие максимум на 20 минут.</small></span></article><article><i>3</i><span><b>Связи по смыслу</b><small>Привычки добавляются только там, где они действительно нужны.</small></span></article></section><section class="v83-goal-grid">${active.map(goalCard).join('')||'<div class="v78-empty-big">Активных кампаний пока нет. Создай первую цель через мастер.</div>'}</section>${done.length?card('Завершённые кампании',`${done.length} целей`, `<div class="v83-finished-goals">${done.map(g=>`<article><button data-v78-route="goal-${encodeURIComponent(g.id)}" type="button"><i>🏆</i><span><b>${safe(g.title)}</b><small>${safe(formatDate(g.due))}</small></span><em>100%</em></button><button class="v833-goal-delete" data-v83-action="delete-goal" data-id="${safe(g.id)}" type="button">Удалить</button></article>`).join('')}</div>`,'v83-finished-card'):''}</section>`;}
  function goalTypeLabel(type){
    const key=clean(type||'result').toLowerCase();
    if(key==='process')return 'Цель-процесс';
    if(key==='maintenance')return 'Цель-поддержание';
    return 'Цель-результат';
  }

  function goalCard(goal){const progress=goalDisplayProgress(goal),next=goal.nextAction||'Определите следующий физический шаг',mode=goalExecutionMode(goal),habits=linkedHabitsForGoal(goal),stability=goalHabitStability(goal);return `<article class="v83-goal-card"><header><span>${goal.type==='process'?'🔁':goal.type==='maintenance'?'🛡️':'🎯'}</span><div><small>${goalTypeLabel(goal.type)}</small><h2>${safe(goal.title)}</h2></div><em>${progress}%</em></header><div class="v83-goal-progress"><i style="width:${progress}%"></i></div><div class="v865-goal-card-meta"><b class="v865-mode-badge ${mode}">${goalExecutionLabel(mode)}</b>${habits.length?`<span>${habits.length} ${plural(habits.length,'привычка','привычки','привычек')} · ${stability}% стабильности</span>`:'<span>Без привязанных привычек</span>'}</div><p>${safe(goal.why||'Причина пока не указана.')}</p><div class="v83-next-action"><small>СЛЕДУЮЩИЙ ШАГ · ${number(goal.actionMinutes)||15} МИН</small><b>${safe(next)}</b></div><footer><span>${goal.due?`до ${formatShort(goal.due)}`:'без жёсткого срока'} · ${goalProgressCaption(goal)}</span><div class="v833-goal-card-actions"><button class="v833-goal-delete" data-v83-action="delete-goal" data-id="${safe(goal.id)}" type="button" title="Удалить цель">Удалить</button><button data-v78-route="goal-${encodeURIComponent(goal.id)}" type="button">Открыть кампанию →</button></div></footer></article>`;}
  function goalPage(id){const goal=array('goals').find(g=>g.id===id);if(!goal)return `<section class="v78-page"><div class="v78-empty-big">Цель не найдена.<button data-v78-route="goals">Вернуться</button></div></section>`;const progress=goalDisplayProgress(goal),rawProgress=goalProgress(goal),linked=array('tasks').filter(t=>t.goalId===goal.id),habits=linkedHabitsForGoal(goal),stability=goalHabitStability(goal),mode=goalExecutionMode(goal);return `<section class="v78-page v83-goal-page"><header class="v78-page-head"><div><button class="v78-back" data-v78-route="goals">← Все цели</button><span>${goalTypeLabel(goal.type)} · ${goalExecutionLabel(mode)}</span><h1>${safe(goal.title)}</h1><p>${safe(goal.why||'Добавьте личную причину — она помогает возвращаться к цели после спада мотивации.')}</p></div><div><button class="v78-secondary" data-v865-action="manage-goal-habits" data-id="${safe(goal.id)}">Связать привычки</button><button class="v78-secondary" data-v83-action="goal-wizard" data-id="${safe(goal.id)}">Редактировать</button><button class="v83-danger-soft" data-v83-action="delete-goal" data-id="${safe(goal.id)}">Удалить</button></div></header><section class="v83-goal-hero"><div class="v83-goal-ring" style="--goal-progress:${progress}"><span><b>${progress}%</b><small>${goalProgressCaption(goal)}</small></span></div><div><small>СИСТЕМА ДОСТИЖЕНИЯ</small><h2>${safe(goalExecutionLabel(mode))}</h2><p>${safe(goalExecutionDescription(mode))}</p><div class="v83-goal-meta"><span>📅 ${goal.due?formatDate(goal.due):'Без срока'}</span><span>⏱ ${number(goal.actionMinutes)||15} минут на шаг</span><span>↻ ${habits.length} ${plural(habits.length,'привычка','привычки','привычек')}</span></div></div><div class="v83-campaign-badge">КАМПАНИЯ</div></section><section class="v865-goal-system-summary"><article><small>Прогресс этапов / метрики</small><b>${rawProgress}%</b><span>не зависит от ежедневной серии</span></article><article><small>Стабильность привычек</small><b>${habits.length?`${stability}%`:'—'}</b><span>${habits.length?'за последние 7 дней':'привычки не связаны'}</span></article><article><small>Итоговый показатель</small><b>${progress}%</b><span>${goalProgressCaption(goal)}</span></article></section><section class="v83-goal-layout"><div>${card('Карта кампании','Этапы не обязаны быть идеальными — их можно менять по ходу.', `<div class="v83-stage-list">${(goal.stages||[]).map((stage,index)=>`<button class="${stage.done?'done':''}" data-v83-action="toggle-goal-stage" data-goal="${safe(goal.id)}" data-stage="${safe(stage.id)}"><i>${stage.done?'✓':index+1}</i><span><b>${safe(stage.title)}</b><small>${stage.done?'Этап завершён':'Нажмите, когда контрольная точка достигнута'}</small></span><em>${stage.done?'Готово':'○'}</em></button>`).join('')||'<p class="v78-empty">Добавьте этапы через редактирование цели.</p>'}</div>`,'v83-stages-card')}${card('Задачи этой цели',`${linked.length} связанных задач`, `<div class="v83-linked-tasks">${linked.map(t=>`<button data-v79-action="edit-record" data-type="task" data-id="${safe(t.id)}"><i>${taskStatusMeta(t.status).done?'✓':'▦'}</i><span><b>${safe(t.title)}</b><small>${safe(formatShort(t.date))} · ${safe(taskStatusMeta(t.status).label)}</small></span><em>›</em></button>`).join('')||'<p class="v78-empty">Пока нет связанных задач.</p>'}</div>`,'v83-linked-card')}${card('Привычки, которые двигают цель',habits.length?`${habits.length} связанных · ${stability}% стабильности`:'Связь необязательна', habits.length?`<div class="v865-linked-habits">${habits.map(h=>`<button class="v865-linked-habit ${completedHabit(h)?'done':''}" data-v78-route="habit-${encodeURIComponent(h.id)}" type="button"><i>${safe(h.icon||'✦')}</i><span><b>${safe(h.name)}</b><small>${safe(h.frequency||'Регулярно')} · цель недели ${habitWeeklyTarget(h)} · сегодня ${completedHabit(h)?'выполнено':'не отмечено'}</small></span><em>${habitStability(h)}%</em></button>`).join('')}</div><button class="v78-link-button" data-v865-action="manage-goal-habits" data-id="${safe(goal.id)}" type="button">Изменить связи →</button>`:`<div class="v865-empty-links"><span>${mode==='actions'?'Для этой цели привычки не обязательны. Добавляйте их только если повторение реально помогает результату.':'Свяжите одну или несколько существующих привычек.'}</span><button class="v78-secondary" data-v865-action="manage-goal-habits" data-id="${safe(goal.id)}" type="button">Выбрать привычки</button></div>`,'v865-goal-habits-card')}</div><aside>${card('Активный следующий шаг',`Действие на ${number(goal.actionMinutes)||15} минут`, `<div class="v83-current-step"><i>⚡</i><h2>${safe(goal.nextAction||'Сформулируйте конкретное физическое действие')}</h2><p>Хороший шаг начинается с глагола: открыть, написать, позвонить, проверить, внести.</p><button class="v78-primary" data-v83-action="goal-task" data-id="${safe(goal.id)}">Создать задачу на сегодня</button><button class="v78-secondary" data-v83-action="goal-next-done" data-id="${safe(goal.id)}">✓ Шаг выполнен</button></div>`,'v83-current-step-card')}${card('Управление кампанией','Цель можно поставить на паузу без удаления данных.', `<div class="v83-goal-controls"><button data-v83-action="goal-status" data-id="${safe(goal.id)}" data-status="${goal.status==='paused'?'active':'paused'}">${goal.status==='paused'?'▶ Возобновить':'Ⅱ Поставить на паузу'}</button><button data-v83-action="goal-status" data-id="${safe(goal.id)}" data-status="done">🏆 Завершить цель</button></div>`,'v83-controls-card')}</aside></section></section>`;}
  function openGoalWizard(id=''){const goal=array('goals').find(g=>g.id===id);goalWizardStep=0;goalWizardDraft=goal?coreClone(goal):{id:'',title:'',type:'result',why:'',metric:'',target:0,current:0,unit:'',due:'',currentPoint:'',stages:[],executionMode:'actions',habitIds:[],nextAction:'',actionMinutes:15,status:'active'};goalWizardDraft.executionMode=goalExecutionMode(goalWizardDraft);goalWizardDraft.habitIds=goalHabitIds(goalWizardDraft);renderGoalWizard();}
  function goalWizardQuestions(){return [
    {title:'Что должно конкретно измениться?',hint:'Не «стать финансово грамотным», а измеримый результат.',html:()=>`<label class="v79-field"><span>Название кампании</span><input id="v83_goal_title" value="${safe(goalWizardDraft.title||'')}" placeholder="Например: Финансовая опора"></label><label class="v79-field"><span>Тип цели</span><select id="v83_goal_type"><option value="result" ${goalWizardDraft.type==='result'?'selected':''}>Цель-результат</option><option value="process" ${goalWizardDraft.type==='process'?'selected':''}>Цель-процесс</option><option value="maintenance" ${goalWizardDraft.type==='maintenance'?'selected':''}>Цель-поддержание</option></select></label>`},
    {title:'Почему это важно именно сейчас?',hint:'Личная причина сильнее абстрактной правильности.',html:()=>`<label class="v79-field"><span>Моя причина</span><textarea id="v83_goal_why" placeholder="Что изменится в моей жизни?">${safe(goalWizardDraft.why||'')}</textarea></label>`},
    {title:'Как понять, что цель достигнута?',hint:'Выберите число или наблюдаемый критерий.',html:()=>`<label class="v79-field"><span>Метрика</span><input id="v83_goal_metric" value="${safe(goalWizardDraft.metric||'')}" placeholder="Например: записано 90% операций"></label><div class="v79-form-grid"><label class="v79-field"><span>Сейчас</span><input id="v83_goal_current" type="number" value="${number(goalWizardDraft.current)}"></label><label class="v79-field"><span>Цель</span><input id="v83_goal_target" type="number" value="${number(goalWizardDraft.target)}"></label><label class="v79-field"><span>Единица</span><input id="v83_goal_unit" value="${safe(goalWizardDraft.unit||'')}" placeholder="₽, дней, %, сделок"></label><label class="v79-field"><span>Срок</span><input id="v83_goal_due" type="date" value="${safe(goalWizardDraft.due||'')}"></label></div>`},
    {title:'Где вы находитесь сейчас?',hint:'Факты без самокритики.',html:()=>`<label class="v79-field"><span>Текущая точка</span><textarea id="v83_goal_current_point" placeholder="Что происходит сейчас?">${safe(goalWizardDraft.currentPoint||'')}</textarea></label>`},
    {title:'Разбейте путь на 3–5 этапов',hint:'Один этап — одна понятная контрольная точка.',html:()=>`<label class="v79-field"><span>Каждый этап с новой строки</span><textarea id="v83_goal_stages" placeholder="1. Увидеть реальную картину\n2. Настроить систему\n3. Прожить первую неделю">${safe((goalWizardDraft.stages||[]).map(s=>s.title||s).join('\n'))}</textarea></label>`},
    {title:'Как эта цель будет двигаться?',hint:'Привычки нужны не каждой цели. Выберите честную механику.',html:()=>`<div class="v865-execution-options"><label><input type="radio" name="v865_execution_mode" value="actions" ${goalExecutionMode(goalWizardDraft)==='actions'?'checked':''}><span><i>⚡</i><b>Только действия</b><small>Проект, покупка, регистрация, разовая задача или результат через этапы.</small></span></label><label><input type="radio" name="v865_execution_mode" value="habits" ${goalExecutionMode(goalWizardDraft)==='habits'?'checked':''}><span><i>↻</i><b>Через привычки</b><small>Цель держится на повторении: чтение, сон, учёт расходов, спорт.</small></span></label><label><input type="radio" name="v865_execution_mode" value="hybrid" ${goalExecutionMode(goalWizardDraft)==='hybrid'?'checked':''}><span><i>✦</i><b>Гибрид</b><small>Есть этапы и задачи, а привычки поддерживают движение между ними.</small></span></label></div><div class="v865-wizard-note">Связь необязательна. Для режима «Только действия» можно не выбирать ни одной привычки.</div>${goalHabitSelector(goalWizardDraft.habitIds||[])}`},
    {title:'Какое действие можно сделать за 5–20 минут?',hint:'Даже цель через привычки должна иметь понятный следующий шаг.',html:()=>`<label class="v79-field"><span>Следующий физический шаг</span><textarea id="v83_goal_next" placeholder="Например: открыть операции за 7 дней и исправить 10 категорий">${safe(goalWizardDraft.nextAction||'')}</textarea></label><label class="v79-field"><span>Сколько минут</span><input id="v83_goal_minutes" type="number" min="5" max="60" value="${number(goalWizardDraft.actionMinutes)||15}"></label>`},
    {title:'Проверьте кампанию',hint:'После сохранения можно изменить механику и связи.',html:()=>{const habits=linkedHabitsForGoal(goalWizardDraft);return `<div class="v83-goal-review"><small>${goalTypeLabel(goalWizardDraft.type)} · ${goalExecutionLabel(goalExecutionMode(goalWizardDraft))}</small><h2>${safe(goalWizardDraft.title||'Цель')}</h2><p>${safe(goalWizardDraft.why||'Причина не указана')}</p><div><b>Следующий шаг</b><span>${safe(goalWizardDraft.nextAction||'Не указан')}</span></div><div><b>Связанные привычки</b><span>${habits.length?habits.map(h=>`${h.icon||'✦'} ${h.name}`).join(', '):'Не используются'}</span></div></div>`;}}
  ];}
  function collectGoalWizard(){const get=id=>document.getElementById(id);if(get('v83_goal_title'))goalWizardDraft.title=clean(get('v83_goal_title').value);if(get('v83_goal_type'))goalWizardDraft.type=clean(get('v83_goal_type').value);if(get('v83_goal_why'))goalWizardDraft.why=clean(get('v83_goal_why').value);if(get('v83_goal_metric'))goalWizardDraft.metric=clean(get('v83_goal_metric').value);if(get('v83_goal_current'))goalWizardDraft.current=number(get('v83_goal_current').value);if(get('v83_goal_target'))goalWizardDraft.target=number(get('v83_goal_target').value);if(get('v83_goal_unit'))goalWizardDraft.unit=clean(get('v83_goal_unit').value);if(get('v83_goal_due'))goalWizardDraft.due=clean(get('v83_goal_due').value);if(get('v83_goal_current_point'))goalWizardDraft.currentPoint=clean(get('v83_goal_current_point').value);if(get('v83_goal_stages')){const old=goalWizardDraft.stages||[];goalWizardDraft.stages=String(get('v83_goal_stages').value||'').split('\n').map(x=>clean(x.replace(/^\d+[.)]\s*/,''))).filter(Boolean).map((title,index)=>({id:old[index]?.id||makeId(),title,done:Boolean(old[index]?.done),order:index}));}const mode=document.querySelector('input[name="v865_execution_mode"]:checked');if(mode)goalWizardDraft.executionMode=clean(mode.value);const habitBoxes=[...document.querySelectorAll('input[name="v865_goal_habit"]')];if(habitBoxes.length)goalWizardDraft.habitIds=habitBoxes.filter(box=>box.checked).map(box=>box.value);if(get('v83_goal_next'))goalWizardDraft.nextAction=clean(get('v83_goal_next').value);if(get('v83_goal_minutes'))goalWizardDraft.actionMinutes=Math.max(5,number(get('v83_goal_minutes').value)||15);}
  function renderGoalWizard(){const questions=goalWizardQuestions(),q=questions[goalWizardStep];openModal(goalWizardDraft.id?'Редактирование цели':'Мастер создания цели',`<div class="v83-wizard"><div class="v83-wizard-progress">${questions.map((_,i)=>`<i class="${i===goalWizardStep?'active':i<goalWizardStep?'done':''}">${i<goalWizardStep?'✓':i+1}</i>`).join('')}</div><header><small>ШАГ ${goalWizardStep+1} ИЗ ${questions.length}</small><h2>${q.title}</h2><p>${q.hint}</p></header><div class="v83-wizard-body">${q.html()}</div></div><div class="v79-modal-actions">${goalWizardStep>0?'<button type="button" data-v83-action="goal-wizard-prev">← Назад</button>':''}${goalWizardStep<questions.length-1?'<button type="button" class="v78-primary" data-v83-action="goal-wizard-next">Продолжить →</button>':`<button type="button" class="v78-primary" data-v83-action="goal-wizard-save">Сохранить кампанию</button>`}<button type="button" data-v78-action="close-modal">Отмена</button></div>`);}
  function goalWizardNext(originEl=null){try{collectGoalWizard();if(goalWizardStep===0&&!goalWizardDraft.title)return toast('Укажите название цели');if(goalWizardStep===5&&goalExecutionMode(goalWizardDraft)!=='actions'&&!goalHabitIds(goalWizardDraft).length)return toast('Выберите хотя бы одну привычку или режим «Только действия»');if(goalWizardStep===6&&!goalWizardDraft.nextAction)return toast('Нужен конкретный следующий шаг');goalWizardStep=Math.min(goalWizardQuestions().length-1,goalWizardStep+1);renderGoalWizard();}catch(error){console.error('[Goal wizard next]',error);toast('Не удалось открыть следующий шаг. Обновите страницу и повторите.');if(originEl)originEl.disabled=false;}}

  function toggleHabit(id, date = todayKey(), force, originEl=null) {
    const habit = array('habits').find(item => item.id === id);
    if (!habit) return;
    habit.marks = habit.marks || {};
    const next = force === undefined ? !habit.marks[date] : Boolean(force);
    habit.marks[date] = next;
    if (/чтен/i.test(habit.name)) syncReadingSession(habit, date, next);
    if(next)linkedGoalsForHabit(habit).forEach(goal=>{goal.lastActivityAt=nowIso();goal.updatedAt=nowIso();});
    const rect=originEl?.getBoundingClientRect?.();
    persist(next ? 'Привычка отмечена' : 'Отметка снята');
    renderPremium();
    if(next) celebrate(rect,'✓');
  }

  function parseBankCsvText(text){
    const lines=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).filter(line=>line.trim());
    if(lines.length<2)throw new Error('В CSV-файле не найден список операций');
    const delimiter=detectCsvDelimiter(text);
    const headers=splitCsvRow(lines[0],delimiter).map(normalizeCsvHeader);
    const findIndex=patterns=>headers.findIndex(header=>patterns.some(pattern=>pattern instanceof RegExp?pattern.test(header):header.includes(pattern)));
    const dateIndex=findIndex(['дата операции','дата','date',/transaction date/]);
    const amountIndex=findIndex(['сумма операции','сумма','amount','value']);
    const debitIndex=findIndex(['списание','расход','debit']);
    const creditIndex=findIndex(['зачисление','поступление','доход','credit']);
    const typeIndex=findIndex(['тип операции','тип','type']);
    const categoryIndex=findIndex(['категория','катег','category','mcc']);
    const noteIndex=findIndex(['описание','назначение платежа','комментарий','контрагент','merchant','description','details','note']);
    const accountIndex=findIndex(['счет','карта','account','card']);
    if(dateIndex<0)throw new Error('Не удалось найти колонку с датой');
    if(amountIndex<0&&debitIndex<0&&creditIndex<0)throw new Error('Не удалось найти колонку с суммой');
    const existing=new Set(array('operations').map(operationSignature));
    const inside=new Set();const rows=[];let duplicatesInFile=0,duplicatesExisting=0;
    for(let index=1;index<lines.length;index+=1){
      const values=splitCsvRow(lines[index],delimiter);if(values.every(value=>!clean(value)))continue;
      const date=normalizeCsvDate(values[dateIndex]);if(!date)continue;
      const debit=debitIndex>=0?Math.abs(parseCsvMoney(values[debitIndex])):0;
      const credit=creditIndex>=0?Math.abs(parseCsvMoney(values[creditIndex])):0;
      const signed=amountIndex>=0?parseCsvMoney(values[amountIndex]):0;
      let type='expense',amount=0;
      if(debit||credit){type=credit&&!debit?'income':'expense';amount=credit&&!debit?credit:(debit||credit);}
      else{amount=Math.abs(signed);type=signed>0?'income':'expense';}
      const typeLabel=typeIndex>=0?normalizeCsvHeader(values[typeIndex]):'';
      if(/расход|списание|expense|debit/.test(typeLabel))type='expense';
      if(/доход|зачисление|поступление|income|credit/.test(typeLabel))type='income';
      if(!amount)continue;
      const rawCategory=categoryIndex>=0?clean(values[categoryIndex]):'';
      const note=noteIndex>=0?clean(values[noteIndex]):'';
      const account=accountIndex>=0?clean(values[accountIndex]):'';
      const category=rawCategory||guessImportCategory(`${note} ${account}`,type);
      const categoryRow=getFinanceCategory(category,type);const operation={id:makeId(),date,type,amount,category,expenseClass:type==='expense'?expenseClass(categoryRow?.defaultExpenseClass||'optional'):'',account,note:note||rawCategory,incomeSource:type==='income'?category:'',createdAt:nowIso(),updatedAt:nowIso(),importSource:'bank-csv'};
      const signature=operationSignature(operation);
      if(inside.has(signature)){duplicatesInFile+=1;continue;}
      inside.add(signature);
      if(existing.has(signature)){duplicatesExisting+=1;continue;}
      rows.push(operation);
    }
    return {rows,parsed:lines.length-1,duplicatesInFile,duplicatesExisting};
  }

  function polinaCycleForecast(){

    function v884CashflowEvents(days=30){const end=addDaysKey(todayKey(),days),events=[];const income=v884GuaranteedIncome(),next=v884Date(income.nextGuaranteedDate);if(next&&next>=todayKey()&&next<=end&&v884HasNumber(income.guaranteed))events.push({id:'income-guaranteed',date:next,title:'Гарантированный доход',amount:v884Num(income.guaranteed),direction:1,kind:'income'});v884UpcomingObligations(end).forEach(e=>events.push({...e,direction:-1}));v884ActiveReservations().filter(r=>r.dueDate&&r.dueDate>=todayKey()&&r.dueDate<=end).forEach(r=>{if(!events.some(e=>e.title===r.title&&e.date===r.dueDate&&Math.abs(e.amount-r.amount)<.01))events.push({id:`reserve:${r.id}`,date:r.dueDate,title:`Резерв: ${r.title}`,amount:r.amount,direction:-1,kind:'reserve'});});return events.sort((a,b)=>a.date.localeCompare(b.date)||b.direction-a.direction);}

  function toneFor(value) {
    const text = textKey(value);

    if (/gamelife|информац|архив|книг/.test(text)) return 'violet';

  function setIcon(host, name, preserveBadge = false) {
    if (!host || host.dataset.v883Icon) return false;
    const resolved = icons[name] ? name : 'sparkle';
    if (host.dataset.v88Icon === resolved && host.querySelector(':scope > .v88-icon')) return false;
    const badge = preserveBadge ? host.querySelector('em')?.outerHTML || '' : '';
    host.innerHTML = `${svg(resolved)}${badge}`;

  function resolvedTheme() { return themeMode === 'system' ? (themeMedia.matches ? 'dark' : 'light') : themeMode; }

  function setTheme(mode, persist = true) {
    if (!['light','dark','system'].includes(mode)) mode = 'system';
    themeMode = mode;
    if (persist) savePreference(THEME_KEY, mode);
    applyPreferences();
  }

  function setMotion(mode, persist = true) {
    if (!['full','calm','off'].includes(mode)) mode = 'full';
    motionMode = mode;
    if (persist) savePreference(MOTION_KEY, mode);

  function applyPreferences() {
    const theme = resolvedTheme();
    const motion = resolvedMotion();
    const root = document.documentElement;
    root.classList.remove('v87-light','v87-dark','v88-light','v88-dark');
    root.classList.add(`v87-${theme}`,`v88-${theme}`);
    if (document.body) {
      document.body.classList.add('v87-constellation','v88-constellation');
      document.body.classList.toggle('v88-motion-calm',motion === 'calm');
      document.body.classList.toggle('v88-motion-off',motion === 'off');

  function controlPanelHtml() {
    return `<section class="v88-control-panel" aria-label="Внешний вид" hidden>

  function ensureControls() {
    const actions = document.querySelector('.v78-top-actions');
    if (!actions) return;
    let toggle = actions.querySelector('.v88-theme-toggle');
    if (!toggle) {
      toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'v88-theme-toggle';
      toggle.setAttribute('aria-haspopup','dialog');
      toggle.setAttribute('aria-expanded','false');

      toggle.addEventListener('click',event => {
        event.stopPropagation();
        const panel = document.querySelector('.v88-control-panel');
        if (!panel) return;
        panel.hidden = !panel.hidden;
        toggle.setAttribute('aria-expanded',String(!panel.hidden));
      });
    }
    if (!document.querySelector('.v88-control-panel')) {
      document.body.insertAdjacentHTML('beforeend',controlPanelHtml());
      writeCount++;
      const panel = document.querySelector('.v88-control-panel');
      panel.addEventListener('click',event => {
        const themeButton = event.target.closest('[data-v88-theme]');
        const motionButton = event.target.closest('[data-v88-motion]');
        if (themeButton) setTheme(themeButton.dataset.v88Theme);
        if (motionButton) setMotion(motionButton.dataset.v88Motion);
      });

  }

  function updateControlState() {
    const toggle = document.querySelector('.v88-theme-toggle');
    const theme = resolvedTheme();
    if (toggle) {
      const iconName = themeMode === 'system' ? 'system' : theme === 'dark' ? 'sun' : 'moon';

  function decorateChrome() {

    document.querySelectorAll('.v8612-live-icon,.v8612-category-row>i,.v8612-plan-row>i,.v8611-allocation-row>i,.v869-plan-row>i,.v78-obligation-row>i,.v78-wish-row>i').forEach(host => setIcon(host,iconForStored(host.textContent,host.parentElement?.textContent)));
    document.querySelectorAll('.v78-folder-card>i,.v78-folder-row>i,.v78-library-card>i').forEach(host => setIcon(host,iconFor(host.parentElement?.textContent)));
    document.querySelectorAll('.v82-icon-picker [data-v82-action="select-habit-icon"]').forEach(button => {

  function ensureFinanceIconPicker() {
    const select = document.querySelector('#v866_category_icon');
    if (!select || document.querySelector('.v88-finance-icon-picker')) return;
    const options = [...select.options].filter(option => option.value).slice(0,30);
    if (!options.length) return;
    const picker = document.createElement('div');
    picker.className = 'v88-finance-icon-picker';
    picker.setAttribute('role','group');
    picker.setAttribute('aria-label','Фирменная иконка категории');

    select.closest('label')?.insertAdjacentElement('afterend',picker);
    writeCount++;
    picker.addEventListener('click',event => {
      const button = event.target.closest('[data-v88-finance-icon]');

      select.value = button.dataset.v88FinanceIcon;
      select.dispatchEvent(new Event('change',{bubbles:true}));
      updateFinancePicker(select,picker);
    });
    select.addEventListener('change',() => updateFinancePicker(select,picker));

  }

  function updateFinancePicker(select,picker) {
    picker.querySelectorAll('[data-v88-finance-icon]').forEach(button => {
      const active = button.dataset.v88FinanceIcon === select.value;

  function escapeAttribute(value) {
    return String(value || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  function visibleState() {
    const state = window.state || {};
    const list = key => Array.isArray(state[key]) ? state[key] : [];
    const goals = list('goals').filter(item => item && !['done','archived'].includes(String(item.status)));
    const habits = list('habits').filter(item => item && item.active !== false);
    const tasks = list('tasks').filter(item => item && !item.done && item.status !== 'done' && item.status !== 'archived');
    const today = new Date().toISOString().slice(0,10);
    const habitsDone = habits.filter(item => Boolean(item.marks?.[today])).length;
    return {goals,habits,tasks,habitsDone};
  }

  function hashSeed(value) {
    let hash = 2166136261;
    for (const char of String(value || '')) { hash ^= char.charCodeAt(0); hash = Math.imul(hash,16777619); }
    return hash >>> 0;
  }

  function constellationData() {
    const data = visibleState();
    const entries = [
      ...data.goals.slice(0,6).map(item => ({type:'goal',id:item.id || item.title,done:false})),
      ...data.habits.slice(0,7).map(item => ({type:'habit',id:item.id || item.name,done:Boolean(item.marks?.[new Date().toISOString().slice(0,10)] )})),
      ...data.tasks.slice(0,5).map(item => ({type:'task',id:item.id || item.title,done:false}))
    ];
    if (!entries.length) entries.push({type:'goal',id:'focus'},{type:'habit',id:'rhythm'},{type:'task',id:'next'});
    const nodes = entries.map((entry,index) => {
      const seed = hashSeed(`${entry.type}:${entry.id}:${index}`);
      return {...entry,x:28 + seed % 306,y:24 + Math.floor(seed / 97) % 166,r:entry.done ? 4.6 : entry.type === 'goal' ? 3.8 : 2.7};
    });
    const lines = [];
    nodes.forEach((node,index) => { if (index) lines.push([nodes[Math.max(0,index - 1)],node]); if (index > 3 && index % 3 === 0) lines.push([nodes[index - 3],node]); });
    const signature = `${data.goals.length}|${data.habits.length}|${data.tasks.length}|${data.habitsDone}|${nodes.map(node => `${node.type}:${node.id}:${node.done}`).join(',')}`;
    return {...data,nodes,lines,signature};
  }

    const hero = document.querySelector('.v83-today-game');

  function ensureUpdateBanner() {

    const banner = document.createElement('aside');
    banner.className = 'v88-update-banner';
    banner.hidden = true;

    document.body.append(banner);
    banner.querySelector('button').addEventListener('click',() => window.SecondBrainPWA?.applyUpdate?.() || location.reload());
    return banner;
  }

  function showUpdateBanner() { const banner = ensureUpdateBanner(); banner.hidden = false; }

  function apply() {
    applyCount++;
    applyPreferences();
    ensureControls();
    decorateNavigation();
    decorateChrome();
    decorateInterfaceIcons();
    ensureFinanceIconPicker();
    ensureConstellation();
    decorateAssistant();
    setBuildBadge();
  }

  function schedule() {
    if (scheduledFrame) return;
    scheduledFrame = requestAnimationFrame(() => { scheduledFrame = 0; apply(); });
  }

  function routeChanged() {
    document.body?.classList.add('v88-route-changing');
    schedule();
    window.setTimeout(() => { document.body?.classList.remove('v88-route-changing'); schedule(); },220);
  }

  document.addEventListener('click',event => {
    const panel = document.querySelector('.v88-control-panel');
    const toggle = document.querySelector('.v88-theme-toggle');
    if (panel && !panel.hidden && !panel.contains(event.target) && !toggle?.contains(event.target)) {
      panel.hidden = true;
      toggle?.setAttribute('aria-expanded','false');
    }
  });
  document.addEventListener('keydown',event => {
    if (event.key !== 'Escape') return;
    const panel = document.querySelector('.v88-control-panel');
    if (panel && !panel.hidden) { panel.hidden = true; document.querySelector('.v88-theme-toggle')?.setAttribute('aria-expanded','false'); }
  });

  const observer = new MutationObserver(schedule);
  const appRoot = document.getElementById('app');
  const modalRoot = document.getElementById('modal');
  if (appRoot) observer.observe(appRoot,{childList:true,subtree:true});
  if (modalRoot) observer.observe(modalRoot,{childList:true,subtree:true});
  window.addEventListener('hashchange',routeChanged);
  window.addEventListener('pageshow',schedule);
  themeMedia.addEventListener?.('change',() => { if (themeMode === 'system') applyPreferences(); });
  reducedMedia.addEventListener?.('change',applyPreferences);
  navigator.serviceWorker?.addEventListener?.('controllerchange',showUpdateBanner);
  window.addEventListener('second-brain-update-ready',showUpdateBanner);
  window.setInterval(() => { if (window.SecondBrainPWA?.getStatus?.().updateReady) showUpdateBanner(); },60000);

  apply();
  [100,420,1100,2200].forEach(delay => window.setTimeout(schedule,delay));
  window.SecondBrainVisual = {
    apply,
    setTheme,
    setMotion,
    build:VISUAL_BUILD,
    getSettings:() => ({themeMode,motionMode,resolvedTheme:resolvedTheme(),resolvedMotion:resolvedMotion()}),
    getMetrics:() => ({applyCount,writeCount,scheduled:Boolean(scheduledFrame)})
  };
})();

};if(document.body?.dataset.sbosBooted==='1')start();else window.addEventListener('second-brain-booted',start,{once:true});})();
</script>
