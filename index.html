<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>Обновление Second Brain OS</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#fffdfb,#f4efff,#eefcff);font-family:Onest,system-ui,sans-serif;color:#17192b}.card{width:min(560px,calc(100% - 32px));padding:32px;border:1px solid rgba(105,84,164,.14);border-radius:28px;background:#fff;box-shadow:0 24px 70px rgba(83,62,137,.15);text-align:center}.orb{width:92px;height:92px;margin:auto;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff,#aa85f1 38%,#674bd0 72%);box-shadow:0 18px 40px rgba(111,79,207,.25);position:relative}.orb:after{content:"";position:absolute;left:-16px;right:-16px;top:38px;height:18px;border:7px solid rgba(255,255,255,.86);border-top-color:#7957dc;border-bottom-color:#bba3ff;border-radius:50%;transform:rotate(-12deg)}h1{font-size:28px;margin:22px 0 8px}p{color:#70758a;line-height:1.6}.status{margin-top:18px;padding:12px;border-radius:14px;background:#f6f1ff;color:#674bd0;font-weight:600}</style></head><body><main class="card"><div class="orb"></div><h1>Обновляем интерфейс</h1><p>Удаляется только старый кэш файлов. Личные данные приложения не очищаются.</p><div id="status" class="status">Подготовка…</div></main><script>(async()=>{const status=document.getElementById('status');try{status.textContent='Удаляю старые версии интерфейса…';const regs=await navigator.serviceWorker?.getRegistrations?.()||[];await Promise.all(regs.map(r=>r.unregister()));const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));status.textContent='Готово. Открываю V86 — Autopilot, HP и фирменный интерфейс…';setTimeout(()=>location.replace('./?v=86&fresh='+Date.now()+'#today'),650);}catch(e){status.textContent='Открываю V86 — Autopilot, HP и фирменный интерфейс…';setTimeout(()=>location.replace('./?v=86&fresh='+Date.now()+'#today'),900);}})();</script></body></html>
