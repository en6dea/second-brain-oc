/* ===== UNIFIED PLANNING + MONTHLY FORECAST — tasks, future spends, wishes, Polina ===== */
(function(){
  const UNIFIED_BUILD='unified-planning-monthly-forecast-20260630';
  try{localStorage.setItem('secondBrainOS.currentBuild',UNIFIED_BUILD);}catch(e){}

  function ensureUnifiedState(){
    state.settings = state.settings || {};
    state.tasks = Array.isArray(state.tasks) ? state.tasks : [];
    state.calendarEvents = Array.isArray(state.calendarEvents) ? state.calendarEvents : [];
    state.plannedPurchases = Array.isArray(state.plannedPurchases) ? state.plannedPurchases : [];
    state.polinaWishes = Array.isArray(state.polinaWishes) ? state.polinaWishes : [];
    state.polinaPayments = Array.isArray(state.polinaPayments) ? state.polinaPayments : [];
    state.settings.planningOwner = state.settings.planningOwner || 'all';
    state.settings.planningMonth = state.settings.planningMonth || state.settings.currentMonth || monthKey();
    state.plannedPurchases.forEach(p=>{
      if(!p.owner) p.owner='Я';
      if(!p.kind) p.kind='Покупка';
      if(!p.month) p.month=state.settings.currentMonth||monthKey();
    });
    state.polinaWishes.forEach(w=>{w.owner='Полина'; if(!w.month) w.month=state.settings.currentMonth||monthKey();});
    state.polinaPayments.forEach(p=>{p.owner='Полина'; if(!p.month) p.month=state.settings.currentMonth||monthKey();});
  }
  function monthNow(){return state.settings.currentMonth || monthKey();}
  function monthTitle(m){
    const [y,mm]=String(m||monthNow()).split('-').map(Number);
    if(!y||!mm)return esc(m||'—');
    return new Date(y,mm-1,1).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  }
  function addMonth(m,n){
    const [y,mm]=String(m||monthNow()).split('-').map(Number);
    const d=new Date(y||new Date().getFullYear(),(mm||new Date().getMonth()+1)-1+n,1);
    return monthKey(d);
  }
  function monthInput(id,val){return `<div class="field"><label>Месяц</label><input id="${id}" type="month" value="${esc(val||monthNow())}"></div>`;}
  function ownerSelect(id,val='Я'){
    const owners=['Я','Полина','Общее'];
    return `<div class="field"><label>Кому</label><select id="${id}">${owners.map(o=>`<option value="${esc(o)}" ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  }
  function ownerPill(owner){
    owner=owner||'Я';
    const cls=owner==='Полина'?'violet':owner==='Общее'?'green':'blue';
    return `<span class="pill ${cls}">${esc(owner)}</span>`;
  }
  function includeText(x){return x.includeInBudget===false?'вне прогноза':'в прогнозе';}
  function planningOwnerFilter(){return state.settings.planningOwner||'all';}
  function planningMonthFilter(){return state.settings.planningMonth||monthNow();}
  function setPlanningOwner(owner){state.settings.planningOwner=owner||'all';save(false);render();}
  function setPlanningMonth(){const v=formVal('planningMonthSelect')||monthNow(); state.settings.planningMonth=v; save(false); render();}
  function planOwnerButtons(){
    const cur=planningOwnerFilter();
    return `<div class="button-row plan-tabs"><button class="tab-btn ${cur==='all'?'active':''}" data-action="setPlanningOwner" data-id="all">Все</button><button class="tab-btn ${cur==='Я'?'active':''}" data-action="setPlanningOwner" data-id="Я">Я</button><button class="tab-btn ${cur==='Полина'?'active':''}" data-action="setPlanningOwner" data-id="Полина">Полина</button><button class="tab-btn ${cur==='Общее'?'active':''}" data-action="setPlanningOwner" data-id="Общее">Общее</button></div>`;
  }
  function plannedUnifiedItems(month=planningMonthFilter(), owner=planningOwnerFilter()){
    ensureUnifiedState();
    const items=[];
    state.tasks.filter(t=>!month || String(t.due||'').startsWith(month)).forEach(t=>items.push({source:'task',id:t.id,title:t.title,owner:t.owner||'Я',amount:0,month:String(t.due||'').slice(0,7)||monthNow(),date:t.due,sort:t.due||'9999-99-99',meta:`${t.area||'Личное'} · ${t.time||''}`,kind:'Задача',priority:t.priority||'B',image:t.image||'',include:true}));
    state.calendarEvents.filter(e=>!month || String(e.date||'').startsWith(month)).forEach(e=>items.push({source:'event',id:e.id,title:e.title,owner:e.owner||'Я',amount:0,month:String(e.date||'').slice(0,7)||monthNow(),date:e.date,sort:e.date||'9999-99-99',meta:`${e.area||'Личное'} · ${e.time||''}`,kind:'Событие',priority:'B',include:true}));
    state.plannedPurchases.filter(p=>!month || (p.month||monthNow())===month).forEach(p=>items.push({source:'purchase',id:p.id,title:p.title,owner:p.owner||'Я',amount:num(p.amount),month:p.month||monthNow(),date:p.due||'',sort:p.due||`${p.month||monthNow()}-28`,meta:`${p.category||'Покупки'} · ${includeText(p)}`,kind:p.kind||'Покупка',priority:p.importance||p.priority||'Важно',link:p.link||'',image:p.image||'',include:p.includeInBudget!==false}));
    state.polinaWishes.filter(w=>!month || (w.month||monthNow())===month).forEach(w=>items.push({source:'polinaWish',id:w.id,title:w.title,owner:'Полина',amount:num(w.amount),month:w.month||monthNow(),date:'',sort:`${w.month||monthNow()}-27`,meta:`${w.category||'Хотелка'} · ${includeText(w)}`,kind:'Хотелка',priority:w.priority||'Важно',link:w.link||'',image:w.image||'',include:w.includeInBudget!==false}));
    state.polinaPayments.filter(p=>!month || (p.month||monthNow())===month).forEach(p=>items.push({source:'polinaPayment',id:p.id,title:p.title,owner:'Полина',amount:num(p.amount),month:p.month||monthNow(),date:`${p.month||monthNow()}-${String(num(p.dueDay)||1).padStart(2,'0')}`,sort:`${p.month||monthNow()}-${String(num(p.dueDay)||1).padStart(2,'0')}`,meta:`${p.category||'Обязательный платёж'} · день ${p.dueDay||'—'} · ${p.active===false?'пауза':'активен'}`,kind:'Обязательный платёж',priority:p.active===false?'Пауза':'Важно',include:p.active!==false}));
    return items.filter(x=>owner==='all'||x.owner===owner).sort((a,b)=>String(a.sort).localeCompare(String(b.sort))||String(a.owner).localeCompare(String(b.owner),'ru'));
  }
  function plannedMonthlyTotals(){
    ensureUnifiedState();
    const map=new Map();
    function take(month,owner,amount,type,include=true){
      if(!include || !month) return;
      const row=map.get(month)||{month,total:0,self:0,polina:0,common:0,purchases:0,wishes:0,payments:0};
      const a=num(amount); row.total+=a;
      if(owner==='Полина') row.polina+=a; else if(owner==='Общее') row.common+=a; else row.self+=a;
      if(type==='payment') row.payments+=a; else if(type==='wish') row.wishes+=a; else row.purchases+=a;
      map.set(month,row);
    }
    (state.plannedPurchases||[]).forEach(p=>take(p.month||monthNow(),p.owner||'Я',p.amount,'purchase',p.includeInBudget!==false));
    (state.polinaWishes||[]).forEach(w=>take(w.month||monthNow(),'Полина',w.amount,'wish',w.includeInBudget!==false));
    (state.polinaPayments||[]).forEach(p=>take(p.month||monthNow(),'Полина',p.amount,'payment',p.active!==false));
    // Show current + next 5 months even if empty, then add any manual future months.
    for(let i=0;i<6;i++){const m=addMonth(monthNow(),i); if(!map.has(m))map.set(m,{month:m,total:0,self:0,polina:0,common:0,purchases:0,wishes:0,payments:0});}
    return Array.from(map.values()).sort((a,b)=>String(a.month).localeCompare(String(b.month)));
  }
  function plannedAmountForMonth(m=monthNow()){const row=plannedMonthlyTotals().find(x=>x.month===m); return row?row.total:0;}
  function plannedMonthlyForecastBlock(){
    const rows=plannedMonthlyTotals().slice(0,9);
    return `<section class="card monthly-plan-card"><div class="card-head"><div><h3>Запланированные расходы по месяцам</h3><p class="muted small">Покупки, будущие траты, личные хотелки, хотелки и платежи Полины.</p></div><span class="pill blue">прогноз</span></div><div class="monthly-plan-grid">${rows.map(r=>`<div class="monthly-plan-row ${r.month===monthNow()?'current':''}"><div><strong>${monthTitle(r.month)}</strong><div class="row-sub">Я: ${money(r.self)} · Полина: ${money(r.polina)} · Общее: ${money(r.common)}</div></div><div class="monthly-total">${money(r.total)}</div></div>`).join('')}</div></section>`;
  }
  function sourceTone(source,priority){
    if(source==='polinaPayment') return 'violet';
    if(source==='polinaWish') return 'violet';
    if(priority==='Очень важно'||priority==='A') return 'red';
    if(priority==='Важно'||priority==='B') return 'amber';
    return 'blue';
  }
  function rowUnifiedPlanItem(x){
    const img=x.image?`<img class="unified-plan-image" src="${esc(x.image)}" loading="lazy" alt="" onerror="this.remove()">`:'';
    const action=x.source==='task'?'editTask':x.source==='event'?'editEvent':x.source==='purchase'?'editPurchase':x.source==='polinaWish'?'editPolinaWish':'editPolinaPayment';
    const dateLine=x.date?`${esc(x.date)} · `:'';
    const link=x.link?`<a class="mini-btn blue" href="${esc(x.link)}" target="_blank" rel="noopener">Ссылка</a>`:'';
    return `<div class="unified-plan-item ${x.source}">${img}<div class="unified-plan-main"><div class="unified-plan-top"><span class="pill ${sourceTone(x.source,x.priority)}">${esc(x.kind)}</span>${ownerPill(x.owner)}${x.amount?`<span class="pill green">${money(x.amount)}</span>`:''}</div><div class="row-title">${esc(x.title||'Пункт плана')}</div><div class="row-sub">${dateLine}${esc(monthTitle(x.month))} · ${esc(x.meta||'')}</div></div><div class="button-row unified-plan-actions">${link}<button class="mini-btn" data-action="${action}" data-id="${esc(x.id)}">Ред.</button></div></div>`;
  }
  function unifiedPlanningPanel(){
    ensureUnifiedState();
    const m=planningMonthFilter();
    const owner=planningOwnerFilter();
    const items=plannedUnifiedItems(m,owner);
    const moneyTotal=items.reduce((a,b)=>a+(b.include?num(b.amount):0),0);
    const taskCount=items.filter(x=>x.source==='task'||x.source==='event').length;
    return `<section class="grid cols-4 planning-summary"><article class="card premium-hero-card"><h3>Единая папка планирования</h3><div class="value sm">${items.length}</div><p class="muted small">задачи, события, покупки, хотелки и платежи</p></article><article class="card"><h3>План расходов</h3><div class="value sm blue">${money(moneyTotal)}</div><p class="muted small">на ${monthTitle(m)}</p></article><article class="card"><h3>Дела</h3><div class="value sm">${taskCount}</div><p class="muted small">задачи + календарь</p></article><article class="card"><h3>Фильтр</h3><div class="field" style="margin:0"><input id="planningMonthSelect" type="month" value="${esc(m)}" data-action="setPlanningMonth"></div>${planOwnerButtons()}</article></section><section class="card" style="margin-top:18px"><div class="card-head"><div><h3>Все запланированное</h3><p class="muted small">У каждого пункта есть пометка, кому он относится: Я, Полина или Общее.</p></div><div class="button-row" style="margin-top:0"><button class="btn secondary" data-action="addTask">Задача</button><button class="btn secondary" data-action="addPurchase">Покупка / трата</button><button class="btn secondary" data-action="addPolinaWish">Хотелка Полины</button><button class="btn secondary" data-action="addPolinaPayment">Платёж Полины</button></div></div><div class="unified-plan-list">${items.map(rowUnifiedPlanItem).join('')||empty('На этот месяц ничего не запланировано')}</div></section>`;
  }

  // Purchases now carry owner + optional link/image and stay compatible with the old budget section.
  addPurchase=function(){openModal('Плановая покупка / будущая трата',`<div class="form-grid">${field('Что купить / оплатить','f_title')}${ownerSelect('f_owner','Я')}${field('Категория','f_category','Покупки')}${field('Сумма','f_amount','','number')}${monthInput('f_month',monthNow())}<div class="field"><label>Тип</label><select id="f_kind"><option>Покупка</option><option>Хотелка</option><option>Будущая трата</option><option>Обязательный платёж</option></select></div><div class="field"><label>Важность</label><select id="f_importance"><option>Очень важно</option><option selected>Важно</option><option>Можно позже</option></select></div><div class="field"><label>Учитывать в прогнозе</label><select id="f_include"><option value="true">Да</option><option value="false">Нет</option></select></div>${field('Ссылка','f_link','')}${field('URL картинки','f_image','')}${area('Комментарий','f_note')}</div>${modalButtons('savePurchase')}`)};
  savePurchase=function(){
    const owner=formVal('f_owner')||'Я';
    if(owner==='Полина' && formVal('f_kind')==='Хотелка'){
      state.polinaWishes.unshift({id:uid(),title:formVal('f_title')||'Хотелка Полины',amount:num(formVal('f_amount')),category:formVal('f_category')||'Подарки',month:formVal('f_month')||monthNow(),priority:formVal('f_importance')||'Важно',includeInBudget:formVal('f_include')!=='false',link:formVal('f_link'),image:formVal('f_image'),note:formVal('f_note'),owner:'Полина'});
    }else{
      state.plannedPurchases.unshift({id:uid(),title:formVal('f_title')||'Покупка',owner,kind:formVal('f_kind')||'Покупка',category:formVal('f_category')||'Покупки',amount:num(formVal('f_amount')),month:formVal('f_month')||monthNow(),importance:formVal('f_importance')||'Важно',includeInBudget:formVal('f_include')!=='false',link:formVal('f_link'),image:formVal('f_image'),note:formVal('f_note')});
    }

  function monthlyPlanRows(){

  lifeFolderCount=function(id){ ensureFolderState(); const map={people:arr2('people').length,notes:arr2('notes').length,planning:allUnifiedItems().length,habits:arr2('habits').length,subconscious:arr2('subconsciousDiary').length,wishlist:wishListItems().length,payments:payListItems().length,books:arr2('books').length,ideas:arr2('ideas').length,personal:arr2('media').length,documents:arr2('files').length,trips:arr2('trips').length}; return map[id]||0; };

  function lifeFolderLanding(folder){ const f=lifeFolders().find(x=>x.id===folder)||lifeFolders()[0]; const subs=lifeSubMap[folder]||[['all','Все записи','содержимое папки']]; return `<section class="subpage-head card"><div><button class="mini-btn" data-action="setLifeFolderFinal" data-id="overview">← Все сферы</button><h3>${q(f.title)}</h3><p class="muted small">Выбери подпапку — на странице останется только нужная категория.</p></div></section><section class="folder-list smart-subfolder-grid" style="margin-top:18px">${subs.map(s=>subCard(folder,s)).join('')}</section>`; }

  function renderLifeSubContent(folder,sub){
    const title=(lifeSubMap[folder]||[]).find(x=>x[0]===sub)?.[1]||'Все';
    let body='';
    if(folder==='planning') body=renderPlanSubAsLife(sub||'all');
    else if(folder==='wishlist') body=renderWishlistOwner(sub||'all');
    else if(folder==='payments') body=renderPaymentsOwner(sub||'all');
    else if(folder==='habits'){ if(sub==='interview') body=typeof dailyInterviewCard==='function'?dailyInterviewCard():em('Интервью не найдено'); else body=typeof habitsFolder==='function'?habitsFolder():em('Привычек нет'); }
    else if(folder==='subconscious'){ if(sub==='today') body=typeof dailyInterviewCard==='function'?dailyInterviewCard():em('Интервью не найдено'); else body=typeof subconsciousFolderFinal==='function'?subconsciousFolderFinal():(typeof subconsciousFolder==='function'?subconsciousFolder():em('Записей нет')); }
    else if(folder==='people'){
      const people=arr2('people');
      let rows=[]; if(sub==='birthdays') rows=people.filter(p=>p.birthday).map(p=>simpleRow('ДР',p.name,p.birthday,'editPerson',p.id)); else if(sub==='gifts') rows=people.filter(p=>p.gifts).map(p=>simpleRow('Подарки',p.name,p.gifts,'editPerson',p.id)); else if(sub==='talks') rows=people.filter(p=>p.talkIdeas).map(p=>simpleRow('Разговор',p.name,p.talkIdeas,'editPerson',p.id)); else { body=typeof peopleFolder==='function'?peopleFolder():em('Люди не найдены'); }
      if(!body) body=genericList(title,rows,'addPerson');
    }
    else if(folder==='notes'){
      const notes=arr2('notes'); let list=notes;
      if(sub==='reflection') list=notes.filter(x=>(x.tags||[]).includes('рефлексия'));
      if(sub==='diary') list=notes.filter(x=>/дневник|подсознан|интервью/i.test([x.folder,x.title,(x.tags||[]).join(' ')].join(' ')));
      const rows=list.map(x=>simpleRow((x.tags||[])[0]||'Заметка',x.title,x.text,'editNote',x.id)); body=genericList(title,rows,'addNote');
    }

  function monthTitle(m){try{return new Date(String(m||month())+'-01T12:00:00').toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}catch(e){return m||month()}}
  function setup(){
    state.settings=state.settings||{};
    if(!state.settings.folderExplorer) state.settings.folderExplorer={planning:{folder:''},spheres:{folder:'',sub:''}};
    if(!state.settings.folderExplorer.planning) state.settings.folderExplorer.planning={folder:''};
    if(!state.settings.folderExplorer.spheres) state.settings.folderExplorer.spheres={folder:'',sub:''};
    ['tasks','calendarEvents','plannedPurchases','people','notes','habits','books','ideas','media','files','trips','subconsciousDiary'].forEach(arr);
  }
  function setExp(section,folder='',sub=''){ setup(); state.settings.folderExplorer[section]={folder:folder||'',sub:sub||''}; saveQuiet(); render(); }
  function backExp(section){ setup(); const d=state.settings.folderExplorer[section]||{}; if(d.sub)setExp(section,d.folder,''); else setExp(section,'',''); }
  function resetExp(section){ setup(); state.settings.folderExplorer[section]={folder:'',sub:''}; saveQuiet(); }
  function kind(v){v=String(v||'').trim(); if(/виш|wish|хотел/i.test(v))return 'Вишлист'; if(/плат|обяз/i.test(v))return 'Платёж'; if(/будущ/i.test(v))return 'Будущая трата'; if(/покуп/i.test(v))return 'Покупка'; return v||'Покупка'}
  function allPlan(){
    setup(); const out=[];
    arr('tasks').forEach(t=>{ if(String(t.status||'')==='Готово')return; out.push({src:'task',id:t.id,title:t.title||'Задача',folder:'tasks',type:'Задача',owner:t.owner||'Я',amount:0,month:String(t.due||month()).slice(0,7)||month(),date:t.due||'',time:t.time||'',meta:t.area||'Личное',image:t.image||'',link:''}); });
    arr('calendarEvents').forEach(e=>out.push({src:'event',id:e.id,title:e.title||'Событие',folder:'calendar',type:'Календарь',owner:e.owner||'Общее',amount:0,month:String(e.date||month()).slice(0,7)||month(),date:e.date||'',time:e.time||'',meta:e.area||'Календарь',image:e.image||'',link:''}));
    arr('plannedPurchases').forEach(p=>{ const k=kind(p.kind); const f=k==='Вишлист'?'wishlist':k==='Платёж'?'payments':k==='Будущая трата'?'future':'purchases'; out.push({src:'purchase',id:p.id,title:p.title||'Пункт',folder:f,type:k,owner:p.owner||'Я',amount:n(p.amount),month:p.month||month(),date:p.due||'',time:'',meta:`${p.category||'Без категории'} · ${p.includeInBudget!==false?'в прогнозе':'вне прогноза'}`,image:p.image||'',link:p.link||'',include:p.includeInBudget!==false&&p.active!==false}); });
    return out;
  }
  const planFolders=[
    ['tasks','Задачи','✓','дела, сроки, фокус'],['calendar','Календарь','◷','события и даты'],['wishlist','Вишлист','✦','желания: Я / Полина / Общее'],['payments','Платежи','₽','регулярные обязательства'],['future','Будущие траты','↗','расходы вперёд'],['purchases','Покупки','◇','покупки и картинки']
  ];
  function planList(id){return allPlan().filter(x=>x.folder===id)}
  function planSum(id){return planList(id).filter(x=>x.include!==false).reduce((a,b)=>a+n(b.amount),0)}
  function folderCard(section,folder,title,ico,count,desc,sub){
    return `<button type="button" class="os-folder" data-action="folderExplorerOpen" data-section="${safe(section)}" data-folder="${safe(folder)}" data-sub="${safe(sub||'')}"><span class="os-folder-tab"></span><div class="os-folder-ico">${safe(ico)}</div><div class="os-folder-title">${safe(title)}</div><div class="os-folder-count">${safe(count||'')}</div>${desc?`<div class="os-folder-desc">${safe(desc)}</div>`:''}</button>`;
  }
  function sheet(title,subtitle,body,back){
    return `<section class="folder-sheet"><div class="folder-sheet-head"><div>${back?`<button type="button" class="mini-btn" data-action="folderExplorerBack" data-section="${safe(back)}">← Назад</button>`:''}<h3>${safe(title)}</h3><p>${safe(subtitle||'')}</p></div></div>${body}</section>`;
  }
  function planRoot(){
    const total=allPlan().filter(x=>x.include!==false).reduce((a,b)=>a+n(b.amount),0);
    const cards=planFolders.map(f=>folderCard('planning',f[0],f[1],f[2],`${planList(f[0]).length} пунктов${planSum(f[0])?' · '+rub(planSum(f[0])):''}`,f[3])).join('');
    return layout('Планирование','Как папка на компьютере: внутри только подпапки, без общей простыни.',`<section class="folder-brief"><div><b>${allPlan().length}</b><span>всего пунктов</span></div><div><b>${rub(total)}</b><span>запланировано</span></div><div><b>${monthTitle(month())}</b><span>текущий месяц</span></div></section>${sheet('Папка “Планирование”','Выбери подпапку. На этом листе нет задач и покупок вперемешку — только структура.',`<div class="folder-desktop">${cards}</div>`,'')}`);
  }
  function rowPlanItem(x){
    if(x.src==='task' && typeof rowTask==='function'){return rowTask(arr('tasks').find(t=>String(t.id)===String(x.id))||x)}
    if(x.src==='event' && typeof rowEvent==='function'){return rowEvent(arr('calendarEvents').find(e=>String(e.id)===String(x.id))||x)}
    if(x.src==='purchase' && typeof rowPurchase==='function'){return rowPurchase(arr('plannedPurchases').find(p=>String(p.id)===String(x.id))||x)}
    const img=x.image?`<img class="folder-row-img" src="${safe(x.image)}" loading="lazy" onerror="this.remove()">`:'';
    const act=x.src==='task'?'editTask':x.src==='event'?'editEvent':'editPurchase';
    return `<div class="folder-item-row">${img}<div class="folder-item-main"><div><span class="pill blue">${safe(x.type)}</span><span class="pill ${x.owner==='Полина'?'violet':x.owner==='Общее'?'green':'blue'}">${safe(x.owner)}</span>${x.amount?`<span class="pill green">${rub(x.amount)}</span>`:''}</div><strong>${safe(x.title)}</strong><p>${safe(x.date||monthTitle(x.month))}${x.time?' · '+safe(x.time):''} · ${safe(x.meta||'')}</p></div><div class="button-row"><button class="mini-btn" data-action="${safe(act)}" data-id="${safe(x.id)}">Ред.</button></div></div>`;
  }
  function planFolderPage(id){
    const f=planFolders.find(x=>x[0]===id)||planFolders[0]; const rows=planList(id); const add=id==='tasks'?'addTask':id==='calendar'?'addEvent':id==='wishlist'?'addWishlistItem':id==='payments'?'addPaymentItem':'addPurchase';
    return layout('Планирование · '+f[1],f[3],sheet(f[1],`Отдельный лист папки “${f[1]}”. Здесь только эта категория.`, `<div class="folder-action-line"><div><b>${rows.length}</b><span>пунктов</span></div><div><b>${rub(planSum(id))}</b><span>сумма</span></div><button class="btn secondary" data-action="${safe(add)}">Добавить</button></div><div class="folder-list-only">${rows.map(rowPlanItem).join('')||empty('В этой папке пока пусто')}</div>`, 'planning'));
  }
  function planningExplorerPage(){ setup(); const d=state.settings.folderExplorer.planning||{}; return d.folder?planFolderPage(d.folder):planRoot(); }

  const sphereFolders=[
    ['people','Люди','◌','контакты, подарки, разговоры'],['notes','Заметки','✎','мысли, ссылки, рефлексия'],['planning','Планирование','☷','задачи и расходы'],['habits','Привычки','◷','ритм и ежедневное интервью'],['books','Книги','▣','цитаты и выводы'],['ideas','Идеи','✦','замыслы и проекты'],['personal','Личная жизнь','♡','фильмы, сериалы, личное'],['documents','Документы','▤','файлы и ссылки'],['trips','Путешествия','✈','поездки и бюджеты'],['diary','Дневник','◉','интервью с подсознанием'],['wishlist','Вишлист','✦','желания с владельцем'],['payments','Платежи','₽','обязательные расходы']
  ];
  const sphereSubs={
    people:[['all','Все люди','◌'],['birthdays','Дни рождения','◷'],['gifts','Подарки','✦'],['talks','Темы разговора','✎']],
    notes:[['all','Все заметки','✎'],['reflection','Рефлексия','◉'],['diary','Дневник','◑'],['ideas','Идеи','✦']],
    planning:planFolders.map(f=>[f[0],f[1],f[2]]),
    habits:[['interview','Интервью с подсознанием','◉'],['tracker','Трекер привычек','◷'],['month','Календарь месяца','▦']],
    books:[['all','Все книги','▣'],['quotes','Цитаты','“”'],['insights','Выводы','◎']],
    ideas:[['all','Все идеи','✦'],['active','В работе','↗'],['archive','Архив','▣']],
    personal:[['watch','Что посмотреть','▶'],['notes','Личное','♡'],['memory','Память','◌']],
    documents:[['all','Все документы','▤'],['links','Ссылки','↗'],['important','Важное','!']],
    trips:[['all','Все поездки','✈'],['future','Будущие','↗'],['budget','Бюджет','₽']],
    diary:[['today','Начать интервью','◉'],['all','Все записи','▣'],['reflection','Рефлексия','✎']],
    wishlist:[['all','Весь вишлист','✦'],['Я','Мой','Я'],['Полина','Полины','П'],['Общее','Общее','О']],
    payments:[['all','Все платежи','₽'],['Я','Мои','Я'],['Полина','Полины','П'],['Общее','Общие','О']]
  };
  function sphereCount(id){
    const map={people:arr('people').length,notes:arr('notes').length,planning:allPlan().length,habits:arr('habits').length,books:arr('books').length,ideas:arr('ideas').length,personal:arr('media').length,documents:arr('files').length,trips:arr('trips').length,diary:arr('subconsciousDiary').length,wishlist:planList('wishlist').length,payments:planList('payments').length};
    return map[id]||0;
  }
  function subCount(folder,sub){
    if(folder==='planning')return planList(sub).length;
    if(folder==='wishlist')return sub==='all'?planList('wishlist').length:planList('wishlist').filter(x=>x.owner===sub).length;
    if(folder==='payments')return sub==='all'?planList('payments').length:planList('payments').filter(x=>x.owner===sub).length;
    if(folder==='diary')return sub==='today'?1:arr('subconsciousDiary').length;
    if(folder==='people'){let l=arr('people'); if(sub==='birthdays')l=l.filter(p=>p.birthday); if(sub==='gifts')l=l.filter(p=>p.gifts); if(sub==='talks')l=l.filter(p=>p.talkIdeas); return l.length;}
    if(folder==='notes'){let l=arr('notes'); if(sub==='reflection')l=l.filter(x=>(x.tags||[]).includes('рефлексия')); if(sub==='diary')l=l.filter(x=>/дневник|подсознан|интервью/i.test([x.title,x.folder,(x.tags||[]).join(' ')].join(' '))); if(sub==='ideas')l=l.filter(x=>/иде/i.test([x.title,x.folder,(x.tags||[]).join(' ')].join(' '))); return l.length;}
    return sphereCount(folder);
  }
  function spheresRootPage(){
    const cards=sphereFolders.map(f=>folderCard('spheres',f[0],f[1],f[2],`${sphereCount(f[0])} записей`,f[3])).join('');
    return layout('Сферы жизни','Как на компьютере: открыл папку — внутри только папки по категориям.',sheet('Папка “Сферы жизни”','Сначала только основные папки. Никаких списков ниже, чтобы экран не уезжал вниз.',`<div class="folder-desktop">${cards}</div>`,''));
  }
  function sphereFolderPage(folder){
    const f=sphereFolders.find(x=>x[0]===folder)||sphereFolders[0]; const subs=sphereSubs[folder]||[['all','Все записи','☷']];
    const cards=subs.map(s=>folderCard('spheres',folder,s[1],s[2],`${subCount(folder,s[0])} записей`,'',s[0])).join('');
    return layout('Сферы жизни · '+f[1],f[3],sheet(`Папка “${f[1]}”`,'Внутри этой папки лежат подпапки. Содержимое появится только после выбора подпапки.',`<div class="folder-desktop">${cards}</div>`,'spheres'));
  }
  function listPanel(title,rows,add){return `<section class="card folder-content-card"><div class="card-head"><h3>${safe(title)}</h3>${add?`<button class="btn secondary" data-action="${safe(add)}">Добавить</button>`:''}</div><div class="note-list">${rows.join('')||empty('Пока пусто')}</div></section>`}
  function simple(label,title,sub,action,id){return `<div class="list-row"><span class="pill blue">${safe(label)}</span><div><div class="row-title">${safe(title)}</div><div class="row-sub">${safe(sub||'')}</div></div>${action?`<div class="button-row"><button class="mini-btn" data-action="${safe(action)}" data-id="${safe(id)}">Ред.</button></div>`:''}</div>`}
  function rowsNotes(filter){let l=arr('notes'); if(filter==='reflection')l=l.filter(x=>(x.tags||[]).includes('рефлексия')); if(filter==='diary')l=l.filter(x=>/дневник|подсознан|интервью/i.test([x.title,x.folder,(x.tags||[]).join(' ')].join(' '))); if(filter==='ideas')l=l.filter(x=>/иде/i.test([x.title,x.folder,(x.tags||[]).join(' ')].join(' '))); return l.map(x=>simple((x.tags||[])[0]||'Заметка',x.title||'Заметка',String(x.text||'').slice(0,160),'editNote',x.id));}
  function dailyPanel(){
    if(typeof dailyInterviewPanel==='function') return dailyInterviewPanel();
    return `<section class="card notebook-card"><h3>Интервью с подсознанием</h3><p class="muted">Ежедневная запись сохраняется в заметки.</p><button class="btn" data-action="openDailySubconsciousInterviewFinal">Начать интервью</button></section>`;
  }
  function sphereContentPage(folder,sub){
    const title=(sphereSubs[folder]||[]).find(x=>x[0]===sub)?.[1]||'Все'; let body='';
    if(folder==='planning') body=`<div class="folder-content-card">${planFolderPage(sub).replace(/^<div class="page">|<\/div>$/g,'')}</div>`;
    else if(folder==='wishlist'){let rows=planList('wishlist'); if(sub&&sub!=='all')rows=rows.filter(x=>x.owner===sub); body=listPanel(title,rows.map(rowPlanItem),'addWishlistItem');}
    else if(folder==='payments'){let rows=planList('payments'); if(sub&&sub!=='all')rows=rows.filter(x=>x.owner===sub); body=listPanel(title,rows.map(rowPlanItem),'addPaymentItem');}
    else if(folder==='diary') body=sub==='today'?dailyPanel():listPanel(title,arr('subconsciousDiary').map(e=>simple('Дневник',e.date||'',(e.truth||e.step||e.notebook||e.question||'').slice(0,160),'editDailySubconsciousInterview',e.id)),null);
    else if(folder==='habits') body=sub==='interview'?dailyPanel():(typeof habitsFolder==='function'?habitsFolder():listPanel(title,arr('habits').map(h=>simple('Привычка',h.title||h.name||'',h.note||'','editHabit',h.id)),'addHabit'));
    else if(folder==='people'){let l=arr('people'); if(sub==='birthdays')l=l.filter(p=>p.birthday); if(sub==='gifts')l=l.filter(p=>p.gifts); if(sub==='talks')l=l.filter(p=>p.talkIdeas); body=listPanel(title,l.map(p=>simple('Человек',p.name||'',p.birthday||p.gifts||p.talkIdeas||p.notes||'','editPerson',p.id)),'addPerson');}
    else if(folder==='notes') body=listPanel(title,rowsNotes(sub),'addNote');
    else if(folder==='books'){let l=arr('books'); if(sub==='quotes')body=listPanel(title,l.flatMap(b=>(b.quotes||[]).map(x=>simple('Цитата',b.title||'',x,'editBook',b.id))),'addBook'); else if(sub==='insights')body=listPanel(title,l.filter(b=>b.insight).map(b=>simple('Вывод',b.title||'',b.insight,'editBook',b.id)),'addBook'); else body=listPanel(title,l.map(b=>simple('Книга',b.title||'',b.insight||((b.quotes||[])[0])||'','editBook',b.id)),'addBook');}
    else if(folder==='ideas') body=listPanel(title,arr('ideas').map(i=>simple('Идея',i.title||'',i.note||i.text||'','editIdea',i.id)),'addIdea');
    else if(folder==='personal') body=(typeof personalFolder==='function'?personalFolder():listPanel(title,arr('media').map(m=>simple('Личное',m.title||'',m.note||'','editMedia',m.id)),'addMedia'));
    else if(folder==='documents') body=(typeof documentsFolder==='function'?documentsFolder():listPanel(title,arr('files').map(f=>simple('Документ',f.title||'',f.url||f.note||'','editFile',f.id)),'addFileNote'));
    else if(folder==='trips') body=(typeof tripsPanel==='function'?tripsPanel():listPanel(title,arr('trips').map(t=>simple('Поездка',t.title||'',t.budget?rub(t.budget):t.note||'','editTrip',t.id)),'addTrip'));
    return layout('Сферы жизни · '+title,'Отдельный лист выбранной подпапки.',sheet(title,'Только выбранная категория. Назад вернёт к подпапкам этой папки.',body,'spheres'));
  }
  function spheresExplorerPage(){ setup(); const d=state.settings.folderExplorer.spheres||{}; if(!d.folder)return spheresRootPage(); if(!d.sub)return sphereFolderPage(d.folder); return sphereContentPage(d.folder,d.sub); }
  function compactFolderStrip(section,items){return `<div class="dash-folder-strip">${items.map(i=>`<button type="button" data-go="${safe(section)}"><span>${safe(i[2])}</span><b>${safe(i[1])}</b><small>${safe(i[3]||'')}</small></button>`).join('')}</div>`}
  const baseDashboard=typeof dashboard==='function'?dashboard:null;

    return html.replace('</div>',insert+'</div>');
  }

    else if(root==='notes'){let l=arr2('notes'); if(sub==='reflection')l=l.filter(n=>/рефлекс|подсозн|интерв/i.test([n.folder,n.title,(n.tags||[]).join(' ')].join(' '))); if(sub==='diary')l=l.filter(n=>/дневник|интерв/i.test([n.folder,n.title,(n.tags||[]).join(' ')].join(' '))); if(sub==='ideas')l=l.filter(n=>/иде/i.test([n.folder,n.title,(n.tags||[]).join(' ')].join(' '))); if(sub==='links')l=l.filter(n=>/https?:\/\//.test(n.text||n.note||'')); rows=l.map(n=>simpleRow('Заметка',n.title||n.folder,(n.text||n.note||'').slice(0,160),'editNote',n.id));}
    else if(root==='planning'){rows=allPlan2().filter(x=>x.root===sub).map(renderPlanRow);}
    else if(root==='habits'){ if(sub==='interview') rows=[dailyPanelV2()]; else rows=arr2('habits').map(h=>simpleRow('Привычка',h.title||h.name,h.note||'','editHabit',h.id)); }
    else if(root==='books'){let l=arr2('books'); if(sub==='quotes') rows=l.flatMap(b=>(b.quotes||[]).map(x=>simpleRow('Цитата',b.title,x,'editBook',b.id))); else if(sub==='insights') rows=l.filter(b=>b.insight).map(b=>simpleRow('Вывод',b.title,b.insight,'editBook',b.id)); else rows=l.map(b=>simpleRow('Книга',b.title,b.insight||((b.quotes||[])[0]),'editBook',b.id));}
    else if(root==='ideas'){rows=arr2('ideas').map(i=>simpleRow('Идея',i.title,i.note||i.text,'editIdea',i.id));}
    else if(root==='personal'){rows=arr2('media').map(m=>simpleRow('Личное',m.title,m.note,'editMedia',m.id));}
    else if(root==='documents'){rows=arr2('files').map(f=>simpleRow('Документ',f.title,f.url||f.note,'editFile',f.id));}
    else if(root==='trips'){rows=arr2('trips').map(t=>simpleRow('Поездка',t.title,t.budget?fmtMoney(t.budget):t.note,'editTrip',t.id));}
    else if(root==='diary'){ if(sub==='today') rows=[dailyPanelV2()]; else rows=arr2('subconsciousDiary').map(e=>simpleRow('Дневник',e.date||'',e.truth||e.step||e.notebook||e.question||'','editDailySubconsciousInterview',e.id));}
    else if(root==='wishlist'){let l=allPlan2().filter(x=>x.root==='wishlist'); if(sub==='mine')l=l.filter(x=>x.owner==='Я'||!x.owner); if(sub==='polina')l=l.filter(x=>x.owner==='Полина'); if(sub==='common')l=l.filter(x=>x.owner==='Общее'); rows=l.map(renderPlanRow);}
    else if(root==='payments'){let l=allPlan2().filter(x=>x.root==='payments'); if(sub==='mine')l=l.filter(x=>x.owner==='Я'||!x.owner); if(sub==='polina')l=l.filter(x=>x.owner==='Полина'); if(sub==='common')l=l.filter(x=>x.owner==='Общее'); rows=l.map(renderPlanRow);}
    return rows;
  }
  function dailyPanelV2(){
    return `<div class="fs-diary-card"><h3>Интервью с подсознанием</h3><p>Вопрос дня внутри интервью. Запись сохранится в дневник и заметки.</p><blockquote>Что я уже знаю, но пока не хочу признать?</blockquote><button class="btn" data-action="openDailySubconsciousInterview">Начать интервью</button></div>`;
  }
  function spheresRootV2(){
    const cards=sphereRoots.map(f=>folderTile('spheres',f[0],'',f[1],f[2],`${countSphereRoot(f[0])} записей`,f[3])).join('');
    return layout('Сферы жизни','',explorerHeader('spheres','Сферы жизни','Только папки. Открой сферу — внутри будут подпапки по категориям.')+`<section class="fs-grid">${cards}</section>`);
  }
  function spheresSubfoldersV2(root){
    const r=sphereRoots.find(x=>x[0]===root)||sphereRoots[0];
    const cards=(sphereSubs[root]||[['all','Все','☷']]).map(s=>folderTile('spheres',root,s[0],s[1],s[2],`${countSphereSub(root,s[0])} записей`,'отдельный лист')).join('');
    return layout('Сферы жизни · '+r[1],'',explorerHeader('spheres',r[1],'Это папка. Внутри только подпапки — никаких записей на этом уровне.',r[1])+`<section class="fs-grid">${cards}</section>`);
  }
  function spheresContentV2(root,sub){
    const r=sphereRoots.find(x=>x[0]===root)||sphereRoots[0]; const s=(sphereSubs[root]||[]).find(x=>x[0]===sub)||['all','Все','☷']; const rows=listSphereRows(root,sub); const addMap={people:'addPerson',notes:'addNote',books:'addBook',ideas:'addIdea',documents:'addFileNote',trips:'addTrip',wishlist:'addWishlistItem',payments:'addPaymentItem'}; const add=addMap[root]||'';
    return layout('Сферы жизни · '+s[1],'',explorerHeader('spheres',s[1],`Отдельный лист: ${r[1]} / ${s[1]}. Только выбранная категория.`,r[1]+' / '+s[1])+`<section class="card fs-content"><div class="card-head"><div><h3>${q(s[1])}</h3><p class="small muted">${rows.length} записей</p></div>${add?`<button class="btn secondary" data-action="${q(add)}">Добавить</button>`:''}</div><div class="fs-list">${rows.join('')||empty('В этой подпапке пока пусто')}</div></section>`);
  }
  function spheresPageV2(){setupV2(); const d=state.settings.fileExplorerV2.spheres||{}; if(!d.folder)return spheresRootV2(); if(!d.sub)return spheresSubfoldersV2(d.folder); return spheresContentV2(d.folder,d.sub);}

  function dashboardV2(){
    let s={actual:0,dailyLimit:0,toNext:0,daysToSalary:0,progress:0}; try{s=summary()}catch(e){}
    const plans=allPlan2().filter(x=>x.include!==false); const monthPlans=plans.filter(inCurrentMonth); const todayTasks=arr2('tasks').filter(t=>String(t.status||'')!=='Готово'&&t.due===today2()).slice(0,4);
    return layout('Обзор','Главный экран для контроля. Папки вынесены в Планирование и Сферы жизни.',`
      <section class="grid cols-4"><article class="card premium-hero-card"><h3>Фактический остаток</h3><div class="value">${fmtMoney(s.actual||0)}</div><p class="small muted">до зарплаты ${q(s.daysToSalary||0)} дн.</p></article><article class="card"><h3>Можно тратить в день</h3><div class="value sm">${fmtMoney(s.dailyLimit||0)}</div><p class="small muted">с учётом плана</p></article><article class="card"><h3>План расходов</h3><div class="value sm">${fmtMoney(sumRows(monthPlans))}</div><p class="small muted">на ${q(monthName2(month2()))}</p></article><article class="card"><h3>Активные долги</h3><div class="value sm">${(typeof activeDebts==='function'?activeDebts():arr2('debts')).filter(d=>String(d.status||'Активен')!=='Закрыт').length}</div><p class="small muted">открытых записей</p></article></section>
      <section class="grid cols-2" style="margin-top:18px"><article class="card"><div class="card-head"><h3>Сегодня</h3><button class="link" data-go="planning">Планирование →</button></div><div class="fs-list compact">${todayTasks.map(t=>typeof rowTask==='function'?rowTask(t):simpleRow('Задача',t.title,t.due,'editTask',t.id)).join('')||empty('Сегодня задач нет')}</div></article><article class="card"><div class="card-head"><h3>Быстрые папки</h3><span class="pill blue">без перегруза</span></div><div class="fs-quick"><button data-go="planning">☷<b>Планирование</b><small>${allPlan2().length} пунктов</small></button><button data-go="spheres">✣<b>Сферы жизни</b><small>${sphereRoots.length} папок</small></button><button data-go="finance">◔<b>Финансы</b><small>баланс и операции</small></button><button data-go="budget">◉<b>Бюджет</b><small>${fmtMoney(sumRows(monthPlans))}</small></button></div></article></section>
      <section class="grid cols-3" style="margin-top:18px"><article class="card"><div class="card-head"><h3>Вишлист</h3><button class="link" data-action="folderV2Open" data-section="planning" data-folder="wishlist">Открыть →</button></div>${allPlan2().filter(x=>x.root==='wishlist').slice(0,3).map(renderPlanRow).join('')||empty('Вишлист пуст')}</article><article class="card"><div class="card-head"><h3>Платежи</h3><button class="link" data-action="folderV2Open" data-section="planning" data-folder="payments">Открыть →</button></div>${allPlan2().filter(x=>x.root==='payments').slice(0,3).map(renderPlanRow).join('')||empty('Платежей нет')}</article><article class="card"><div class="card-head"><h3>Привычки</h3><button class="link" data-go="habits">Все →</button></div>${arr2('habits').slice(0,4).map(h=>simpleRow('Привычка',h.title||h.name,h.note||'','editHabit',h.id)).join('')||empty('Привычек нет')}</article></section>
    `);
  }
  function injectV2Css(){ if(document.getElementById('folderSystemV2Css'))return; const st=document.createElement('style'); st.id='folderSystemV2Css'; st.textContent=`
    .fs-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 18px}.fs-header h2{font-size:34px;line-height:1;margin:8px 0 6px}.fs-header p{margin:0;color:#64748b;font-size:15px}.fs-breadcrumb{padding:10px 14px;border:1px solid #dbeafe;border-radius:18px;background:rgba(255,255,255,.8);color:#64748b}.fs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:16px}.fs-folder{position:relative;min-height:150px;border:1px solid #d9e8f8;border-radius:28px;padding:20px 18px;text-align:left;background:linear-gradient(145deg,#fff,#f4f9ff);box-shadow:0 18px 48px rgba(37,99,235,.08);cursor:pointer;transition:.18s ease;overflow:hidden}.fs-folder:before{content:"";position:absolute;right:-24px;bottom:-24px;width:94px;height:72px;border-radius:38px;background:#e4f1ff}.fs-folder:hover{transform:translateY(-2px);border-color:#93c5fd;box-shadow:0 24px 66px rgba(37,99,235,.15)}.fs-tab{position:absolute;top:0;left:22px;width:74px;height:18px;border-radius:0 0 14px 14px;background:linear-gradient(135deg,#bfdbfe,#dbeafe)}.fs-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,#e0f2fe,#eff6ff);color:#1d4ed8;font-weight:900;margin:10px 0 16px}.fs-folder b{display:block;font-size:17px;color:#0f172a}.fs-folder small{display:block;margin-top:6px;color:#2563eb;font-weight:800}.fs-folder em{display:block;margin-top:8px;color:#64748b;font-size:12px;font-style:normal;line-height:1.25}.fs-content{border-radius:30px}.fs-list{display:grid;gap:10px}.fs-list.compact{gap:8px}.fs-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;border:1px solid #e2ecf8;background:#fff;border-radius:22px;padding:12px}.fs-row p{margin:5px 0 0;color:#64748b;font-size:13px}.fs-row-img{width:150px;height:96px;object-fit:cover;border-radius:18px;margin-right:12px}.fs-diary-card{border:1px solid #dbeafe;border-radius:26px;background:linear-gradient(145deg,#fff,#f7fbff);padding:20px}.fs-diary-card blockquote{margin:12px 0;padding:14px;border-left:4px solid #3b82f6;background:#eff6ff;border-radius:14px;color:#1e3a8a}.fs-quick{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.fs-quick button{border:1px solid #e2ecf8;border-radius:20px;background:#fff;padding:14px;text-align:left;cursor:pointer}.fs-quick button>b{display:block;margin-top:6px}.fs-quick button>small{display:block;color:#64748b;margin-top:4px}@media(max-width:760px){.fs-header{display:block}.fs-header h2{font-size:28px}.fs-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.fs-folder{min-height:132px;padding:16px}.fs-folder b{font-size:14px}.fs-row{grid-template-columns:1fr}.fs-quick{grid-template-columns:1fr}.fs-row-img{width:100%;height:150px}}
  `; document.head.appendChild(st); }
  const prevForceV2=window.SBOS_FORCE_ACTION;
  window.SBOS_FORCE_ACTION=function(action,id,el){
    try{ action=action||(el&&el.dataset&&el.dataset.action)||'';
      if(action==='folderV2Open'){setV2(el.dataset.section,el.dataset.folder,el.dataset.sub||''); return true;}
      if(action==='folderV2Back'){backV2(el.dataset.section); return true;}
      if(prevForceV2) return prevForceV2(action,id,el);
      return false;
    }catch(e){console.error('[folder v2 action]',e); try{toast('Ошибка: '+e.message)}catch(_){alert('Ошибка: '+e.message)} return true;}
  };
  document.addEventListener('click',function(ev){const el=ev.target&&ev.target.closest&&ev.target.closest('[data-action],[data-go]'); if(!el)return; if(el.dataset.go==='planning'||el.dataset.go==='spheres'){resetV2(el.dataset.go);} const a=el.dataset.action||''; if(a==='folderV2Open'||a==='folderV2Back'){ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation(); window.SBOS_FORCE_ACTION(a,el.dataset.id||'',el);}},true);
  const oldRenderV2=window.render||render;
  render=function(){setupV2(); try{renderNav()}catch(e){} const map={dashboard:dashboardV2,finance:financePage,budget:budgetPage,goals:goalsPage,planning:planningPageV2,spheres:spheresPageV2,habits:habitsPage,debts:debtsPage,trips:tripsPage,import:importPage,diagnostics:diagnosticsPage}; try{document.querySelector('#view').innerHTML=(map[page]||dashboardV2)()}catch(e){console.error('[folder system v2 render]',e); document.querySelector('#view').innerHTML=layout('Second Brain OS','Ошибка',`<section class="card"><h3>Ошибка</h3><p>${q(e.message)}</p></section>`)} setTimeout(()=>{try{injectV2Css(); if(typeof patchClickableButtons==='function')patchClickableButtons()}catch(e){}},0); return true;};
  window.render=render; window.planningPage=planningPageV2; window.spheresPage=spheresPageV2;
  try{setupV2(); injectV2Css(); render(); console.log('[Second Brain OS]',FOLDER_V2_BUILD)}catch(e){console.error('[folder system v2 init]',e)}
})();
