# Second Brain OS V86 — Autopilot

V86 развивает V85 без изменения утверждённого светлого фирменного стиля и без очистки существующих данных.

## Что добавлено

### Глобальная фиксация
Кнопка «Зафиксировать» доступна на любом экране. Она открывает существующий быстрый ввод мысли, задачи, расхода, события, эмоции или идеи.

### Автопилот дня
- утренний check-in;
- автоматическая вечерняя сводка;
- перенос незавершённых задач на завтра;
- недельный разбор;
- настройка следующей привычки из вишлиста;
- автоматическая активация выбранной привычки в следующий понедельник.

### Цели
После завершения шага приложение предлагает следующий этап автоматически. При включённой настройке создаётся связанная задача на следующий день.

### Очередь «Разобрать»
Запись можно не только скрыть навсегда, но и отложить на 7 дней.

### Книги
Прогресс, цитаты и сессии чтения сохранены. Добавлен прогноз оставшегося ритма чтения по последним сессиям.

### Достижения
Добавлены достижения за вечерние итоги, 10 сессий чтения, завершение цели и полностью разобранную очередь.

### Надёжность
- автоматический локальный снимок 1 раз в день;
- последние 14 снимков хранятся в IndexedDB;
- ручное создание и восстановление снимка;
- прежний JSON-экспорт сохранён;
- перед запуском V86 создаётся копия V85.

## Ограничение текущей архитектуры
V86 остаётся локальным приложением GitHub Pages. Облачная синхронизация между устройствами не включена, потому что для неё требуются отдельный проект базы данных, ключи и настройка авторизации.
