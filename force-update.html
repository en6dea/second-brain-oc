<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <title>Second Brain OS — Force Update</title>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f4ed;color:#201b16;margin:0;display:grid;place-items:center;min-height:100vh}.card{max-width:560px;background:#fffdfa;border:1px solid #eadfce;border-radius:24px;padding:28px;box-shadow:0 20px 50px rgba(72,54,34,.10)}b{display:block;font-size:24px;margin-bottom:8px}p{color:#6f665d;line-height:1.45}button{background:#4d8758;color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer}</style>
</head>
<body>
  <main class="card">
    <b>Обновляю Second Brain OS</b>
    <p id="status">Очищаю только кэш приложения и service worker. Данные операций и бэкапы не трогаю.</p>
    <button id="btn" type="button">Запустить ещё раз</button>
  </main>
  <script>
    const RELEASE = 'v40-12-buttons-hardwired-private-20260629';
    async function forceUpdate(){
      const status=document.getElementById('status');
      try{
        if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r=>r.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
        status.textContent='Кэш очищен. Сейчас открою новую сборку V40.12.';
        setTimeout(()=>location.replace('./?v='+RELEASE+'&force=1&t='+Date.now()), 700);
      }catch(e){
        status.textContent='Не получилось автоматически: '+(e.message||e)+'. Нажми кнопку ещё раз или открой приложение с новой ссылкой.';
      }
    }
    document.getElementById('btn').addEventListener('click', forceUpdate);
    forceUpdate();
  </script>
</body>
</html>
