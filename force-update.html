<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS — обновление</title><style>body{font-family:Manrope,system-ui;background:#f6f8fc;color:#0f172a;display:grid;place-items:center;min-height:100vh}.card{max-width:560px;background:white;border:1px solid #e5eaf2;border-radius:24px;padding:24px;box-shadow:0 18px 48px rgba(15,23,42,.08)}button{border:0;border-radius:16px;background:#2563eb;color:white;padding:12px 16px;font-weight:800}</style></head><body><div class="card"><h1>Second Brain OS</h1><p>Очищаю старый кэш и возвращаю на обычный домен.</p><button onclick="clean()">Очистить сейчас</button></div><script>async function clean(){try{if('serviceWorker'in navigator){const r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}if('caches'in window){const k=await caches.keys();await Promise.all(k.map(x=>caches.delete(x)))} }catch(e){} location.href='./'} clean();</script></body></html>
