<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Обновление Second Brain OS</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#fffdfb,#f4efff,#eefcff);font-family:Onest,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#17192b}
    .card{width:min(600px,100%);padding:34px;border:1px solid rgba(105,84,164,.14);border-radius:30px;background:rgba(255,255,255,.94);box-shadow:0 24px 70px rgba(83,62,137,.15);text-align:center}
    .orb{width:92px;height:92px;margin:auto;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff,#aa85f1 38%,#674bd0 72%);box-shadow:0 18px 40px rgba(111,79,207,.25);position:relative}
    .orb:after{content:"";position:absolute;left:-16px;right:-16px;top:38px;height:18px;border:7px solid rgba(255,255,255,.86);border-top-color:#7957dc;border-bottom-color:#bba3ff;border-radius:50%;transform:rotate(-12deg)}
    h1{font-size:30px;line-height:1.15;margin:24px 0 10px}p{color:#666c84;line-height:1.65;margin:0}
    .status{margin-top:20px;padding:14px;border-radius:16px;background:#f6f1ff;color:#674bd0;font-weight:650;line-height:1.5}
    .actions{display:none;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
    .actions.show{display:flex}
    a,button{min-height:46px;padding:0 18px;border-radius:14px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    a{border:0;background:linear-gradient(135deg,#875ee8,#6b4cd4);color:#fff;box-shadow:0 13px 28px rgba(107,76,212,.23)}
    button{border:1px solid rgba(105,84,164,.16);background:#fff;color:#674bd0}
    small{display:block;margin-top:16px;color:#8b90a5;line-height:1.5}
  </style>
</head>
<body>
  <main class="card">
    <div class="orb" aria-hidden="true"></div>
    <h1>Обновляем интерфейс</h1>
    <p>Удаляется только старый кэш файлов. Личные данные приложения не очищаются.</p>
    <div id="status" class="status">Подготовка…</div>
    <div id="actions" class="actions">
      <a id="openApp" href="#" target="_blank" rel="noopener">Открыть V86.1 в новой вкладке</a>
      <button id="retry" type="button">Повторить очистку</button>
    </div>
    <small>Новая вкладка нужна, чтобы старый Service Worker точно перестал управлять приложением. Этот экран больше не перенаправляет себя автоматически.</small>
  </main>
  <script>
    (() => {
      const status = document.getElementById('status');
      const actions = document.getElementById('actions');
      const openApp = document.getElementById('openApp');
      const retry = document.getElementById('retry');

      const appUrl = new URL('./app-v86-direct-20260721.html', window.location.href);
      appUrl.searchParams.set('v', '86.1');
      appUrl.searchParams.set('fresh', String(Date.now()));
      appUrl.hash = 'today';
      openApp.href = appUrl.href;

      async function clearUiCache() {
        actions.classList.remove('show');
        status.textContent = 'Удаляю старые версии интерфейса…';

        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.allSettled(registrations.map(registration => registration.unregister()));
          }

          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.allSettled(keys.map(key => caches.delete(key)));
          }

          status.textContent = 'Готово. Нажмите кнопку ниже — приложение откроется в новой чистой вкладке.';
        } catch (error) {
          console.error('[Second Brain cache reset]', error);
          status.textContent = 'Автоматическая очистка завершилась не полностью. Всё равно откройте приложение в новой вкладке.';
        }

        actions.classList.add('show');
      }

      retry.addEventListener('click', clearUiCache);
      openApp.addEventListener('click', () => {
        status.textContent = 'V86.1 открывается в новой вкладке. Эту вкладку можно закрыть.';
      });

      clearUiCache();
    })();
  </script>
</body>
</html>
