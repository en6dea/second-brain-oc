<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#f6f8fc"><title>Second Brain OS</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f8fc;font-family:system-ui;color:#0f172a}.box{background:white;border:1px solid #e5eaf2;border-radius:28px;padding:28px;max-width:460px;text-align:center;box-shadow:0 20px 60px rgba(15,23,42,.08)}.logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#38bdf8);display:grid;place-items:center;color:#fff;font-size:28px;margin:0 auto 14px}p{color:#64748b}</style></head><body><div class="box"><div class="logo">✣</div><h1>Second Brain OS</h1><p>Очищаю старые версии и кэш приложения…</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}}catch(e){}location.replace('./');})();</script></body></html>
