<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS — force update</title><style>body{font-family:Inter,Arial,sans-serif;background:#eef6ff;color:#0f172a;display:grid;place-items:center;min-height:100vh;margin:0}.box{background:#fff;border:1px solid #dbeafe;border-radius:28px;padding:28px;max-width:620px;box-shadow:0 24px 70px rgba(37,99,235,.14)}button,a{display:inline-flex;border:0;border-radius:16px;background:#2563eb;color:#fff;padding:12px 18px;font-weight:800;text-decoration:none;margin-top:10px}</style></head><body><div class="box"><h1>Second Brain OS обновляется</h1><p>Очищаю service worker и кэш, чтобы не грузились старые слои.</p><button id="go">Очистить и открыть приложение</button><p id="status"></p></div><script>async function clean(){const s=document.getElementById('status');try{s.textContent='Очищаю кэш...';if('serviceWorker'in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}if('caches'in window){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}localStorage.setItem('secondBrainOS.currentBuild','paged-sections-final-20260701');s.textContent='Готово. Открываю свежую версию...';setTimeout(()=>location.href='./?fresh=paged-sections-final-20260701-'+Date.now(),700)}catch(e){s.textContent='Ошибка: '+e.message}}document.getElementById('go').onclick=clean;clean();</script></body></html>
