<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS — Force Update</title><style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f7fbff;color:#0f172a;display:grid;place-items:center;min-height:100vh;margin:0}.card{background:#fff;border:1px solid #dbeafe;border-radius:28px;padding:28px;max-width:620px;box-shadow:0 24px 60px rgba(15,23,42,.08)}.btn{display:inline-block;background:#2563eb;color:#fff;padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:800;margin-top:16px}code{background:#eff6ff;padding:2px 6px;border-radius:8px}</style></head><body><div class="card"><h1>Second Brain OS</h1><p>Сейчас очищаю service worker и кэш.</p><p>Нужная сборка: <code>visual-clarity-hard-refresh-20260701-1</code></p><p id="status">Очистка...</p><a class="btn" id="go" href="./?v=visual-clarity-hard-refresh-20260701-1&t=1">Открыть приложение</a></div><script>
(async()=>{try{localStorage.setItem('secondBrainOS.currentBuild','visual-clarity-hard-refresh-20260701-1');localStorage.setItem('secondBrainOS.finalAddonBuild','visual-clarity-hard-refresh-20260701-1');localStorage.setItem('secondBrainOS.meta',JSON.stringify({app:'Second Brain OS',build:'visual-clarity-hard-refresh-20260701-1',updatedAt:new Date().toISOString()}));}catch(e){}
try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));}}catch(e){}
try{if('caches' in window){const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k)));}}catch(e){}
document.getElementById('status').textContent='Кэш очищен. Перехожу на новую версию...';
setTimeout(()=>location.href='./?v=visual-clarity-hard-refresh-20260701-1&t='+Date.now(),900);
})();
</script></body></html>
