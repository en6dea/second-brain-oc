<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS — обновление</title><style>body{font-family:Manrope,system-ui,sans-serif;background:#f6f8fc;color:#0f172a;display:grid;place-items:center;min-height:100vh;margin:0}.box{max-width:640px;background:#fff;border:1px solid #e6edf7;border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(15,23,42,.08)}.muted{color:#64748b}.ok{color:#10b981;font-weight:900}</style></head><body><div class="box"><h1>Second Brain OS</h1><p class="muted">Очищаю старый service worker и кэш, чтобы открылась свежая сборка с единой папкой планирования и прогнозом расходов по месяцам.</p><p id="status">Обновление...</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}localStorage.setItem('secondBrainOS.forceUpdatedAt',new Date().toISOString());localStorage.setItem('secondBrainOS.currentBuild','unified-planning-monthly-forecast-20260630');document.getElementById('status').innerHTML='<span class="ok">Готово.</span> Возвращаю в приложение...';setTimeout(()=>location.replace('./?fresh=unified-planning-monthly-forecast-'+Date.now()),900)}catch(e){document.getElementById('status').textContent='Ошибка: '+e.message}})()</script></body></html>
