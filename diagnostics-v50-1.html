<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Second Brain OS · Diagnostics V50</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f6f8fc;color:#0f172a;margin:0;padding:28px}.card{max-width:860px;margin:0 auto;background:#fff;border:1px solid #e6edf7;border-radius:24px;padding:22px;box-shadow:0 20px 50px rgba(15,23,42,.07)}h1{margin-top:0}code{background:#eef5ff;padding:4px 7px;border-radius:8px}.ok{color:#059669;font-weight:800}.warn{color:#d97706;font-weight:800}.btn{display:inline-flex;margin:6px 6px 0 0;padding:11px 14px;border-radius:14px;background:#2563eb;color:#fff;text-decoration:none;font-weight:800}.ghost{background:#fff;color:#2563eb;border:1px solid #bfdbfe}</style></head><body><main class="card"><h1>Diagnostics V50</h1><p><b>Сборка:</b> <code>second-brain-space-v50-learning-guide-20260708</code></p><p><b>Бейдж в приложении:</b> <code>V50 · ОБУЧЕНИЕ + МАРШРУТЫ</code></p><p class="ok">Проверить: в левом меню должен появиться раздел «Обучение».</p><p>Прямая ссылка:</p><p><a class="btn" href="./index.html?v=second-brain-space-v50-learning-guide-20260708#learning">Открыть обучение</a><a class="btn ghost" href="./index.html?v=second-brain-space-v50-learning-guide-20260708#focus-path">Открыть Фокус дня</a></p><h2>Очистка кэша</h2><p>Если видишь старую версию, нажми кнопку ниже:</p><button class="btn" onclick="clearAll()">Очистить кэш и перезагрузить</button><pre id="log"></pre><script>async function clearAll(){const log=document.getElementById('log');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));log.textContent+='SW cleared\n'}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));log.textContent+='Caches cleared\n'}setTimeout(()=>location.href='./index.html?v=second-brain-space-v50-learning-guide-20260708#learning',500)}catch(e){log.textContent+='Error: '+e.message}}</script></main></body></html>
