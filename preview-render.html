const todayKey=()=>new Date().toISOString().slice(0,10);
const monthKey=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const esc=v=>String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
const num=v=>Number(String(v??0).replace(/\s/g,'').replace(',','.').replace(/[^0-9.-]/g,''))||0;
const money=v=>`${Math.round(num(v)).toLocaleString('ru-RU')} ₽`;
const iso=d=>new Date(d).toISOString().slice(0,10);
const fmt=d=>{try{return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}catch(e){return d||'—'}};
let page=location.hash?location.hash.slice(1):'dashboard';
const navSections=[
  ['Главное',[
    ['dashboard','⌂','Обзор'],['finance','◔','Финансы'],['operations','↕','Платежи'],['budget','◉','Бюджет'],['goals','◎','Цели'],['planning','☷','Планирование']
  ]],
  ['Папки',[
    ['tasks','✓','Дела'],['planned','🛒','Плановые покупки'],['wishlist','♡','Хотелки'],['recurringPayments','₽','План-платежи'],['habits','◷','Привычки'],['trips','✈','Путешествия'],['interview','◉','Интервью'],['books','▣','Книги'],['notes','✎','Заметки'],['people','○','Люди'],['movies','▶','Фильмы']
  ]],
  ['Сервис',[
    ['import','⇣','Импорт'],['diagnostics','⚙','Диагностика']
  ]]
];
const navItems=navSections.flatMap(section=>section[1]);
const mobileItems=[['dashboard','⌂','Обзор'],['finance','◔','Финансы'],['planning','☷','План'],['budget','◉','Бюджет'],['notes','✎','Заметки']];
function defaultState(){const t=todayKey(),m=monthKey();return {settings:{currentMonth:m,currentBalance:0,importActualBalance:'',monthlyPlan:300000,lifeFolder:'overview',lifeSubFolder:'',ui:{}},categories:[{id:uid(),name:'Продукты',type:'expense',limit:35000},{id:uid(),name:'Дом',type:'expense',limit:25000},{id:uid(),name:'Транспорт',type:'expense',limit:15000},{id:uid(),name:'Кафе',type:'expense',limit:12000},{id:uid(),name:'Одежда',type:'expense',limit:15000},{id:uid(),name:'Здоровье',type:'expense',limit:10000},{id:uid(),name:'Доход',type:'income',limit:0}],operations:[{id:uid(),date:t,type:'income',amount:210000,category:'Доход',note:'Зарплата'},{id:uid(),date:t,type:'expense',amount:2450,category:'Продукты',note:'Магазин'}],tasks:[{id:uid(),title:'Проверить бюджет на неделю',area:'Финансы',due:t,time:'10:00',status:'В работе',priority:'B'}],calendarEvents:[],debts:[{id:uid(),person:'Кредит / карта',amount:45000,due:t,status:'Активен',note:'Первый долг к закрытию',direction:'owe'}],plannedPurchases:[{id:uid(),title:'Одежда на сезон',kind:'Покупка',owner:'Я',category:'Одежда',amount:12000,date:t,month:m,importance:'Важно',includeInBudget:true,note:'Поставить в лимит'}],goals:[{id:uid(),title:'Увеличить доход',area:'Финансы',targetValue:300000,currentValue:210000,deadline:'2026-12-31',week52:'Определить один шаг на этой неделе'}],habits:[{id:uid(),name:'Записать расходы',area:'Финансы',target:'ежедневно',marks:{[t]:true}},{id:uid(),name:'План дня',area:'Фокус',target:'ежедневно',marks:{}}],notes:[],people:[{id:uid(),name:'Полина',relation:'близкий человек',birthday:'1999-08-23',likes:'',talkIdeas:'',gifts:'',notes:''}],books:[],media:[],ideas:[],trips:[],files:[],spheres:[]}}
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'null')||defaultState()}catch(e){return defaultState()}}
let state=normalize(loadState());
function normalize(s){const d=defaultState();s=s&&typeof s==='object'?s:{};s.settings={...d.settings,...(s.settings||{})};s.settings.ui=s.settings.ui||{};['categories','operations','tasks','calendarEvents','debts','plannedPurchases','goals','habits','notes','people','books','media','ideas','trips','files','spheres'].forEach(k=>{if(!Array.isArray(s[k]))s[k]=d[k]||[]});s.safetyFund=s.safetyFund||{current:0,target:0};return s}
function save(snapshot=false){state=normalize(state);localStorage.setItem(STORE_KEY,JSON.stringify(state));localStorage.setItem(META_KEY,JSON.stringify({app:APP_NAME,build:BUILD,updatedAt:new Date().toISOString()}));localStorage.setItem('secondBrainOS.currentBuild',BUILD);if(snapshot)saveSnapshot()}
function saveSnapshot(){try{const list=JSON.parse(localStorage.getItem(SNAPSHOT_KEY)||'[]');list.unshift({app:APP_NAME,build:BUILD,createdAt:new Date().toISOString(),state});localStorage.setItem(SNAPSHOT_KEY,JSON.stringify(list.slice(0,8)))}catch(e){}}
function arr(k){if(!Array.isArray(state[k]))state[k]=[];return state[k]}
function ui(k,def){return state.settings.ui[k]??def}
function setUI(k,v){state.settings.ui[k]=v;save();render()}
function toast(msg){const t=$('#toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function layout(title,subtitle,body){return `<div class="page"><div class="hero"><div><h1>${title}</h1><p>${subtitle||''}</p></div><div class="date-pill">☷ ${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</div></div>${body}</div>`}
function pill(t,cls='blue'){return `<span class="pill ${cls}">${esc(t)}</span>`}
function empty(t){return `<div class="empty-state">${esc(t)}</div>`}
function formVal(id){return $('#'+id)?.value||''}
function field(label,id,val='',type='text'){return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(val)}"></div>`}
function area(label,id,val=''){return `<div class="field" style="grid-column:1/-1"><label>${label}</label><textarea id="${id}">${esc(val)}</textarea></div>`}
function openModal(title,html){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.add('show')}
function closeModal(){$('#modal').classList.remove('show')}
function renderNav(){
  $('#sidebarNav').innerHTML=navSections.map(([label,items])=>`<div class="nav-label">${label}</div>`+items.map(([id,ico,label])=>`<button class="nav-btn ${page===id?'active':''}" data-go="${id}"><span class="nav-ico">${ico}</span>${label}</button>`).join('')).join('');
  $('#bottomNav').innerHTML=mobileItems.map(([id,ico,label])=>`<button class="${page===id?'active':''}" data-go="${id}"><i>${ico}</i>${label}</button>`).join('')
}
function go(p){if(p==='spheres')p='dashboard';page=p;location.hash=p;render()}
window.addEventListener('hashchange',()=>{page=location.hash.slice(1)||'dashboard';if(page==='spheres')page='dashboard';render()});
function opsMonth(){const m=state.settings.currentMonth||monthKey();return arr('operations').filter(o=>String(o.date||'').startsWith(m))}
function incomeMonth(){return opsMonth().filter(o=>o.type==='income').reduce((a,o)=>a+num(o.amount),0)}
function expensesMonth(){return opsMonth().filter(o=>o.type==='expense').reduce((a,o)=>a+num(o.amount),0)}
function actualBalance(){const s=state.settings;if(String(s.importActualBalance??'').trim()!=='')return num(s.importActualBalance);if(String(s.currentBalance??'').trim()!=='')return num(s.currentBalance);return incomeMonth()-expensesMonth()}
function activeDebts(){return arr('debts').filter(d=>!['Закрыт','Закрыто','closed'].includes(String(d.status||'Активен')))}
function planIncluded(){return arr('plannedPurchases').filter(p=>p.includeInBudget!==false)}
function planMonthlySum(m=state.settings.currentMonth||monthKey()){return planIncluded().filter(p=>String(p.month||p.date||m).startsWith(m)).reduce((a,p)=>a+num(p.amount),0)}
function debtMonthlySum(m=state.settings.currentMonth||monthKey()){return activeDebts().filter(d=>String(d.due||d.date||'').startsWith(m)).reduce((a,d)=>a+num(d.amount),0)}
function dayFree(){const rest=actualBalance()-debtMonthlySum()-planMonthlySum();const d=new Date();const end=new Date(d.getFullYear(),d.getMonth()+1,0);return Math.max(0,Math.floor(rest/Math.max(1,end.getDate()-d.getDate()+1)))}
function budgetDays(){const base=new Date();const out=[];for(let i=-3;i<=3;i++){const d=new Date(base);d.setDate(base.getDate()+i);const key=iso(d);const ops=arr('operations').filter(o=>o.date===key);const inc=ops.filter(o=>o.type==='income').reduce((a,o)=>a+num(o.amount),0);const exp=ops.filter(o=>o.type==='expense').reduce((a,o)=>a+num(o.amount),0);const debt=activeDebts().filter(x=>x.due===key).reduce((a,x)=>a+num(x.amount),0);const plans=planIncluded().filter(x=>(x.date||x.due||'')===key).reduce((a,x)=>a+num(x.amount),0);out.push({key,label:fmt(key),sum:inc-exp-debt-plans,ops,inc,exp,debt,plans})}return out}
function budgetChart(){const days=budgetDays();const sel=ui('budgetDay',todayKey());const max=Math.max(1000,...days.map(d=>Math.abs(d.sum)));const selected=days.find(d=>d.key===sel)||days.find(d=>d.key===todayKey())||days[3];const bars=days.map(d=>`<button class="daybar ${d.key===selected.key?'active':''}" data-action="pickBudgetDay" data-day="${d.key}"><b class="${d.sum>=0?'green':'red'}" style="height:${22+Math.round(Math.abs(d.sum)/max*105)}px"></b><em>${esc(d.label)}</em></button>`).join('');const details=[...selected.ops.map(o=>`<div><b>${esc(o.note||o.category||'Операция')}</b><span>${o.type==='income'?'+':'−'}${money(o.amount)}</span></div>`),selected.debt?`<div><b>Долги к оплате</b><span>−${money(selected.debt)}</span></div>`:'',selected.plans?`<div><b>Плановые покупки</b><span>−${money(selected.plans)}</span></div>`:''].filter(Boolean).join('')||'<div><b>На эту дату записей нет</b><span>0 ₽</span></div>';return `<div class="chart">${bars}</div><div class="chart-note">Нажми на день — ниже покажу операции, долги и плановые покупки.</div><div class="day-sheet"><h4>${esc(selected.label)}</h4>${details}</div>`}
function habitsCompact(){const hs=arr('habits').slice(0,6);if(!hs.length)return empty('Привычек пока нет');return `<div class="habits-grid">${hs.map((h,idx)=>{const marks=h.marks||{};const on=Object.values(marks).filter(Boolean).length;const icons=['✎','🏃','📘','🧘','💧','☀'];return `<article class="habit-card"><i>${icons[idx%icons.length]}</i><b>${esc(h.name||'Привычка')}</b><small>${on} отметок</small><div class="dots">${Array.from({length:7},(_,i)=>`<span class="${i<Math.min(7,on)?'on':''}"></span>`).join('')}</div></article>`}).join('')}</div><button class="link" data-go="spheres">Все привычки в Сферах жизни →</button>`}
const questions=['Что я сейчас чувствую на самом деле?','Чего я избегаю и почему?','Что я уже знаю, но пока не хочу признать?','Что мне важно отпустить сегодня?','Какой один маленький шаг вернёт мне ясность?','Где я сам усложняю себе жизнь?','Что мне нужно услышать от себя честно?','Какое желание я откладываю?','Что я выбираю сегодня вместо тревоги?','Какая мысль тянет энергию, и чем её заменить?'];
const quotes=['Свобода начинается там, где заканчивается необходимость всё контролировать.','Честность с собой — это не жёсткость, а путь к ясности.','Маленький шаг часто честнее большого обещания.','То, что ты замечаешь, уже начинает меняться.','Сначала ясность, потом скорость.'];
function qIndex(){const d=new Date(todayKey()),start=new Date(d.getFullYear(),0,0);return Math.floor((d-start)/86400000)%questions.length}
function interviewCard(){const i=qIndex();return `<article class="card interview"><div class="card-head"><div><h3>Интервью с подсознанием</h3><p class="muted small">Вопрос меняется каждый день и не повторяется до конца цикла.</p></div><button class="btn secondary" data-action="openLifeFolder" data-folder="diary">История</button></div><div class="question"><span>Вопрос дня</span><b>${esc(questions[i])}</b><p>“${esc(quotes[i%quotes.length])}”</p></div><textarea id="interviewAnswer" placeholder="Ответь как в блокноте: честно, без цензуры..."></textarea><button class="btn wide" data-action="saveInterview">Ответить в дневнике</button></article>`}
function saveInterview(){const text=($('#interviewAnswer')?.value||'').trim();if(!text){toast('Напиши ответ');return}arr('notes').unshift({id:uid(),title:'Интервью с подсознанием',text:`${questions[qIndex()]}\n\n${text}`,folder:'Дневник',tags:['рефлексия','подсознание','интервью'],createdAt:todayKey(),date:todayKey()});let h=arr('habits').find(x=>/интервью|подсозн/i.test(x.name||''));if(!h){h={id:uid(),name:'Интервью с подсознанием',area:'Дневник',target:'ежедневно',marks:{}};arr('habits').push(h)}h.marks=h.marks||{};h.marks[todayKey()]=true;save(true);toast('Интервью сохранено в заметки');render()}
function categoryGroups(){const cats=arr('categories').map(c=>{const fact=opsMonth().filter(o=>String(o.category||'')===String(c.name||'')).reduce((a,o)=>a+num(o.amount),0);return {...c,fact}});const names=new Set(cats.map(c=>String(c.name||'').toLowerCase()));opsMonth().forEach(o=>{const nm=String(o.category||'Без категории');if(!names.has(nm.toLowerCase())){names.add(nm.toLowerCase());cats.push({id:'op-'+nm,name:nm,type:o.type||'expense',limit:0,fact:opsMonth().filter(x=>String(x.category||'')===nm).reduce((a,x)=>a+num(x.amount),0)})}});return cats}
function planItems(){const res=[];arr('tasks').filter(t=>String(t.status||'В работе')!=='Готово').forEach(t=>res.push({id:t.id,src:'task',kind:'Дело',title:t.title,owner:t.owner||'Я',date:t.due||'',amount:'',image:t.image||'',status:t.priority==='A'?'Важно':'В работе',area:t.area||''}));arr('calendarEvents').forEach(e=>res.push({id:e.id,src:'event',kind:'Календарь',title:e.title,owner:e.owner||'Я',date:e.date||'',amount:'',image:e.image||'',status:'Событие',area:e.area||''}));arr('plannedPurchases').forEach(p=>{let k=p.kind||p.type||'Покупка';if(/wish|хот|виш/i.test(String(k)+' '+String(p.folder||'')))k='Вишлист';if(/pay|плат/i.test(String(k)))k='Платёж';if(/будущ/i.test(String(k)))k='Будущая трата';res.push({id:p.id,src:'purchase',kind:k,title:p.title||p.name||'Пункт',owner:p.owner||p.person||p.forWhom||'Я',date:p.date||p.due||p.month||'',amount:num(p.amount),image:p.image||p.imageData||p.photo||'',status:p.status||p.importance||'Запланировано',area:p.category||''})});return res.sort((a,b)=>String(a.date).localeCompare(String(b.date)))}
function planRow(x){const colors={Дело:'blue',Календарь:'blue',Покупка:'green','Будущая трата':'amber',Вишлист:'violet',Платёж:'amber'};return `<div class="plan-row"><div class="thumb">${x.image?`<img src="${esc(x.image)}" onerror="this.parentElement.innerHTML='▧'">`:'<span>▧</span>'}</div><div class="plan-main">${pill(x.kind,colors[x.kind]||'blue')} ${pill(x.owner||'Я',x.owner==='Полина'?'violet':'blue')}<strong>${esc(x.title)}</strong><small>${esc(x.date||'без даты')} · ${esc(x.area||'')}</small></div><b>${x.amount?money(x.amount):'—'}</b><span class="pill green">${esc(x.status||'')}</span><button class="btn secondary" data-action="editPlan" data-src="${x.src}" data-id="${esc(x.id)}">Ред.</button></div>`}
function planFilter(items){const f=ui('planFilter','all');return items.filter(x=>f==='all'||(f==='tasks'&&['Дело','Календарь'].includes(x.kind))||(f==='purchases'&&['Покупка','Будущая трата'].includes(x.kind))||(f==='wishlist'&&x.kind==='Вишлист')||(f==='payments'&&x.kind==='Платёж')||(f==='interview'&&false))}
function reportCard(title,value,sub,cls='blue',go=''){return `<article class="card report-card ${go?'clickable':''}" ${go?`data-go="${go}"`:''}><div class="card-head"><h3>${title}</h3>${go?'<span class="link">Открыть</span>':''}</div><div class="value ${cls}">${value}</div><p class="muted small">${sub||''}</p></article>`}
function semanticFolder(go,title,ico,desc,count,cls='blue'){return `<button class="semantic-folder ${cls}" data-go="${go}"><i>${ico}</i><span><b>${title}</b><small>${desc}</small></span><em>${count}</em></button>`}
function semanticGroup(title,desc,items){return `<section class="semantic-section"><div class="semantic-title"><div><h2>${title}</h2><p>${desc}</p></div></div><div class="semantic-grid">${items.join('')}</div></section>`}
function appFolders(){return [
  ['Личная жизнь','Люди, фильмы, интервью и личные заметки.',[
    semanticFolder('people','Люди','○','Контакты, даты, подарки, темы разговора',arr('people').length,'blue'),
    semanticFolder('movies','Фильмы','▶','Что посмотреть, ссылки и идеи для вечера',arr('media').length,'violet'),
    semanticFolder('interview','Интервью','◉','Ежедневный диалог с подсознанием',arr('notes').filter(n=>(n.tags||[]).includes('интервью')).length,'green')]],
  ['Финансы','Деньги, платежи, бюджет, покупки и долги.',[
    semanticFolder('finance','Финансы','◔','Единый денежный дашборд',money(actualBalance()),'blue'),
    semanticFolder('operations','Платежи','↕','История операций по категориям',arr('operations').length,'green'),
    semanticFolder('budget','Бюджет','◉','Текущее состояние с учётом будущих расходов',money(dayFree()),'amber'),
    semanticFolder('planned','Плановые покупки','🛒','То, что уже решено купить',planItems().filter(x=>['Покупка','Будущая трата'].includes(x.kind)).length,'green'),
    semanticFolder('wishlist','Хотелки','♡','Вишлист с пометкой Я / Полина / Общее',planItems().filter(x=>x.kind==='Вишлист').length,'violet'),
    semanticFolder('recurringPayments','План-платежи','₽','Будущие обязательные платежи',planItems().filter(x=>x.kind==='Платёж').length,'amber'),
    semanticFolder('debts','Долги','▣','Я должен / мне должны / закрытые',arr('debts').length,'red')]],
  ['Цели и движение','Цели, дела, путешествия и недельные шаги.',[
    semanticFolder('goals','Цели','◎','SMART, задачи, заметки и действия недели',arr('goals').length,'blue'),
    semanticFolder('planning','Планирование','☷','Единый отчёт по делам и будущим расходам',planItems().length,'violet'),
    semanticFolder('tasks','Дела','✓','Задачи, сроки, приоритеты',arr('tasks').length,'green'),
    semanticFolder('trips','Путешествия','✈','Поездки, идеи, бюджеты',arr('trips').length,'amber')]],
  ['Память и знания','Всё, что хочется сохранить и переиспользовать.',[
    semanticFolder('notes','Заметки','✎','Дневник, мысли, рефлексия, идеи',arr('notes').length,'blue'),
    semanticFolder('books','Книги','▣','Книги, цитаты, выводы, что применить',arr('books').length,'violet'),
    semanticFolder('habits','Привычки','◷','Ритм, повторения, ежедневные действия',arr('habits').length,'green')]]
]}
function dashboardPage(){const all=planItems();const openTasks=arr('tasks').filter(t=>String(t.status||'В работе')!=='Готово').length;const monthlyPlanned=planMonthlySum();return layout('Обзор','Единая страница с отчётом по всему, что есть в Second Brain OS.',`<section class="premium-hero"><div><span>Second Brain OS</span><h2>Командный центр жизни</h2><p>Деньги, цели, планирование, люди, привычки и память собраны в понятные папки. На главной — только итог и быстрый вход.</p></div><div class="hero-metrics"><b>${money(actualBalance())}</b><small>фактический остаток</small><b>${openTasks}</b><small>открытых дел</small></div></section><section class="grid cols-4">${reportCard('Бюджет на день',money(dayFree()),'с учётом долгов и планов','blue','budget')}${reportCard('Запланировано',money(monthlyPlanned),'будущие покупки и платежи','amber','planning')}${reportCard('Цели',arr('goals').length,'активные направления','violet','goals')}${reportCard('Привычки',arr('habits').length,'ритм и повторения','green','habits')}</section><section class="dashboard-grid"><article class="card"><div class="card-head"><div><h3>Денежный график</h3><p class="muted small">Нажми на дату, чтобы посмотреть операции и планы.</p></div><button class="btn secondary" data-go="budget">В бюджет</button></div>${budgetChart()}</article><div class="right-stack">${interviewCard()}<article class="card"><div class="card-head"><h3>Ближайшие дела</h3><button class="link" data-go="tasks">Все</button></div>${all.slice(0,5).map(planRow).join('')||empty('План пуст')}</article></div></section>${appFolders().map(g=>semanticGroup(g[0],g[1],g[2])).join('')}`)}
function planningReportCard(title,value,sub,go,cls='blue'){return `<button class="folder-card planning-top ${cls}" data-go="${go}"><i>${title.slice(0,1)}</i><b>${title}</b><small>${value} · ${sub}</small></button>`}

3>Ближайшие пункты</h3><p class="muted small">Короткий список до 8 строк. Всё остальное открывается через папки выше.</p></div><button class="btn" data-action="addPlan">Добавить</button></div>${upcoming.map(planRow).join('')||empty('Пока нет планов')}</div><div>${interviewCard()}<article class="card" style="margin-top:18px"><div class="card-head"><h3>Привычки компактно</h3><button class="link" data-go="habits">Открыть</button></div>${habitsCompact()}</article></div></section>`)}
function pageObj(key,arrList,per=10){const p=Math.max(1,Number(ui(key,1))||1),pages=Math.max(1,Math.ceil(arrList.length/per)),pageN=Math.min(p,pages);return {key,items:arrList.slice((pageN-1)*per,pageN*per),page:pageN,pages,total:arrList.length}}
function pager(key,pages,page){return `<div class="pager"><button class="btn secondary" data-action="setPage" data-key="${key}" data-page="${Math.max(1,page-1)}">‹</button>${Array.from({length:pages},(_,i)=>`<button class="btn secondary ${i+1===page?'active':''}" data-action="setPage" data-key="${key}" data-page="${i+1}">${i+1}</button>`).join('')}<button class="btn secondary" data-action="setPage" data-key="${key}" data-page="${Math.min(pages,page+1)}">›</button></div>`}
function catTable(list,key,title){const pg=pageObj(key,list,10);return `<article class="table-card"><div class="card-head"><div><h3>${title}</h3><p class="muted small">Показано ${pg.items.length} из ${pg.total}</p></div><button class="btn secondary" data-action="addCategory">Категория</button></div><div class="table-wrap"><table class="table"><thead><tr><th>#</th><th>Категория</th><th>Тип</th><th>Лимит</th><th>Факт</th><th>Остаток</th><th></th></tr></thead><tbody>${pg.items.map((c,i)=>{const rest=num(c.limit)-num(c.fact);return `<tr><td>${(pg.page-1)*10+i+1}</td><td><span class="dot ${c.type==='income'?'green':'blue'}"></span><b>${esc(c.name)}</b></td><td>${c.type==='income'?'Доход':'Расход'}</td><td>${c.limit?money(c.limit):'—'}</td><td>${money(c.fact)}</td><td>${c.limit?money(rest):'—'}</td><td><button class="link" data-action="editCategory" data-id="${esc(c.id)}">Ред.</button> <button class="link danger" data-action="deleteCategory" data-id="${esc(c.id)}" data-name="${esc(c.name)}">Удалить</button></td></tr>`}).join('')}</tbody></table></div>${pager(key,pg.pages,pg.page)}</article>`}
function limitsTable(){const list=categoryGroups().filter(c=>c.type!=='income'&&num(c.limit)>0);const pg=pageObj('limitPage',list,10);return `<article class="table-card"><div class="card-head"><div><h3>Лимиты по категориям</h3><p class="muted small">По 10 лимитов на страницу</p></div><button class="btn secondary" data-action="addCategory">Добавить лимит</button></div><div class="table-wrap"><table class="table"><thead><tr><th>#</th><th>Категория</th><th>Лимит</th><th>Факт</th><th>Остаток</th><th>%</th></tr></thead><tbody>${pg.items.map((c,i)=>{const pct=Math.round(Math.min(100,num(c.fact)/(num(c.limit)||1)*100));const rest=num(c.limit)-num(c.fact);return `<tr><td>${(pg.page-1)*10+i+1}</td><td><span class="dot amber"></span><b>${esc(c.name)}</b></td><td>${money(c.limit)}</td><td>${money(c.fact)}</td><td>${money(rest)}</td><td><span class="mini-progress"><i style="width:${pct}%" class="${pct>90?'red':pct>70?'amber':''}"></i></span>${pct}%</td></tr>`}).join('')}</tbody></table></div>${pager('limitPage',pg.pages,pg.page)}</article>`}
function budgetPage(){const cats=categoryGroups();return layout('Бюджет','Плановые покупки выше, лимиты и категории — странично.',`<section class="grid cols-4"><article class="card"><h3>На месяц</h3><div class="value blue">${money(state.settings.monthlyPlan||incomeMonth())}</div><p class="muted small">${state.settings.currentMonth}</p></article><article class="card"><h3>Свободный остаток</h3><div class="value green">${money(actualBalance()-planMonthlySum()-debtMonthlySum())}</div><p class="muted small">с учётом планов и долгов</p></article><article class="card"><h3>Плановые покупки</h3><div class="value amber">${money(planMonthlySum())}</div><button class="link" data-action="scrollTo" data-target="plannedTop">Подробнее</button></article><article class="card"><h3>Лимиты</h3><div class="value violet">${cats.filter(c=>c.limit).length}</div><p class="muted small">категорий с лимитом</p></article></section><section class="folder-row"><button class="folder-card" data-action="scrollTo" data-target="plannedTop"><i>🛒</i><b>Плановые покупки</b><small>${arr('plannedPurchases').length} запланировано</small></button><button class="folder-card" data-action="scrollTo" data-target="limitsTop"><i>▣</i><b>Лимиты по категориям</b><small>10 на страницу</small></button><button class="folder-card" data-action="scrollTo" data-target="expenseCats"><i>↘</i><b>Категории расходов</b><small>${cats.filter(c=>c.type!=='income').length}</small></button><button class="folder-card" data-action="scrollTo" data-target="incomeCats"><i>↗</i><b>Категории доходов</b><small>${cats.filter(c=>c.type==='income').length}</small></button></section><section id="plannedTop" class="table-card" style="margin-top:18px"><div class="card-head"><div><h3>Плановые покупки</h3><p class="muted small">Влияют на прогноз расходов по месяцу</p></div><button class="btn" data-action="addPlan">Добавить</button></div>${planItems().filter(x=>['Покупка','Будущая трата','Вишлист','Платёж'].includes(x.kind)).slice(0,8).map(planRow).join('')||empty('Плановых пунктов нет')}</section><section id="limitsTop" style="margin-top:18px">${limitsTable()}</section><section id="expenseCats" style="margin-top:18px">${catTable(cats.filter(c=>c.type!=='income'),'budgetExpPage','Категории расходов')}</section><section id="incomeCats" style="margin-top:18px">${catTable(cats.filter(c=>c.type==='income'),'budgetIncPage','Категории доходов')}</section>`)}
function financePage(){const cats=categoryGroups();return layout('Финансы','Сводка и отдельные листы категорий, без длинной простыни.',`<section class="grid cols-4"><article class="card"><h3>Доходы</h3><div class="value green">${money(incomeMonth())}</div></article><article class="card"><h3>Расходы</h3><div class="value red">${money(expensesMonth())}</div></article><article class="card"><h3>План расходов</h3><div class="value amber">${money(planMonthlySum())}</div></article><article class="card"><h3>Остаток</h3><div class="value blue">${money(actualBalance())}</div></article></section><section class="folder-row"><button class="folder-card" data-go="budget"><i>🛒</i><b>Плановые покупки</b><small>${arr('plannedPurchases').length} пунктов</small></button><button class="folder-card" data-action="scrollTo" data-target="expenseCats"><i>↘</i><b>Категории расходов</b><small>${cats.filter(c=>c.type!=='income').length} категорий</small></button><button class="folder-card" data-action="scrollTo" data-target="incomeCats"><i>↗</i><b>Категории доходов</b><small>${cats.filter(c=>c.type==='income').length} категорий</small></button><button class="folder-card" data-go="debts"><i>▣</i><b>Долги</b><small>${arr('debts').length} записей</small></button></section><section id="expenseCats" style="margin-top:18px">${catTable(cats.filter(c=>c.type!=='income'),'expCatPage','Категории расходов')}</section><section id="incomeCats" style="margin-top:18px">${catTable(cats.filter(c=>c.type==='income'),'incCatPage','Категории доходов')}</section>`)}
function debtKind(d){return d.direction==='owed'||/мне/i.test(String(d.type||''))?'owed':'owe'}
function debtFiltered(){const f=ui('debtFilter','all');return arr('debts').filter(d=>{const active=!['Закрыт','Закрыто','closed'].includes(String(d.status||'Активен'));if(f==='all')return true;if(f==='owe')return debtKind(d)==='owe'&&active;if(f==='owed')return debtKind(d)==='owed'&&active;if(f==='closed')return !active;if(f==='soon'){const due=new Date(d.due||d.date||'2999-01-01');return active&&due-new Date()<8*86400000}return true})}
function debtsPage(){const owe=arr('debts').filter(d=>debtKind(d)==='owe'&&!['Закрыт','Закрыто','closed'].includes(String(d.status||'Активен'))),owed=arr('debts').filter(d=>debtKind(d)==='owed'&&!['Закрыт','Закрыто','closed'].includes(String(d.status||'Активен'))),closed=arr('debts').filter(d=>['Закрыт','Закрыто','closed'].includes(String(d.status||'')));const f=ui('debtFilter','all'),pg=pageObj('debtPage',debtFiltered(),10);return layout('Долги','По 10 позиций на страницу, с редактированием даты.',`<section class="grid cols-4"><article class="card"><h3>Я должен</h3><div class="value red">${money(owe.reduce((a,d)=>a+num(d.amount),0))}</div><p class="muted small">${owe.length} записей</p></article><article class="card"><h3>Мне должны</h3><div class="value green">${money(owed.reduce((a,d)=>a+num(d.amount),0))}</div><p class="muted small">${owed.length} записей</p></article><article class="card"><h3>Ближайшие сроки</h3><div class="value amber">${arr('debts').filter(d=>new Date(d.due||'2999-01-01')-new Date()<8*86400000).length}</div></article><article class="card"><h3>Закрытые</h3><div class="value blue">${money(closed.reduce((a,d)=>a+num(d.amount),0))}</div></article></section><section class="folder-row"><button class="folder-card ${f==='all'?'active':''}" data-action="debtFilter" data-filter="all"><i>▣</i><b>Все долги</b><small>${arr('debts').length}</small></button><button class="folder-card ${f==='owe'?'active':''}" data-action="debtFilter" data-filter="owe"><i>↘</i><b>Я должен</b><small>${owe.length}</small></button><button class="folder-card ${f==='owed'?'active':''}" data-action="debtFilter" data-filter="owed"><i>↗</i><b>Мне должны</b><small>${owed.length}</small></button><button class="folder-card ${f==='soon'?'active':''}" data-action="debtFilter" data-filter="soon"><i>●</i><b>Ближайшие</b><small>сроки</small></button><button class="folder-card ${f==='closed'?'active':''}" data-action="debtFilter" data-filter="closed"><i>✓</i><b>Закрытые</b><small>${closed.length}</small></button></section><article class="table-card" style="margin-top:18px"><div class="card-head"><div><h3>Все долги</h3><p class="muted small">Показано ${pg.items.length} из ${pg.total}</p></div><button class="btn" data-action="addDebt">Добавить долг</button></div><div class="table-wrap"><table class="table"><thead><tr><th>Кто / кому</th><th>Описание</th><th>Когда вернуть</th><th>Сумма</th><th>Тип</th><th></th></tr></thead><tbody>${pg.items.map(d=>`<tr><td><span class="dot ${debtKind(d)==='owed'?'green':'red'}"></span><b>${esc(d.person||d.name||'Долг')}</b></td><td>${esc(d.note||d.comment||'—')}</td><td>${esc(d.due||d.date||'—')}</td><td><b class="${debtKind(d)==='owed'?'green':'red'}">${money(d.amount)}</b></td><td>${debtKind(d)==='owed'?pill('Мне должны','green'):pill('Я должен','red')}</td><td><button class="link" data-action="remindDebt" data-id="${esc(d.id)}">Напомнить</button> <button class="link" data-action="editDebt" data-id="${esc(d.id)}">Ред.</button> <button class="link" data-action="closeDebt" data-id="${esc(d.id)}">Закрыть</button></td></tr>`).join('')}</tbody></table></div>${pager('debtPage',pg.pages,pg.page)}</article>`)}
function goalsPage(){const goals=arr('goals');const pg=pageObj('goalsPage',goals,4);const tasks=arr('tasks');return layout('Цели','SMART-цели с задачами, заметками и подсказками на неделю.',`<section class="premium-hero goal-hero"><div><span>52 недели</span><h2>Цели должны подталкивать к действию</h2><p>Каждая цель получает шаг недели, примечания и подсказку: что сделать маленьким действием прямо сейчас.</p></div><button class="btn" data-action="addGoal">Новая цель</button></section><section class="grid cols-4">${reportCard('Всего целей',goals.length,'в системе','blue')}${reportCard('Активные',goals.filter(g=>String(g.status||'')!=='Готово').length,'требуют движения','green')}${reportCard('Задачи по целям',tasks.filter(t=>t.goalId||/цель/i.test(String(t.area||''))).length,'связанные действия','amber')}${reportCard('С картинками',goals.filter(g=>g.image||g.imageData).length,'визуальная мотивация','violet')}</section><section class="grid cols-2" style="margin-top:18px">${pg.items.map(g=>{const pct=Math.min(100,Math.round(num(g.progress||g.currentValue)/(num(g.targetValue)||1)*100)||0);const related=tasks.filter(t=>t.goalId===g.id||String(t.area||'').toLowerCase().includes(String(g.title||'').toLowerCase().slice(0,6))).slice(0,3);return `<article class="card goal-card"><div class="card-head"><div><h3>${esc(g.title)}</h3><p class="muted small">${esc(g.area||'Цель')}</p></div><span class="pill blue">${pct}%</span></div>${g.image||g.imageData?`<img class="goal-img" src="${esc(g.image||g.imageData)}">`:''}<div class="progress"><b style="width:${pct}%"></b></div><div class="goal-advice"><b>Подсказка недели</b><p>${esc(g.week52||g.nextAction||'Выбери один маленький шаг на эту неделю и закрепи его задачей.')}</p></div><div class="linked-list"><b>Связанные задачи</b>${related.map(t=>`<div class="mini-line"><span>${esc(t.title)}</span><small>${esc(t.due||'без срока')}</small></div>`).join('')||'<p class="muted small">Пока задач нет — создай первый шаг.</p>'}</div><div class="actions"><button class="btn secondary" data-action="editGoal" data-id="${esc(g.id)}">Редактировать</button><button class="btn danger" data-action="deleteGoal" data-id="${esc(g.id)}">Удалить</button></div></article>`}).join('')||empty('Целей нет')}</section>${pager('goalsPage',pg.pages,pg.page)}`)}

function spheresPage(){const f=state.settings.lifeFolder||'overview',sub=state.settings.lifeSubFolder||'';const folders=[['people','Люди','○',arr('people').length],['notes','Заметки','✎',arr('notes').length],['planning','Планирование','☷',planItems().length],['habits','Привычки','◷',arr('habits').length],['books','Книги','▣',arr('books').length],['ideas','Идеи','✦',arr('ideas').length],['personal','Личная жизнь','♡',arr('media').length],['documents','Документы','▤',arr('files').length],['trips','Путешествия','✈',arr('trips').length],['diary','Дневник','◉',arr('notes').filter(n=>(n.tags||[]).includes('интервью')||n.folder==='Дневник').length],['wishlist','Вишлист','♡',planItems().filter(x=>x.kind==='Вишлист').length],['payments','Платежи','₽',planItems().filter(x=>x.kind==='Платёж').length]];if(f==='overview')return layout('Сферы жизни','Сначала папки. Записи открываются только внутри выбранной подпапки.',`<section class="folder-row">${folders.map(x=>folderCard(...x)).join('')}</section>`);const meta=folders.find(x=>x[0]===f)||['overview','Сферы','☷',0];if(!sub){const subs={people:[['all','Все люди'],['birthdays','Дни рождения'],['gifts','Подарки'],['talk','Темы разговора']],notes:[['all','Все заметки'],['diary','Дневник'],['ideas','Идеи из заметок']],planning:[['tasks','Задачи'],['purchases','Покупки'],['wishlist','Вишлист'],['payments','Платежи']],habits:[['all','Все привычки'],['today','Сегодня'],['stats','Повторы']],books:[['all','Все книги'],['quotes','Цитаты']],ideas:[['all','Все идеи']],personal:[['media','Фильмы/сериалы'],['dates','Даты']],documents:[['all','Все документы']],trips:[['all','Все поездки']],diary:[['interview','Интервью'],['all','Все записи']],wishlist:[['all','Весь вишлист'],['me','Я'],['polina','Полина']],payments:[['all','Все платежи'],['me','Я'],['polina','Полина']]};return layout(meta[1],'<button class="link" data-action="backLife">← Все сферы</button>',`<section class="subgrid">${(subs[f]||[['all','Все']]).map(s=>`<button class="folder-card" data-action="openLifeSub" data-folder="${f}" data-sub="${s[0]}"><i>${meta[2]}</i><b>${s[1]}</b><small>открыть лист</small></button>`).join('')}</section>`)}return layout(meta[1]+' / '+sub,'<button class="link" data-action="openLifeFolder" data-folder="'+f+'">← Назад к подпапкам</button>',lifeContent(f,sub))}
function lifeContent(f,sub){if(f==='habits')return `<section class="card"><div class="card-head"><h3>Привычки</h3><button class="btn" data-action="addHabit">Добавить</button></div>${habitsCompact()}</section>`;if(f==='diary')return `<section class="card">${interviewCard()}</section><section class="grid cols-2" style="margin-top:18px">${arr('notes').filter(n=>n.folder==='Дневник'||(n.tags||[]).includes('интервью')).map(n=>`<article class="card"><h3>${esc(n.title)}</h3><p class="muted small">${esc(n.createdAt||n.date||'')}</p><p>${esc(n.text||'')}</p></article>`).join('')||empty('Записей дневника пока нет')}</section>`;if(f==='wishlist')return `<section class="card">${planItems().filter(x=>x.kind==='Вишлист'&&(sub==='all'||(sub==='me'&&x.owner==='Я')||(sub==='polina'&&x.owner==='Полина'))).map(planRow).join('')||empty('Пусто')}</section>`;if(f==='payments')return `<section class="card">${planItems().filter(x=>x.kind==='Платёж'&&(sub==='all'||(sub==='me'&&x.owner==='Я')||(sub==='polina'&&x.owner==='Полина'))).map(planRow).join('')||empty('Пусто')}</section>`;if(f==='planning')return `<section class="card">${planItems().slice(0,12).map(planRow).join('')||empty('План пуст')}</section>`;if(f==='people')return `<section class="grid cols-2">${arr('people').map(p=>`<article class="card"><h3>${esc(p.name)}</h3><p class="muted small">${esc(p.relation||'')} ${p.birthday?'· '+esc(p.birthday):''}</p><p>${esc(p.notes||p.likes||'')}</p></article>`).join('')||empty('Людей пока нет')}</section>`;if(f==='notes')return `<section class="grid cols-2">${arr('notes').map(n=>`<article class="card"><h3>${esc(n.title)}</h3><p class="muted small">${esc(n.folder||'')}</p><p>${esc(n.text||'')}</p></article>`).join('')||empty('Заметок пока нет')}</section>`;return `<section class="card">${empty('В этой подпапке пока нет записей')}</section>`}
function operationsPage(){const ops=arr('operations').slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));const pg=pageObj('operationsPage',ops,10);const groups=categoryGroups();return layout('Платежи','История операций по категориям: доходы, расходы и быстрый переход к категориям.',`<section class="grid cols-4">${reportCard('Доходы месяца',money(incomeMonth()),'по операциям','green')}${reportCard('Расходы месяца',money(expensesMonth()),'по операциям','red')}${reportCard('Категорий',groups.length,'используются в истории','blue')}${reportCard('Операций',ops.length,'всего сохранено','violet')}</section><section class="semantic-section"><div class="semantic-title"><div><h2>Категории платежей</h2><p>Открывай категории и смотри историю без длинной простыни.</p></div><button class="btn secondary" data-action="addCategory">Добавить категорию</button></div><div class="semantic-grid">${groups.slice(0,8).map(c=>semanticFolder('operations',c.name,c.type==='income'?'↗':'↘',`${c.type==='income'?'Доход':'Расход'} · факт ${money(c.fact||0)}`,money(c.limit||0),c.type==='income'?'green':'red')).join('')||empty('Категорий нет')}</div></section><article class="table-card"><div class="card-head"><div><h3>История операций</h3><p class="muted small">10 строк на страницу</p></div><div class="actions"><button class="btn secondary" data-action="addIncome">Доход</button><button class="btn secondary" data-action="addExpense">Расход</button></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Дата</th><th>Тип</th><th>Категория</th><th>Описание</th><th>Сумма</th></tr></thead><tbody>${pg.items.map(o=>`<tr><td>${esc(o.date||'')}</td><td>${o.type==='income'?pill('Доход','green'):pill('Расход','red')}</td><td><b>${esc(o.category||'Без категории')}</b></td><td>${esc(o.note||o.description||'—')}</td><td><b class="${o.type==='income'?'green':'red'}">${money(o.amount)}</b></td></tr>`).join('')}</tbody></table></div>${pager('operationsPage',pg.pages,pg.page)}</article>`)}
function tasksPage(){const tasks=arr('tasks').slice().sort((a,b)=>String(a.due||'').localeCompare(String(b.due||'')));const pg=pageObj('tasksPage',tasks,10);return layout('Дела','Отдельная папка задач: сроки, приоритеты и статус.',`<section class="grid cols-3">${reportCard('Всего дел',tasks.length,'в системе','blue')}${reportCard('В работе',tasks.filter(t=>String(t.status||'')!=='Готово').length,'открытые','green')}${reportCard('Сегодня',tasks.filter(t=>t.due===todayKey()).length,'на сегодня','amber')}</section><article class="table-card" style="margin-top:18px"><div class="card-head"><div><h3>Список дел</h3><p class="muted small">10 строк на страницу</p></div><button class="btn" data-action="addTask">Добавить дело</button></div>${pg.items.map(t=>planRow({id:t.id,src:'task',kind:'Дело',title:t.title,owner:t.owner||'Я',date:t.due||'',amount:'',image:t.image||'',status:t.status||t.priority||'В работе',area:t.area||''})).join('')||empty('Дел пока нет')}${pager('tasksPage',pg.pages,pg.page)}</article>`)}
function plannedPage(){const items=planItems().filter(x=>['Покупка','Будущая трата'].includes(x.kind));const pg=pageObj('plannedPage',items,10);return folderListPage('plannedPage','Плановые покупки','Решённые покупки и будущие траты, которые могут влиять на бюджет.',items,pg,'addPlan')}
function wishlistPage(){const items=planItems().filter(x=>x.kind==='Вишлист');const pg=pageObj('wishlistPage',items,10);return folderListPage('wishlistPage','Хотелки','Общий вишлист с тегами Я / Полина / Общее.',items,pg,'addPlan')}
function recurringPaymentsPage(){const items=planItems().filter(x=>x.kind==='Платёж');const pg=pageObj('recurringPaymentsPage',items,10);return folderListPage('recurringPaymentsPage','План-платежи','Будущие обязательные платежи и регулярные расходы.',items,pg,'addPlan')}
function folderListPage(key,title,subtitle,all,pg,action){return layout(title,subtitle,`<section class="grid cols-3">${reportCard('Всего',all.length,'пунктов','blue')}${reportCard('Сумма',money(all.reduce((a,x)=>a+num(x.amount),0)),'запланировано','amber')}${reportCard('Полина / Я',`${all.filter(x=>x.owner==='Полина').length} / ${all.filter(x=>x.owner!=='Полина').length}`,'по владельцам','violet')}</section><article class="table-card" style="margin-top:18px"><div class="card-head"><div><h3>${title}</h3><p class="muted small">10 строк на страницу</p></div><button class="btn" data-action="${action}">Добавить</button></div>${pg.items.map(planRow).join('')||empty('Записей пока нет')}${pager(key,pg.pages,pg.page)}</article>`)}
function habitsPage(){const habits=arr('habits');return layout('Привычки','Отдельная папка ритма. Компактно, без перегруза.',`<section class="grid cols-3">${reportCard('Всего привычек',habits.length,'в работе','green')}${reportCard('Сегодня',habits.length,'можно отметить','blue')}${reportCard('Интервью',arr('notes').filter(n=>(n.tags||[]).includes('интервью')).length,'ответов сохранено','violet')}</section><article class="card" style="margin-top:18px"><div class="card-head"><div><h3>Привычки</h3><p class="muted small">Карточки в ширину, чтобы не растягивать страницу.</p></div><button class="btn" data-action="addHabit">Добавить</button></div>${habitsCompact()}</article>`)}
function booksPage(){const books=arr('books');return layout('Книги','Книги, цитаты, выводы и то, что хочется применить.',`<section class="grid cols-3">${reportCard('Книг',books.length,'в библиотеке','violet')}${reportCard('Цитат',books.reduce((a,b)=>a+(Array.isArray(b.quotes)?b.quotes.length:0),0),'сохранено','blue')}${reportCard('В работе',books.filter(b=>/чита|process|в работе/i.test(String(b.status||''))).length,'читается','green')}</section><article class="card" style="margin-top:18px"><h3>Библиотека</h3>${books.map(b=>`<div class="mini-line"><b>${esc(b.title||b.name||'Книга')}</b><span>${esc(b.author||'')}</span><strong>${esc(b.status||'')}</strong></div>`).join('')||empty('Книг пока нет')}</article>`)}
function notesPage(){const notes=arr('notes').slice().sort((a,b)=>String(b.createdAt||b.date||'').localeCompare(String(a.createdAt||a.date||'')));const pg=pageObj('notesPage',notes,10);return layout('Заметки','Память: дневник, идеи, рефлексия и важные мысли.',`<section class="grid cols-3">${reportCard('Заметок',notes.length,'всего','blue')}${reportCard('Дневник',notes.filter(n=>/днев|рефлекс|интервью/i.test(String(n.folder||'')+' '+String((n.tags||[]).join(' ')))).length,'личные записи','violet')}${reportCard('Идеи',notes.filter(n=>/иде/i.test(String(n.folder||'')+' '+String((n.tags||[]).join(' ')))).length,'для будущего','green')}</section><article class="table-card" style="margin-top:18px"><div class="card-head"><h3>Все заметки</h3><button class="btn" data-action="addNote">Добавить</button></div>${pg.items.map(n=>`<article class="note-line"><b>${esc(n.title||'Заметка')}</b><small>${esc(n.folder||'')} · ${esc(n.createdAt||n.date||'')}</small><p>${esc((n.text||'').slice(0,170))}</p></article>`).join('')||empty('Заметок пока нет')}${pager('notesPage',pg.pages,pg.page)}</article>`)}
function peoplePage(){const people=arr('people');return layout('Люди','Контакты, дни рождения, подарки и темы разговора.',`<section class="grid cols-3">${reportCard('Людей',people.length,'в памяти','blue')}${reportCard('Подарков',people.reduce((a,p)=>a+(Array.isArray(p.gifts)?p.gifts.length:0),0),'идей','violet')}${reportCard('Тем',people.reduce((a,p)=>a+(Array.isArray(p.talkIdeas)?p.talkIdeas.length:0),0),'для разговоров','green')}</section><article class="card" style="margin-top:18px"><h3>Люди</h3>${people.map(p=>`<div class="mini-line"><b>${esc(p.name||'Человек')}</b><span>${esc(p.birthday||'')}</span><strong>${esc(p.note||'')}</strong></div>`).join('')||empty('Людей пока нет')}</article>`)}
function moviesPage(){const media=arr('media');return layout('Фильмы','Фильмы и сериалы, которые хочется посмотреть.',`<section class="grid cols-3">${reportCard('Всего',media.length,'идей','violet')}${reportCard('Фильмы',media.filter(m=>!/сериал/i.test(String(m.type||''))).length,'в списке','blue')}${reportCard('Сериалы',media.filter(m=>/сериал/i.test(String(m.type||''))).length,'в списке','green')}</section><article class="card" style="margin-top:18px"><h3>Список</h3>${media.map(m=>`<div class="mini-line"><b>${esc(m.title||m.name||'Фильм')}</b><span>${esc(m.type||'')}</span><strong>${m.link?`<a class="link" href="${esc(m.link)}" target="_blank">Открыть</a>`:''}</strong></div>`).join('')||empty('Фильмов пока нет')}</article>`)}
function interviewPage(){return layout('Интервью с подсознанием','Ежедневная практика: вопрос меняется и сохраняется в заметки.',`<section class="grid cols-2"><div>${interviewCard()}</div><article class="card"><div class="card-head"><h3>История интервью</h3><button class="link" data-go="notes">Все заметки</button></div>${arr('notes').filter(n=>(n.tags||[]).includes('интервью')||/интервью/i.test(String(n.folder||''))).slice(0,8).map(n=>`<article class="note-line"><b>${esc(n.title||'Интервью')}</b><small>${esc(n.createdAt||n.date||'')}</small><p>${esc((n.text||'').slice(0,190))}</p></article>`).join('')||empty('Ответов пока нет')}</article></section>`)}
function tripsPage(){return layout('Путешествия','Планы поездок и бюджеты.',`<section class="card"><div class="card-head"><h3>Поездки</h3><button class="btn" data-action="addTrip">Добавить</button></div>${arr('trips').map(t=>`<div class="mini-line"><b>${esc(t.title||t.place||'Поездка')}</b><span>${esc(t.date||'')}</span><strong>${money(t.budget||0)}</strong></div>`).join('')||empty('Поездок пока нет')}</section>`)}
function importPage(){return layout('Импорт','Экспорт, импорт и резервная копия данных.',`<section class="grid cols-2"><article class="card"><h3>Экспорт</h3><p class="muted">Скачай полный JSON перед обновлением.</p><button class="btn" data-action="exportData">Скачать экспорт</button></article><article class="card"><h3>Импорт JSON</h3><input id="importFile" type="file" accept="application/json"><div class="actions"><button class="btn" data-action="importData">Загрузить</button></div></article></section>`)}
function diagnosticsPage(){return layout('Диагностика','Проверка активной сборки и восстановленного визуала.',`<section class="card"><div class="card-head"><h3>Активная версия</h3>${pill('Premium Semantic Folders','green')}</div><div class="value">${BUILD}</div><p class="muted small">Если здесь не эта версия — браузер или GitHub Pages ещё отдают старый кэш.</p><div class="actions"><button class="btn secondary" data-action="clearCaches">Очистить кэш сайта</button><button class="btn" data-action="exportData">Экспорт</button></div></section><section class="grid cols-3" style="margin-top:18px"><article class="card"><h3>Планирование</h3><p class="muted small">Навигация разделена на главное и отдельные папки: без Сфер жизни.</p></article><article class="card"><h3>Страничность</h3><p class="muted small">Типографика облегчена: меньше жирности, больше воздуха, аккуратные карточки.</p></article><article class="card"><h3>Дубли</h3><p class="muted small">Сферы жизни убраны: люди, книги, заметки, привычки, путешествия и фильмы вынесены отдельно.</p></article></section>`)}
function addPlan(){openPlanModal()}
function openPlanModal(p=null){openModal(p?'Редактировать пункт':'Планирование',`<div class="form-grid"><div class="field"><label>Тип</label><select id="p_kind"><option ${p?.kind==='Покупка'?'selected':''}>Покупка</option><option ${p?.kind==='Вишлист'?'selected':''}>Вишлист</option><option ${p?.kind==='Платёж'?'selected':''}>Платёж</option><option ${p?.kind==='Будущая трата'?'selected':''}>Будущая трата</option></select></div><div class="field"><label>Кому</label><select id="p_owner"><option ${p?.owner==='Я'?'selected':''}>Я</option><option ${p?.owner==='Полина'?'selected':''}>Полина</option><option ${p?.owner==='Общее'?'selected':''}>Общее</option></select></div>${field('Название','p_title',p?.title||'')}${field('Сумма','p_amount',p?.amount||'')}${field('Дата','p_date',String(p?.date||todayKey()).slice(0,10),'date')}${field('Категория','p_category',p?.category||p?.area||'Планирование')}<div class="field" style="grid-column:1/-1"><label>Картинка</label><input id="p_image" type="file" accept="image/*"><input id="p_image_old" type="hidden" value="${esc(p?.image||'')}"><small class="muted">Картинка сохраняется внутри браузера, не как ссылка.</small></div></div><div class="actions"><button class="btn" data-action="${p?'saveEditedPlan':'savePlan'}" ${p?`data-id="${p.id}"`:''}>Сохранить</button></div>`)}
function readImage(cb){const file=$('#p_image')?.files?.[0];if(!file){cb($('#p_image_old')?.value||'');return}const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file)}
function savePlan(id=''){readImage(img=>{const item={id:id||uid(),title:formVal('p_title')||'Пункт планирования',kind:formVal('p_kind')||'Покупка',owner:formVal('p_owner')||'Я',amount:num(formVal('p_amount')),date:formVal('p_date')||todayKey(),month:(formVal('p_date')||todayKey()).slice(0,7),category:formVal('p_category')||'Планирование',includeInBudget:true,image:img,status:'Запланировано'};const list=arr('plannedPurchases');const old=list.find(x=>x.id===id);if(old)Object.assign(old,item);else list.unshift(item);save(true);closeModal();toast('Сохранено');render()})}
function editPlan(src,id){if(src==='task')return editTask(id);const p=arr('plannedPurchases').find(x=>x.id===id);if(p)openPlanModal({...p,kind:p.kind||p.type||'Покупка',owner:p.owner||p.person||'Я'})}
function addTask(){openModal('Новая задача',`<div class="form-grid">${field('Задача','t_title')}${field('Сфера','t_area','Личное')}${field('Дата','t_due',todayKey(),'date')}${field('Время','t_time','','time')}</div><div class="actions"><button class="btn" data-action="saveTask">Сохранить</button></div>`)}
function saveTask(){arr('tasks').unshift({id:uid(),title:formVal('t_title')||'Новая задача',area:formVal('t_area')||'Личное',due:formVal('t_due')||todayKey(),time:formVal('t_time'),status:'В работе',priority:'B'});save(true);closeModal();render()}
function editTask(id){const t=arr('tasks').find(x=>x.id===id);if(!t)return;openModal('Редактировать задачу',`<div class="form-grid">${field('Задача','t_title',t.title)}${field('Сфера','t_area',t.area)}${field('Дата','t_due',t.due,'date')}${field('Время','t_time',t.time,'time')}</div><div class="actions"><button class="btn" data-action="saveEditedTask" data-id="${id}">Сохранить</button></div>`)}
function saveEditedTask(id){const t=arr('tasks').find(x=>x.id===id);if(t){t.title=formVal('t_title');t.area=formVal('t_area');t.due=formVal('t_due');t.time=formVal('t_time')}save(true);closeModal();render()}
function addOperation(type){openModal(type==='income'?'Доход':'Расход',`<div class="form-grid">${field('Сумма','o_amount')}${field('Категория','o_category',type==='income'?'Доход':'Продукты')}${field('Дата','o_date',todayKey(),'date')}${field('Комментарий','o_note')}</div><div class="actions"><button class="btn" data-action="saveOperation" data-type="${type}">Сохранить</button></div>`)}
function saveOperation(type){arr('operations').unshift({id:uid(),type,amount:num(formVal('o_amount')),category:formVal('o_category')||'Без категории',date:formVal('o_date')||todayKey(),note:formVal('o_note')});save(true);closeModal();render()}
function addCategory(){openModal('Категория',`<div class="form-grid">${field('Название','c_name')}<div class="field"><label>Тип</label><select id="c_type"><option value="expense">Расход</option><option value="income">Доход</option></select></div>${field('Лимит в месяц','c_limit')}</div><div class="actions"><button class="btn" data-action="saveCategory">Сохранить</button></div>`)}
function saveCategory(){arr('categories').push({id:uid(),name:formVal('c_name')||'Категория',type:formVal('c_type')||'expense',limit:num(formVal('c_limit'))});save(true);closeModal();render()}
function editCategory(id){const c=arr('categories').find(x=>x.id===id);if(!c)return;openModal('Редактировать категорию',`<div class="form-grid">${field('Название','c_name',c.name)}<div class="field"><label>Тип</label><select id="c_type"><option value="expense" ${c.type==='expense'?'selected':''}>Расход</option><option value="income" ${c.type==='income'?'selected':''}>Доход</option></select></div>${field('Лимит в месяц','c_limit',c.limit)}</div><div class="actions"><button class="btn" data-action="saveEditedCategory" data-id="${id}">Сохранить</button></div>`)}
function saveEditedCategory(id){const c=arr('categories').find(x=>x.id===id),old=c?.name;if(c){c.name=formVal('c_name');c.type=formVal('c_type');c.limit=num(formVal('c_limit'));arr('operations').forEach(o=>{if(o.category===old)o.category=c.name});arr('plannedPurchases').forEach(p=>{if(p.category===old)p.category=c.name})}save(true);closeModal();render()}
function deleteCategory(id,name){const nm=String(name||'').trim().toLowerCase();if(!confirm(`Удалить категорию «${name}»?`))return;state.categories=arr('categories').filter(c=>String(c.id)!==String(id)&&String(c.name||'').trim().toLowerCase()!==nm);arr('operations').forEach(o=>{if(String(o.category||'').trim().toLowerCase()===nm)o.category='Без категории'});arr('plannedPurchases').forEach(p=>{if(String(p.category||'').trim().toLowerCase()===nm)p.category='Без категории'});save(true);toast('Категория удалена');render()}
function addDebt(){openModal('Долг',`<div class="form-grid"><div class="field"><label>Тип</label><select id="d_dir"><option value="owe">Я должен</option><option value="owed">Мне должны</option></select></div>${field('Кто / кому','d_person')}${field('Сумма','d_amount')}${field('Когда вернуть','d_due',todayKey(),'date')}${field('Комментарий','d_note')}</div><div class="actions"><button class="btn" data-action="saveDebt">Сохранить</button></div>`)}
function saveDebt(){arr('debts').unshift({id:uid(),direction:formVal('d_dir')||'owe',person:formVal('d_person')||'Долг',amount:num(formVal('d_amount')),due:formVal('d_due'),status:'Активен',note:formVal('d_note')});save(true);closeModal();render()}
function editDebt(id){const d=arr('debts').find(x=>x.id===id);if(!d)return;openModal('Редактировать долг',`<div class="form-grid"><div class="field"><label>Тип</label><select id="d_dir"><option value="owe" ${debtKind(d)==='owe'?'selected':''}>Я должен</option><option value="owed" ${debtKind(d)==='owed'?'selected':''}>Мне должны</option></select></div>${field('Кто / кому','d_person',d.person||d.name)}${field('Сумма','d_amount',d.amount)}${field('Когда вернуть','d_due',d.due||d.date,'date')}${field('Комментарий','d_note',d.note||d.comment||'')}</div><div class="actions"><button class="btn" data-action="saveEditedDebt" data-id="${id}">Сохранить</button><button class="btn danger" data-action="deleteDebt" data-id="${id}">Удалить</button></div>`)}
function saveEditedDebt(id){const d=arr('debts').find(x=>x.id===id);if(d){d.direction=formVal('d_dir');d.person=formVal('d_person');d.amount=num(formVal('d_amount'));d.due=formVal('d_due');d.note=formVal('d_note');d.status=d.status||'Активен'}save(true);closeModal();render()}
function closeDebt(id){const d=arr('debts').find(x=>x.id===id);if(d)d.status='Закрыт';save(true);render()}
function deleteDebt(id){state.debts=arr('debts').filter(x=>x.id!==id);save(true);closeModal();render()}
function remindDebt(id){const d=arr('debts').find(x=>x.id===id);if(d){arr('tasks').unshift({id:uid(),title:`Напоминание по долгу: ${d.person} — ${money(d.amount)}`,area:'Финансы',due:d.due||todayKey(),time:'10:00',priority:'A',status:'В работе'});d.reminder=true;save(true);toast('Задача-напоминание создана');render()}}
function addNote(){openModal('Заметка',`<div class="form-grid">${field('Название','n_title')}${field('Папка','n_folder','Личное')}${area('Текст','n_text')}</div><div class="actions"><button class="btn" data-action="saveNote">Сохранить</button></div>`)}
function saveNote(){arr('notes').unshift({id:uid(),title:formVal('n_title')||'Заметка',folder:formVal('n_folder'),text:formVal('n_text'),createdAt:todayKey(),tags:[]});save(true);closeModal();render()}
function addGoal(){openModal('Новая цель SMART',`<div class="form-grid">${field('Название','g_title')}${field('Цель ₽ / число','g_target')}${field('Сейчас','g_current')}${field('Дедлайн','g_deadline','2026-12-31','date')}${field('Картинка URL','g_image')}${area('Шаг недели','g_week')}</div><div class="actions"><button class="btn" data-action="saveGoal">Сохранить</button></div>`)}
function saveGoal(){arr('goals').unshift({id:uid(),title:formVal('g_title')||'Цель',targetValue:num(formVal('g_target')),currentValue:num(formVal('g_current')),deadline:formVal('g_deadline'),image:formVal('g_image'),week52:formVal('g_week')});save(true);closeModal();render()}
function editGoal(id){const g=arr('goals').find(x=>x.id===id);if(!g)return;openModal('Редактировать цель',`<div class="form-grid">${field('Название','g_title',g.title)}${field('Цель ₽ / число','g_target',g.targetValue)}${field('Сейчас','g_current',g.currentValue)}${field('Дедлайн','g_deadline',g.deadline,'date')}${field('Картинка URL','g_image',g.image||g.imageData||'')}${area('Шаг недели','g_week',g.week52||g.nextAction||'')}</div><div class="actions"><button class="btn" data-action="saveEditedGoal" data-id="${id}">Сохранить</button></div>`)}
function saveEditedGoal(id){const g=arr('goals').find(x=>x.id===id);if(g){g.title=formVal('g_title');g.targetValue=num(formVal('g_target'));g.currentValue=num(formVal('g_current'));g.deadline=formVal('g_deadline');g.image=formVal('g_image');g.week52=formVal('g_week')}save(true);closeModal();render()}
function deleteGoal(id){state.goals=arr('goals').filter(x=>x.id!==id);save(true);render()}
function addHabit(){openModal('Привычка',`<div class="form-grid">${field('Название','h_name')}${field('Сфера','h_area','Фокус')}${field('Цель','h_target','ежедневно')}</div><div class="actions"><button class="btn" data-action="saveHabit">Сохранить</button></div>`)}
function saveHabit(){arr('habits').push({id:uid(),name:formVal('h_name')||'Привычка',area:formVal('h_area'),target:formVal('h_target'),marks:{}});save(true);closeModal();render()}
function addTrip(){toast('Поездки добавим отдельной формой в следующей правке')}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`second-brain-os-export-${todayKey()}.json`;a.click();URL.revokeObjectURL(a.href)}
function importData(){const file=$('#importFile')?.files?.[0];if(!file){toast('Выбери JSON');return}const r=new FileReader();r.onload=()=>{try{state=normalize(JSON.parse(r.result));save(true);toast('Импортировано');render()}catch(e){toast('Ошибка импорта')}};r.readAsText(file)}
function clearCaches(){try{localStorage.setItem('secondBrainOS.currentBuild',BUILD);if('caches'in window)caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));if(navigator.serviceWorker)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()))}catch(e){}toast('Кэш очищен. Обнови страницу.')}
function render(){renderNav();const map={dashboard:dashboardPage,finance:financePage,operations:operationsPage,budget:budgetPage,goals:goalsPage,planning:planningPage,tasks:tasksPage,planned:plannedPage,wishlist:wishlistPage,recurringPayments:recurringPaymentsPage,habits:habitsPage,trips:tripsPage,interview:interviewPage,books:booksPage,notes:notesPage,people:peoplePage,movies:moviesPage,debts:debtsPage,import:importPage,diagnostics:diagnosticsPage,spheres:dashboardPage};$('#view').innerHTML=(map[page]||dashboardPage)()}
document.addEventListener('click',e=>{const el=e.target.closest('[data-go],[data-action]');if(!el)return;if(el.dataset.go){e.preventDefault();go(el.dataset.go);return}const a=el.dataset.action,id=el.dataset.id;switch(a){case'closeModal':closeModal();break;case'pickBudgetDay':setUI('budgetDay',el.dataset.day);break;case'planFilter':setUI('planFilter',el.dataset.filter||'all');break;case'setPage':setUI(el.dataset.key,Number(el.dataset.page)||1);break;case'debtFilter':state.settings.ui.debtFilter=el.dataset.filter||'all';state.settings.ui.debtPage=1;save();render();break;case'scrollTo':document.getElementById(el.dataset.target)?.scrollIntoView({behavior:'smooth',block:'start'});break;case'addPlan':addPlan();break;case'savePlan':savePlan();break;case'editPlan':editPlan(el.dataset.src,id);break;case'saveEditedPlan':savePlan(id);break;case'addTask':addTask();break;case'saveTask':saveTask();break;case'saveEditedTask':saveEditedTask(id);break;case'addIncome':addOperation('income');break;case'addExpense':addOperation('expense');break;case'saveOperation':saveOperation(el.dataset.type);break;case'addCategory':addCategory();break;case'saveCategory':saveCategory();break;case'editCategory':editCategory(id);break;case'saveEditedCategory':saveEditedCategory(id);break;case'deleteCategory':deleteCategory(id,el.dataset.name);break;case'addDebt':addDebt();break;case'saveDebt':saveDebt();break;case'editDebt':editDebt(id);break;case'saveEditedDebt':saveEditedDebt(id);break;case'closeDebt':closeDebt(id);break;case'deleteDebt':deleteDebt(id);break;case'remindDebt':remindDebt(id);break;case'addNote':addNote();break;case'saveNote':saveNote();break;case'addGoal':addGoal();break;case'saveGoal':saveGoal();break;case'editGoal':editGoal(id);break;case'saveEditedGoal':saveEditedGoal(id);break;case'deleteGoal':deleteGoal(id);break;case'addHabit':addHabit();break;case'saveHabit':saveHabit();break;case'openLifeFolder':state.settings.lifeFolder=el.dataset.folder||'overview';state.settings.lifeSubFolder='';page='spheres';location.hash='spheres';save();render();break;case'openLifeSub':state.settings.lifeFolder=el.dataset.folder;state.settings.lifeSubFolder=el.dataset.sub;save();render();break;case'backLife':state.settings.lifeFolder='overview';state.settings.lifeSubFolder='';save();render();break;case'saveInterview':saveInterview();break;case'exportData':exportData();break;case'importData':importData();break;case'clearCaches':clearCaches();break;case'addTrip':addTrip();break;}});
try{document.title=APP_NAME;save();render();console.log('[Second Brain OS]',BUILD)}catch(e){console.error(e);document.body.insertAdjacentHTML('beforeend',`<pre>${esc(e.message)}</pre>`)}
</script>
</body>
</html>
